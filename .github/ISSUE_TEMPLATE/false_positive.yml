name: False positive
description: Report a benign file, prompt, rule hit, or repo that Sentinel flags incorrectly.
title: "[False positive]: "
labels: ["false-positive", "needs-triage"]
body:
  - type: input
    id: rule_id
    attributes:
      label: Rule ID
      placeholder: ARTIFACT-031, aws-access-key, MCP-040
    validations:
      required: true
  - type: dropdown
    id: domain
    attributes:
      label: Domain
      options:
        - Artifact scanner
        - Prompt firewall
        - SAST/secrets
        - MCP/agent
        - HF/supply chain
        - Red team/eval
        - Other
    validations:
      required: true
  - type: textarea
    id: benign_reason
    attributes:
      label: Why this is benign
      description: Explain the expected safe behavior. Do not paste secrets.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Include the command and sanitized evidence.
      render: shell
    validations:
      required: true
