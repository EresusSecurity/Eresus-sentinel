name: Build Native Packages

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version string (e.g. 0.1.0)"
        required: true
        default: "0.1.0"

permissions:
  contents: write

env:
  APP_NAME: sentinel
  PYTHON_VERSION: "3.11"

jobs:
  # ── macOS — .dmg ──────────────────────────────────────────────────
  build-macos:
    name: macOS .dmg (universal2)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install deps
        run: |
          pip install --quiet pyinstaller
          pip install --quiet -e "." --no-deps

      - name: Build binary (PyInstaller)
        run: |
          pyinstaller packaging/sentinel.spec \
            --distpath dist-mac \
            --workpath /tmp/pyibuild-mac \
            --noconfirm

      - name: Smoke test
        run: dist-mac/sentinel/sentinel --version || dist-mac/sentinel --version

      - name: Create .dmg
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          [ -z "$VERSION" ] && VERSION="${{ github.event.inputs.version }}"

          # Package the binary in a simple dmg
          mkdir -p dmg-stage
          cp -r dist-mac/sentinel dmg-stage/${APP_NAME}

          hdiutil create \
            -volname "Eresus Sentinel ${VERSION}" \
            -srcfolder dmg-stage \
            -ov -format UDZO \
            "sentinel-${VERSION}-macos-universal2.dmg"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: "*.dmg"
          retention-days: 30

  # ── macOS — Homebrew bottle (tar.gz) ──────────────────────────────
  build-macos-bottle:
    name: macOS Homebrew bottle
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install deps
        run: |
          pip install --quiet pyinstaller
          pip install --quiet -e "." --no-deps

      - name: Build binary
        run: |
          pyinstaller packaging/sentinel.spec \
            --distpath dist-bottle \
            --workpath /tmp/pyibuild-bottle \
            --noconfirm

      - name: Package bottle
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          [ -z "$VERSION" ] && VERSION="${{ github.event.inputs.version }}"

          mkdir -p bottle-stage/bin
          cp dist-bottle/sentinel bottle-stage/bin/sentinel 2>/dev/null || \
            cp -r dist-bottle/sentinel bottle-stage/bin/sentinel

          tar -czf "sentinel-${VERSION}.arm64_monterey.bottle.tar.gz" \
            -C bottle-stage .

      - uses: actions/upload-artifact@v4
        with:
          name: macos-bottle
          path: "*.bottle.tar.gz"
          retention-days: 30

  # ── Windows — .exe installer ───────────────────────────────────────
  build-windows:
    name: Windows .exe
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install deps
        run: |
          pip install --quiet pyinstaller
          pip install --quiet -e "." --no-deps

      - name: Build binary
        run: |
          pyinstaller packaging/sentinel.spec `
            --distpath dist-win `
            --workpath C:\pyibuild-win `
            --noconfirm

      - name: Smoke test
        run: dist-win\sentinel\sentinel.exe --version

      - name: Create zip archive
        shell: pwsh
        run: |
          $VERSION = $env:GITHUB_REF_NAME -replace '^v', ''
          if (-not $VERSION) { $VERSION = "${{ github.event.inputs.version }}" }
          Compress-Archive -Path dist-win\sentinel -DestinationPath "sentinel-${VERSION}-windows-x64.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: "*.zip"
          retention-days: 30

  # ── Linux — single binary + .deb + .rpm + AppImage ─────────────────
  build-linux:
    name: Linux packages (deb / rpm / AppImage)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ruby ruby-dev rubygems build-essential \
            rpm fuse libfuse2 patchelf
          sudo gem install --no-document fpm

      - name: Install Python deps
        run: |
          pip install --quiet pyinstaller
          pip install --quiet -e "." --no-deps

      - name: Build binary (PyInstaller)
        run: |
          pyinstaller packaging/sentinel.spec \
            --distpath dist-linux \
            --workpath /tmp/pyibuild-linux \
            --noconfirm

      - name: Smoke test
        run: ./dist-linux/sentinel --version || ./dist-linux/sentinel/sentinel --version

      - name: Determine version and binary path
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          [ -z "$VERSION" ] && VERSION="${{ github.event.inputs.version }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # PyInstaller may produce a dir or single file
          if [ -f "dist-linux/sentinel" ]; then
            echo "binpath=dist-linux/sentinel" >> "$GITHUB_OUTPUT"
            echo "bintype=file" >> "$GITHUB_OUTPUT"
          else
            echo "binpath=dist-linux/sentinel" >> "$GITHUB_OUTPUT"
            echo "bintype=dir" >> "$GITHUB_OUTPUT"
          fi

      - name: Build .tar.gz
        run: |
          V="${{ steps.meta.outputs.version }}"
          mkdir -p release-linux/usr/local/bin
          if [ "${{ steps.meta.outputs.bintype }}" = "file" ]; then
            cp dist-linux/sentinel release-linux/usr/local/bin/sentinel
          else
            cp dist-linux/sentinel/sentinel release-linux/usr/local/bin/sentinel
          fi
          chmod +x release-linux/usr/local/bin/sentinel
          tar -czf "sentinel-${V}-linux-x86_64.tar.gz" -C release-linux/usr/local/bin sentinel

      - name: Build .deb (fpm)
        run: |
          V="${{ steps.meta.outputs.version }}"
          BIN="release-linux/usr/local/bin/sentinel"
          fpm -s dir -t deb \
            --name eresus-sentinel \
            --version "${V}" \
            --architecture amd64 \
            --description "Deterministic AI security toolkit — model scanning, prompt firewalls, MCP security" \
            --url "https://eresussec.com" \
            --maintainer "Eresus Security <engineering@eresussec.com>" \
            --license "Proprietary" \
            --category security \
            --deb-no-default-config-files \
            --package "sentinel-${V}-linux-amd64.deb" \
            "${BIN}=/usr/local/bin/sentinel"

      - name: Build .rpm (fpm)
        run: |
          V="${{ steps.meta.outputs.version }}"
          BIN="release-linux/usr/local/bin/sentinel"
          fpm -s dir -t rpm \
            --name eresus-sentinel \
            --version "${V}" \
            --architecture x86_64 \
            --description "Deterministic AI security toolkit — model scanning, prompt firewalls, MCP security" \
            --url "https://eresussec.com" \
            --maintainer "Eresus Security <engineering@eresussec.com>" \
            --license "Proprietary" \
            --package "sentinel-${V}-linux-x86_64.rpm" \
            "${BIN}=/usr/local/bin/sentinel"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            *.tar.gz
            *.deb
            *.rpm
          retention-days: 30

  # ── Notify homebrew-tap to update formula ─────────────────────────
  notify-homebrew-tap:
    name: Notify homebrew-tap
    runs-on: ubuntu-latest
    needs: [build-macos-bottle, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Dispatch to homebrew-tap
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          script: |
            const version = context.ref.replace('refs/tags/v', '');
            await github.rest.repos.createDispatchEvent({
              owner: 'EresusSecurity',
              repo:  'homebrew-tap',
              event_type: 'new-release',
              client_payload: { version }
            });
            console.log(`Dispatched new-release to homebrew-tap for v${version}`);

  # ── GitHub Release — attach all packages ─────────────────────────
  attach-to-release:
    name: Attach packages to GitHub Release
    runs-on: ubuntu-latest
    needs: [build-macos, build-windows, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: all-packages
          merge-multiple: true

      - name: List packages
        run: ls -lh all-packages/

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: all-packages/*
          fail_on_unmatched_files: false
          append_body: true
          body: |

            ## 📦 Native Packages

            | Platform | Format | Download |
            |---|---|---|
            | macOS (Apple Silicon / Intel) | `.dmg` | See assets below |
            | macOS | Homebrew bottle `.tar.gz` | See assets below |
            | Windows x64 | `.zip` (exe inside) | See assets below |
            | Linux x86_64 | `.tar.gz` binary | See assets below |
            | Linux x86_64 | `.deb` (Debian/Ubuntu) | See assets below |
            | Linux x86_64 | `.rpm` (RHEL/Fedora) | See assets below |

            **Quick install (Linux .deb):**
            ```bash
            wget https://github.com/EresusSecurity/Eresus-sentinel/releases/latest/download/sentinel-*-linux-amd64.deb
            sudo dpkg -i sentinel-*.deb
            ```
            **Quick install (pip — all platforms):**
            ```bash
            pip install eresus-sentinel
            ```
