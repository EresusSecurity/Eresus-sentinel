name: Eresus Sentinel CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ========== LINT ==========
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run Ruff linter
        run: ruff check python/ tests/

      - name: Run Ruff formatter check
        run: ruff format --check python/ tests/

      - name: Run mypy type checker
        run: mypy python/sentinel/ --ignore-missing-imports

  # ========== TEST ==========
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ \
            -v \
            --tb=short \
            --cov=sentinel \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=60 \
            --junitxml=test-results.xml

      - name: Upload coverage report
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.python-version }}
          path: test-results.xml

  # ========== SECURITY SCAN ==========
  security:
    name: Security Self-Scan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run SAST on own codebase
        run: |
          python -c "
          from sentinel.sast.analyzer import SASTAnalyzer
          import json, sys

          analyzer = SASTAnalyzer()
          findings = analyzer.scan_directory('python/sentinel')

          print(f'SAST Findings: {len(findings)}')
          critical = [f for f in findings if f.severity.name == 'CRITICAL']
          high = [f for f in findings if f.severity.name == 'HIGH']

          for f in critical + high:
              print(f'  [{f.severity.name}] {f.title} @ {f.target}:{f.location}')

          if critical:
              print(f'ERROR: {len(critical)} CRITICAL findings')
              sys.exit(1)
          "

      - name: Run dependency audit
        run: |
          python -c "
          from sentinel.supply_chain.dependency import DependencyAuditor
          import sys

          auditor = DependencyAuditor()
          findings = auditor.audit_file('pyproject.toml')

          print(f'Dependency Findings: {len(findings)}')
          for f in findings:
              print(f'  [{f.severity.name}] {f.title}')

          critical = [f for f in findings if f.severity.name == 'CRITICAL']
          if critical:
              print(f'WARNING: {len(critical)} critical dependency issues')
          "

  # ========== RULE VALIDATION ==========
  rules:
    name: Validate YAML Rules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e .

      - name: Validate all YAML rules load correctly
        run: |
          python -c "
          from sentinel.rules import (
              load_secret_patterns,
              load_injection_patterns,
              load_sast_rules,
              load_artifact_blocklist,
              load_artifact_allowlist,
              load_mcp_rules,
              load_supply_chain_rules,
          )

          secrets = load_secret_patterns()
          print(f'Secret patterns: {len(secrets)}')
          assert len(secrets) > 100, f'Expected 100+ secret patterns, got {len(secrets)}'

          injections = load_injection_patterns()
          total_inj = sum(len(v) for v in injections.values())
          print(f'Injection patterns: {total_inj} across {len(injections)} categories')
          assert total_inj > 80, f'Expected 80+ injection patterns, got {total_inj}'

          sast = load_sast_rules()
          print(f'SAST rules: {len(sast)}')
          assert len(sast) > 20, f'Expected 20+ SAST rules, got {len(sast)}'

          blocklist = load_artifact_blocklist()
          print(f'Blocklist modules: {len(blocklist)}')

          mcp = load_mcp_rules()
          caps = mcp.get('dangerous_capabilities', {})
          print(f'MCP capabilities: {len(caps)}')
          assert len(caps) >= 10, f'Expected 10+ MCP capabilities, got {len(caps)}'

          sc = load_supply_chain_rules()
          exts = sc.get('dangerous_extensions', {})
          print(f'Dangerous extensions: {len(exts)}')
          assert len(exts) >= 25, f'Expected 25+ extensions, got {len(exts)}'

          print('✅ All YAML rules validated successfully')
          "

  # ========== INSTALL MATRIX ==========
  install-matrix:
    name: Install Matrix (${{ matrix.extras }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        extras: [".", ".[scan]", ".[all]"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install (${{ matrix.extras }})
        run: pip install "${{ matrix.extras }}"

      - name: Smoke test — version
        run: python -m sentinel version

      - name: Smoke test — doctor
        run: python -m sentinel doctor

      - name: Smoke test — help
        run: python -m sentinel scan --help

  # ========== DOCKER BUILD ==========
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t eresus/sentinel:ci-test .

      - name: Verify container starts
        run: |
          docker run --rm -d --name sentinel-test -p 8081:8080 eresus/sentinel:ci-test
          sleep 5
          curl -sf http://localhost:8081/health || (docker logs sentinel-test && exit 1)
          docker stop sentinel-test

  # ========== SETUP SCRIPT ==========
  setup-script:
    name: Setup Script
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Run setup script (--core for CI speed)
        run: bash scripts/setup.sh --core

      - name: Verify venv
        run: |
          source .venv/bin/activate
          sentinel --version
