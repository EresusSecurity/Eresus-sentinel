name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_DEFAULT: "3.11"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
          cache: pip

      - name: Install lint deps
        run: pip install --quiet ruff

      - name: ruff check
        run: ruff check python/sentinel

      - name: ruff format check
        run: ruff format --check python/sentinel

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
          cache: pip

      - name: Install deps
        run: pip install --quiet -e ".[dev]" mypy

      - name: mypy
        run: mypy python/sentinel --ignore-missing-imports --no-error-summary

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: pip install --quiet -e ".[dev,all]"

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --tb=short \
            -m "not slow and not integration and not gpu" \
            --cov=python/sentinel \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=75

      - name: Upload coverage to Codecov
        if: matrix.python-version == env.PYTHON_DEFAULT
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
          cache: pip

      - name: Install
        run: pip install --quiet -e ".[dev,all]"

      - name: Run integration tests
        run: pytest tests/ -v -m integration --tb=short
        env:
          SENTINEL_OFFLINE: "1"

  validate-rules:
    name: Validate YAML Rules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
          cache: pip

      - name: Install
        run: pip install --quiet -e "."

      - name: Validate rules
        run: |
          python3 -c "
          from sentinel.rules import load_all_rules
          rules = load_all_rules()
          print(f'Validated {len(rules)} rules')
          " 2>/dev/null || \
          python3 -c "
          from sentinel.cli_dispatch import dispatch_validate_rules
          dispatch_validate_rules()
          " || echo '::warning::Rule validation module not directly callable — skipping'

  build:
    name: Build Distribution
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
          cache: pip

      - name: Build
        run: |
          pip install --quiet build twine
          python -m build
          python -m twine check dist/*

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-packages
          path: dist/
          retention-days: 7
