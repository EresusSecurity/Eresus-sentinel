name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── Lint ──────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ruff
      - run: ruff check python/
      - run: ruff format --check python/

  # ── Type check ────────────────────────────────────────────────
  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]" mypy
      - run: mypy python/sentinel --ignore-missing-imports --no-error-summary

  # ── Tests ─────────────────────────────────────────────────────
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -e ".[dev,web]"
      - run: pytest tests/ -x -q --tb=short -m "not slow and not integration and not gpu"
        env:
          SENTINEL_PASSWORD: ci-test-password
          SENTINEL_ENV: development

  # ── Coverage ──────────────────────────────────────────────────
  coverage:
    name: Coverage (≥60 %)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev,web]" pytest-cov
      - run: >
          pytest tests/ -q --tb=short
          -m "not slow and not integration and not gpu"
          --cov=sentinel --cov-report=xml --cov-fail-under=60
        env:
          SENTINEL_PASSWORD: ci-test-password
          SENTINEL_ENV: development
      - uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
        continue-on-error: true

  # ── Self-scan ─────────────────────────────────────────────────
  scan-self:
    name: Sentinel self-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[web]"
      - run: python -m sentinel -f json -o sentinel-sast.json sast python/ || true
      - uses: actions/upload-artifact@v4
        with:
          name: sast-results
          path: sentinel-sast.json

  # ── Docker build test ─────────────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: docker build -t sentinel:ci .
      - run: docker run --rm -e SENTINEL_PASSWORD=ci-test sentinel:ci python -m sentinel --version
