name: sentinel-picklescan wheels

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  build-wheels:
    name: ${{ matrix.os }} ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
          - os: ubuntu-latest
            target: aarch64
          - os: macos-13
            target: x86_64
          - os: macos-14
            target: aarch64
          - os: windows-latest
            target: x64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build abi3 wheel
        uses: PyO3/maturin-action@v1
        with:
          working-directory: rust/sentinel-pickle
          command: build
          target: ${{ matrix.target }}
          args: --release --out dist --interpreter python3.11
          manylinux: auto

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-picklescan-${{ matrix.os }}-${{ matrix.target }}
          path: rust/sentinel-pickle/dist/*

  publish:
    name: Publish signed wheels
    runs-on: ubuntu-latest
    needs: build-wheels
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Sign distributions with sigstore
        uses: sigstore/gh-action-sigstore-python@v3.0.1
        with:
          inputs: ./dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
