name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write  # for trusted PyPI publishing

jobs:

  # ── Run full test suite before releasing ──────────────────────
  test:
    name: Pre-release tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev,web]"
      - run: pytest tests/ -x -q --tb=short -m "not slow and not integration and not gpu"
        env:
          SENTINEL_PASSWORD: ci-test-password
          SENTINEL_ENV: development

  # ── Build sdist + wheel ───────────────────────────────────────
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install build
      - run: python -m build python/
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: python/dist/

  # ── Publish to PyPI via Trusted Publishing ────────────────────
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    environment: pypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  # ── Build & push Docker image ─────────────────────────────────
  docker:
    name: Docker publish
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  # ── GitHub Release with notes ─────────────────────────────────
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [publish-pypi, docker]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Bundle shell completions
        run: |
          mkdir -p completions-bundle
          cp scripts/completions/sentinel.bash completions-bundle/
          cp scripts/completions/sentinel.zsh  completions-bundle/
          cp scripts/completions/sentinel.fish completions-bundle/
          tar czf dist/sentinel-completions.tar.gz -C completions-bundle .
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
