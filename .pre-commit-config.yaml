# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: detect-private-key
      - id: debug-statements

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.2
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: sentinel-scan-artifacts
        name: Eresus Sentinel — model artifacts
        entry: python -m sentinel.cli artifact-scan --fail-on critical
        language: python
        files: "\\.((pkl|pickle|pt|pth|bin|safetensors|gguf|onnx|h5|hdf5|keras|tflite|joblib|npy|npz|xgb|lgb|cbm))$"
        stages: [pre-commit, pre-push]
        pass_filenames: true
        require_serial: false
      - id: sentinel-scan-mcp
        name: Eresus Sentinel — MCP manifests
        entry: python -m sentinel.cli mcp-validate --fail-on high
        language: python
        files: "(mcp.*\\.(json|ya?ml)$|tools\\.(json|ya?ml)$)"
        stages: [pre-commit]
        pass_filenames: true
        require_serial: false
