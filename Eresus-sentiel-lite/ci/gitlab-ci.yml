# ============================================================================
# Eresus Sentinel — GitLab CI Integration
# ============================================================================
#
# Scans merge requests for ML security anti-patterns.
# Add this to your .gitlab-ci.yml or include it as a template.
# ============================================================================

eresus-sentinel-scan:
  stage: test
  image: python:3.11-slim
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  before_script:
    - pip install -e ./eresus-sentinel/ --quiet
  script:
    - |
      if [ "$CI_PIPELINE_SOURCE" = "merge_request_event" ]; then
        git diff origin/$CI_MERGE_REQUEST_TARGET_BRANCH_NAME...HEAD | \
          python3 -m sentinel.cli_dispatch --module diff --target -
      else
        python3 -m sentinel.cli_dispatch --module diff \
          --target "$CI_COMMIT_BEFORE_SHA..$CI_COMMIT_SHA"
      fi
  allow_failure: false
  artifacts:
    when: on_failure
    reports:
      junit: eresus-sentinel-report.xml
    expire_in: 30 days
