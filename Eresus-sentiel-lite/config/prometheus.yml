# Eresus Sentinel — Prometheus Configuration
# Scrapes the Sentinel API /metrics endpoint

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "sentinel-api"
    static_configs:
      - targets: ["sentinel-api:8080"]
    metrics_path: "/metrics"
    scrape_interval: 10s
    scrape_timeout: 5s
