# ============================================================================
# Eresus Sentinel — Default API Configuration
# ============================================================================
# Copy this to config/scanners.yml and customize for your deployment.
# Environment variables can be referenced with ${VAR_NAME:default_value}
# ============================================================================

app:
  name: "Eresus Sentinel"
  log_level: ${SENTINEL_LOG_LEVEL:INFO}
  log_json: true
  scan_fail_fast: false
  scan_prompt_timeout: 30
  scan_output_timeout: 60
  lazy_load: true

# ── Authentication ───────────────────────────────────────────────────
# Uncomment to enable API authentication
# auth:
#   type: http_bearer  # http_bearer | http_basic
#   token: ${SENTINEL_AUTH_TOKEN:}

# ── Rate Limiting ────────────────────────────────────────────────────
rate_limit:
  enabled: true
  limit: "100/minute"

# ── Input Scanners ───────────────────────────────────────────────────
# Each scanner can have custom params. Omit 'params' for defaults.
input_scanners:
  - type: PromptInjectionScanner
    params:
      threshold: 0.85
  - type: InvisibleTextScanner
  - type: HeuristicInjectionScanner
  - type: EncodingAttackScanner
  - type: ToxicityScanner
    params:
      threshold: 0.7
  - type: SecretScanner
  - type: BanSubstringsScanner
    params:
      substrings: []
  - type: GibberishScanner
    params:
      threshold: 0.7
  - type: TokenLimitScanner
    params:
      max_tokens: 4096

# ── Output Scanners ──────────────────────────────────────────────────
output_scanners:
  - type: ToxicityOutputScanner
    params:
      threshold: 0.7
  - type: SensitiveDataScanner
  - type: BiasScanner
  - type: MaliciousURLScanner
  - type: NoRefusalScanner
  - type: RelevanceScanner
  - type: FactualConsistencyScanner

# ── Observability ────────────────────────────────────────────────────
tracing:
  exporter: console  # console | otel_http
  # endpoint: http://jaeger:4318/v1/traces

metrics:
  exporter: prometheus  # console | otel_http | prometheus
  # endpoint: http://otel-collector:4318/v1/metrics
