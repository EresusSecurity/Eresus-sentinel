# ============================================================================
# Eresus Sentinel — Docker Compose Stack
# ============================================================================
# Usage:
#   docker compose up -d        — Start all services
#   docker compose logs -f      — Follow logs
#   docker compose down         — Stop all services
#
# Services:
#   sentinel-api    — Main API (port 8080)
#   sentinel-db     — PostgreSQL database (port 5432)
#   prometheus      — Metrics collection (port 9090)
# ============================================================================

services:
  # ── PostgreSQL Database ──────────────────────────────────────────
  sentinel-db:
    image: postgres:16-alpine
    container_name: sentinel-db
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - sentinel-pgdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-sentinel}
      - POSTGRES_USER=${POSTGRES_USER:-sentinel}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD env var is required}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sentinel} -d ${POSTGRES_DB:-sentinel}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    networks:
      - sentinel-net

  # ── Sentinel API Server ──────────────────────────────────────────
  sentinel-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sentinel-api
    restart: unless-stopped
    ports:
      - "${SENTINEL_PORT:-8080}:8080"
    volumes:
      - ./config:/app/config:ro
      - ./rules:/app/rules:ro
      - sentinel-logs:/app/logs
      - sentinel-data:/app/data
    environment:
      - SENTINEL_ENV=${SENTINEL_ENV:-production}
      - SENTINEL_LOG_LEVEL=${SENTINEL_LOG_LEVEL:-INFO}
      - SENTINEL_METRICS=1
      - SENTINEL_VAULT=${SENTINEL_VAULT:-0}
      - SENTINEL_AUDIT_LOG=/app/logs/audit.jsonl
      - SENTINEL_POLICY=/app/config/policy.yaml
      - SENTINEL_CORS_ORIGINS=${SENTINEL_CORS_ORIGINS:-http://localhost:8080}
      - SENTINEL_AUTH_TYPE=${SENTINEL_AUTH_TYPE:-}
      - SENTINEL_AUTH_TOKEN=${SENTINEL_AUTH_TOKEN:-}
      - SENTINEL_RATE_LIMIT=${SENTINEL_RATE_LIMIT:-100/minute}
      - SENTINEL_PASSWORD=${SENTINEL_PASSWORD:?SENTINEL_PASSWORD env var is required}
      - SENTINEL_USER=${SENTINEL_USER:-admin}
      # PostgreSQL
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-sentinel}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD env var is required}@sentinel-db:5432/${POSTGRES_DB:-sentinel}
      # AI backend (optional)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - HF_TOKEN=${HF_TOKEN:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 512M
          cpus: "0.5"
    depends_on:
      sentinel-db:
        condition: service_healthy
    networks:
      - sentinel-net

  # ── Prometheus (Metrics) ─────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: sentinel-prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-19090}:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-admin-api=false'
    networks:
      - sentinel-net
    depends_on:
      sentinel-api:
        condition: service_healthy

volumes:
  sentinel-logs:
    driver: local
  sentinel-data:
    driver: local
  sentinel-pgdata:
    driver: local
  prometheus-data:
    driver: local

networks:
  sentinel-net:
    driver: bridge
