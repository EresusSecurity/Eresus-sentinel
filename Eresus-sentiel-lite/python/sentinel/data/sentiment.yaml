# ============================================================================
# Eresus Sentinel — Sentiment Analysis Lexicon
# ============================================================================
# YAML-driven word/phrase scoring for output sentiment analysis.
# Scores: -1.0 (very negative) → +1.0 (very positive)
# ============================================================================

