negators:
  - "not"
  - "no"
  - "never"
  - "neither"
  - "nor"
  - "hardly"
  - "barely"
  - "scarcely"
  - "don't"
  - "doesn't"
  - "didn't"
  - "won't"
  - "wouldn't"
  - "couldn't"
  - "shouldn't"
  - "isn't"
  - "aren't"
  - "wasn't"
  - "weren't"
  - "can't"
  - "cannot"

intensifiers:
  very: 1.3
  extremely: 1.5
  incredibly: 1.5
  absolutely: 1.4
  totally: 1.3
  completely: 1.3
  really: 1.2
  so: 1.2
  quite: 1.1
  rather: 1.1
  pretty: 1.1
  deeply: 1.3

diminishers:
  slightly: 0.6
  somewhat: 0.7
  barely: 0.5
  hardly: 0.5
  "a bit": 0.6
  "a little": 0.6
  "kind of": 0.7
  "sort of": 0.7

passive_aggressive_patterns:
  - '\b(?:as I already (?:said|mentioned|told you))\b'
  - '\b(?:obviously|clearly|evidently|apparently)\b'
  - '\b(?:with all due respect|no offense,? but|I''m just saying)\b'
  - '\b(?:if you (?:had|would) (?:just|only)|you should have)\b'
  - '\b(?:fine|whatever|sure|okay)\.\s*$'
  - '\b(?:I''m sorry you feel that way|that''s interesting)\b'
