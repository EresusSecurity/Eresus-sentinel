    - "*"

  torch._dynamo:
    - "*"  # JIT compilation — arbitrary code execution

  torch._inductor:
    - "*"  # code generation and execution

  torch.jit:
    - "*"  # JIT compilation — arbitrary code execution

  torch.compile:
    - "*"  # code compilation

  numpy.distutils:
    - "*"  # executes arbitrary build commands

  distutils:
    - "*"  # build system — code execution

# ─── ALLOWLIST ────────────────────────────────────────────────────────
# Known-safe module.name pairs in ML model context.
# These are checked BEFORE the blocklist — matching here = skip.
#
# Sources: fickling ML_ALLOWLIST, picklescan, ModelScan, manual audit.
# Each entry is annotated with why it's safe.
allowlist:

  # ── Python builtins (safe subset) ───────────────────────────────────
  builtins:
    - set
    - frozenset
    - range
    - slice
    - complex
    - bytes
    - bytearray
    - bool
    - int
    - float
    - str
    - list
    - tuple
    - dict
    - len
    - abs
    - sum
    - min
    - max
    - round
    - sorted
    - reversed
    - enumerate
    - zip
    - map
    - filter
    - isinstance
    - issubclass
    - object
    - callable
    - format
    - hash
    - id
    - repr
    - ascii
    - bin
    - hex
    - oct
    - ord
    - chr
    - pow
    - divmod
    - iter
    - next
    - all
    - any

  # ── Standard library (data-only) ───────────────────────────────────
  collections:
    - OrderedDict
    - defaultdict
    - namedtuple
    - deque

  argparse:
    - Namespace

  re:
    - compile
    - match
    - search
    - findall
    - sub
    - split
    - Pattern

  ast:
    - dump

  # platform: removed — blocklisted for info exfiltration

  functools:
    - reduce
    - lru_cache
    - wraps
    - total_ordering
    - cmp_to_key

  operator:
    - getitem
    - add
    - mul

  pathlib:
    - PurePath
    - PurePosixPath
    - PureWindowsPath

  uuid:
    - UUID
    - uuid4
    - uuid1

  math:
    - "*"

  statistics:
    - "*"

  itertools:
    - "*"

  string:
    - Formatter
    - Template

  decimal:
    - Decimal

  fractions:
    - Fraction

  datetime:
    - datetime
    - date
    - time
    - timedelta
    - timezone

  enum:
    - Enum
    - IntEnum

  dataclasses:
    - field

  typing:
    - "*"

  copy:
    - copy
    - deepcopy

  _codecs:
    - encode

  _io:
    - BytesIO    # in-memory buffer, not file I/O

  copyreg:
    - _reconstructor
    - __newobj__

  copy_reg:
    - _reconstructor

  _operator:
    - getitem

  # ── PyTorch core storage types ─────────────────────────────────────
  # These are pure data containers — callable but redirect to __new__
  # which only builds a new empty object. Cannot execute arbitrary code.
  torch:
    - FloatStorage
    - LongStorage
    - IntStorage
    - ShortStorage
    - DoubleStorage
    - HalfStorage
    - BFloat16Storage
    - ByteStorage
    - CharStorage
    - BoolStorage
    - ComplexFloatStorage
    - ComplexDoubleStorage
    - QInt8Storage
    - QInt32Storage
    - QUInt8Storage
    - QUInt4x2Storage
    - QUInt2x4Storage
    - FloatTensor
    - LongTensor
    - IntTensor
    - DoubleTensor
    - HalfTensor
    - BFloat16Tensor
    - ByteTensor
    - BoolTensor
    - TypedStorage
    - UntypedStorage
    - storage
    - Size
    - device
    - Tensor
    - bfloat16
    - float16
    - float32

  # ── PyTorch internal reconstruction helpers ────────────────────────
  # These build Tensor/Parameter objects from serialized components.
  # _rebuild_tensor_v2 calls __new__ then populates from stored data.
  torch._utils:
    - _rebuild_tensor
    - _rebuild_tensor_v2
    - _rebuild_parameter
    - _rebuild_parameter_with_state

  torch._tensor:
    - _rebuild_from_type_v2

  torch._C:
    - _rebuild_tensor_v2

  # ── PyTorch NN modules (simple layers, not callable for RCE) ───────
  torch.nn.modules.module:
    - Module

  torch.nn.modules.linear:
    - Linear
    - Identity

  torch.nn.modules.conv:
    - Conv2d
    - ConvTranspose2d

  torch.nn.modules.batchnorm:
