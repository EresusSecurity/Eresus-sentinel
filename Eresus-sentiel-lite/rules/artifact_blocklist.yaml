# ============================================================================
# Eresus Sentinel — Dangerous Globals Blocklist for Artifact Scanning
# ============================================================================
# Used by PickleScanner. Any pickle GLOBAL opcode importing a
# (module, name) pair found here triggers a finding.
#
# Sources:
#   - picklescan (https://github.com/mmaitre314/picklescan)
#   - huntr.com MFV research
#   - fickling project
#   - OWASP Deserialization Cheat Sheet
#   - Trail of Bits ML security research
#   - JFrog CVE analysis
#   - ProtectAI ModelScan
#
# Format:
#   module:
#     - name       (exact match)
#     - "prefix*"  (wildcard suffix match)
# ============================================================================

version: "3.0"

# ─── BLOCKLIST ────────────────────────────────────────────────────────
dangerous_globals:

  # ── Code execution (CRITICAL) ──────────────────────────────────────
  builtins:
