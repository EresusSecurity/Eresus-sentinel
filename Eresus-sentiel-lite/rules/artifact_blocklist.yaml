  cloudpickle.cloudpickle:
    - _builtin_type      # CodeType access for arbitrary code construction
    - _make_function     # creates functions from code objects
    - _function_setstate  # sets internal function state
    - _make_cell         # creates closure cells
    - _make_empty_cell
    - subimport          # imports arbitrary modules

  numpy.f2py:
    - "*"  # getlincoef, _eval_length call eval() on arbitrary strings

  numpy.testing._private.utils:
    - "*"  # runstring() is a synonym for exec()

  posix:
    - "*"  # Alias for 'os' on Linux, includes os.system()

  aiohttp:
    - "*"  # Full HTTP client, SSRF vector

  commands:
    - "*"  # Python 2 precursor to subprocess

  httplib:
    - "*"  # Includes http.client.HTTPSConnection()

  bdb:
    - "*"  # Python debugger base, code execution via set_trace

  logging:
