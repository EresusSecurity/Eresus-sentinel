    - "*"

  cProfile:
    - run     # calls exec() on arbitrary strings
    - runctx

  profile:
    - run     # calls exec() on arbitrary strings
    - runctx

  timeit:
    - "*"  # timeit.timeit() calls exec() on code strings

  doctest:
