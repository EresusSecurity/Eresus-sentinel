# Eresus Sentinel — Dangerous Code Patterns
# Used by: sentinel.notebook_scanner.dangerous_code_plugin
# Total: ~120 patterns across 7 categories

dangerous_imports:
  - pattern: "^\\s*import\\s+pickle"
    name: "pickle"
    risk: "Arbitrary code execution via deserialization"
    severity: "HIGH"
    cwe: "CWE-502"
  - pattern: "^\\s*from\\s+pickle\\s+import"
    name: "pickle"
    risk: "Arbitrary code execution via deserialization"
    severity: "HIGH"
    cwe: "CWE-502"
  - pattern: "^\\s*import\\s+shelve"
    name: "shelve"
    risk: "Uses pickle internally"
    severity: "HIGH"
    cwe: "CWE-502"
  - pattern: "^\\s*import\\s+marshal"
    name: "marshal"
    risk: "Low-level bytecode serialization"
    severity: "HIGH"
    cwe: "CWE-502"
  - pattern: "^\\s*import\\s+subprocess"
    name: "subprocess"
    risk: "System command execution"
    severity: "HIGH"
    cwe: "CWE-78"
  - pattern: "^\\s*from\\s+subprocess\\s+import"
    name: "subprocess"
    risk: "System command execution"
    severity: "HIGH"
    cwe: "CWE-78"
  - pattern: "^\\s*import\\s+ctypes"
    name: "ctypes"
    risk: "Direct memory access / FFI"
    severity: "HIGH"
    cwe: "CWE-787"
  - pattern: "^\\s*from\\s+ctypes\\s+import"
    name: "ctypes"
    risk: "Direct memory access / FFI"
    severity: "HIGH"
    cwe: "CWE-787"
  - pattern: "^\\s*import\\s+shutil"
    name: "shutil"
    risk: "File system manipulation"
    severity: "MEDIUM"
    cwe: "CWE-73"
  - pattern: "^\\s*import\\s+tempfile"
    name: "tempfile"
    risk: "Temporary file creation"
    severity: "LOW"
    cwe: "CWE-377"
  - pattern: "^\\s*import\\s+socket"
    name: "socket"
    risk: "Network access"
    severity: "MEDIUM"
    cwe: "CWE-918"
  - pattern: "^\\s*import\\s+http\\.server"
    name: "http.server"
    risk: "HTTP server in notebook"
    severity: "HIGH"
    cwe: "CWE-200"
  - pattern: "^\\s*import\\s+pty"
    name: "pty"
    risk: "Pseudo-terminal spawning — sandbox escape vector"
    severity: "CRITICAL"
    cwe: "CWE-78"
  - pattern: "^\\s*import\\s+webbrowser"
    name: "webbrowser"
    risk: "Browser launch from notebook"
    severity: "MEDIUM"
    cwe: "CWE-601"
  - pattern: "^\\s*import\\s+importlib"
    name: "importlib"
    risk: "Dynamic module loading"
    severity: "HIGH"
    cwe: "CWE-94"
  - pattern: "^\\s*from\\s+importlib\\s+import"
    name: "importlib"
    risk: "Dynamic module loading"
    severity: "HIGH"
    cwe: "CWE-94"
  - pattern: "^\\s*import\\s+code$"
    name: "code"
    risk: "Interactive interpreter access"
    severity: "HIGH"
    cwe: "CWE-94"
  - pattern: "^\\s*import\\s+codeop"
    name: "codeop"
    risk: "Code compilation utilities"
    severity: "HIGH"
    cwe: "CWE-94"
  - pattern: "^\\s*import\\s+compileall"
    name: "compileall"
    risk: "Bytecode compilation"
    severity: "MEDIUM"
    cwe: "CWE-94"
  - pattern: "^\\s*import\\s+runpy"
    name: "runpy"
    risk: "Module execution as script"
    severity: "HIGH"
    cwe: "CWE-94"
  - pattern: "^\\s*import\\s+zipimport"
    name: "zipimport"
    risk: "Import from zip archives"
    severity: "MEDIUM"
    cwe: "CWE-94"
  - pattern: "^\\s*import\\s+multiprocessing"
    name: "multiprocessing"
    risk: "Process spawning / shared memory"
    severity: "MEDIUM"
    cwe: "CWE-78"
  - pattern: "^\\s*import\\s+signal"
    name: "signal"
    risk: "Signal handling manipulation"
    severity: "MEDIUM"
    cwe: "CWE-362"
  # --- Sandbox escape vectors ---
  - pattern: "^\\s*import\\s+dis"
    name: "dis"
    risk: "Bytecode disassembly — code introspection"
    severity: "MEDIUM"
    cwe: "CWE-94"
  - pattern: "^\\s*import\\s+inspect"
    name: "inspect"
    risk: "Runtime introspection — source/frame/stack access"
    severity: "MEDIUM"
    cwe: "CWE-200"
  - pattern: "^\\s*import\\s+gc"
    name: "gc"
    risk: "Garbage collector — object graph traversal"
    severity: "MEDIUM"
    cwe: "CWE-94"
  - pattern: "^\\s*import\\s+sys"
    name: "sys"
    risk: "System internals — modules dict, path manipulation"
    severity: "MEDIUM"
    cwe: "CWE-94"
  - pattern: "^\\s*import\\s+builtins"
    name: "builtins"
    risk: "Built-in namespace access"
    severity: "HIGH"
    cwe: "CWE-94"
  - pattern: "^\\s*import\\s+types"
    name: "types"
    risk: "Type construction — FunctionType, CodeType"
    severity: "MEDIUM"
    cwe: "CWE-94"
  - pattern: "^\\s*import\\s+ast"
    name: "ast"
    risk: "AST manipulation — compile/exec chain"
    severity: "MEDIUM"
    cwe: "CWE-94"
  - pattern: "^\\s*import\\s+_thread"
    name: "_thread"
    risk: "Low-level threading"
    severity: "MEDIUM"
    cwe: "CWE-362"
  - pattern: "^\\s*import\\s+mmap"
    name: "mmap"
    risk: "Memory-mapped file I/O — shared memory"
    severity: "HIGH"
    cwe: "CWE-787"
  - pattern: "^\\s*import\\s+resource"
    name: "resource"
    risk: "Resource limit manipulation"
    severity: "MEDIUM"
    cwe: "CWE-400"
  - pattern: "^\\s*import\\s+fcntl"
    name: "fcntl"
    risk: "File descriptor control"
    severity: "MEDIUM"
    cwe: "CWE-73"
  - pattern: "^\\s*import\\s+select"
    name: "select"
    risk: "I/O multiplexing"
    severity: "LOW"
    cwe: "CWE-918"
  - pattern: "^\\s*import\\s+asyncio\\.subprocess"
    name: "asyncio.subprocess"
    risk: "Async subprocess execution"
    severity: "HIGH"
    cwe: "CWE-78"
  - pattern: "^\\s*from\\s+asyncio\\s+import\\s+.*subprocess"
    name: "asyncio.subprocess"
    risk: "Async subprocess execution"
    severity: "HIGH"
    cwe: "CWE-78"
  - pattern: "^\\s*import\\s+antigravity"
    name: "antigravity"
    risk: "Opens browser — xkcd easter egg"
    severity: "LOW"
    cwe: "CWE-601"
  - pattern: "^\\s*import\\s+ensurepip"
    name: "ensurepip"
    risk: "Package installer bootstrapping"
    severity: "HIGH"
    cwe: "CWE-94"
  - pattern: "^\\s*import\\s+pip"
    name: "pip"
    risk: "Package installer access"
    severity: "HIGH"
    cwe: "CWE-94"
  - pattern: "^\\s*from\\s+pip\\s+import"
    name: "pip"
    risk: "Package installer access"
    severity: "HIGH"
    cwe: "CWE-94"

dangerous_builtins:
  - pattern: "(?:^|\\s)exec\\s*\\("
    name: "exec()"
    risk: "Dynamic code execution"
    severity: "CRITICAL"
    cwe: "CWE-94"
  - pattern: "(?:^|\\s)eval\\s*\\("
    name: "eval()"
    risk: "Dynamic expression evaluation"
    severity: "CRITICAL"
    cwe: "CWE-94"
  - pattern: "(?:^|\\s)compile\\s*\\("
    name: "compile()"
    risk: "Dynamic code compilation"
    severity: "HIGH"
    cwe: "CWE-94"
  - pattern: "\\b__import__\\s*\\("
    name: "__import__()"
    risk: "Dynamic module import"
    severity: "HIGH"
    cwe: "CWE-94"
  - pattern: "\\bgetattr\\s*\\([^,]+,\\s*['\"]__"
    name: "getattr(dunder)"
    risk: "Dunder attribute access — sandbox escape via object traversal"
    severity: "HIGH"
    cwe: "CWE-94"
  - pattern: "\\bbreakpoint\\s*\\("
    name: "breakpoint()"
    risk: "Interactive debugger in production"
    severity: "MEDIUM"
    cwe: "CWE-489"
  - pattern: "\\bglobals\\s*\\(\\s*\\)"
    name: "globals()"
    risk: "Global namespace introspection"
    severity: "MEDIUM"
    cwe: "CWE-94"
  - pattern: "\\blocals\\s*\\(\\s*\\)"
    name: "locals()"
    risk: "Local namespace introspection"
    severity: "LOW"
    cwe: "CWE-94"
  - pattern: "\\bvars\\s*\\([^)]*\\)\\s*\\["
    name: "vars()[key]"
    risk: "Namespace mutation via vars"
    severity: "MEDIUM"
    cwe: "CWE-94"
  - pattern: "\\bdelattr\\s*\\("
    name: "delattr()"
    risk: "Dynamic attribute deletion"
    severity: "MEDIUM"
    cwe: "CWE-94"
  # --- Sandbox escape builtins ---
  - pattern: "\\bsetattr\\s*\\([^,]+,\\s*['\"]__"
    name: "setattr(dunder)"
    risk: "Dunder attribute overwrite — sandbox escape"
    severity: "CRITICAL"
    cwe: "CWE-94"
  - pattern: "\\btype\\s*\\(\\s*['\"]"
    name: "type('name', ...)"
    risk: "Dynamic class creation"
    severity: "HIGH"
    cwe: "CWE-94"
  - pattern: "\\bopen\\s*\\([^)]*['\"]\\s*/\\s*etc"
    name: "open(/etc/...)"
    risk: "Sensitive file read"
    severity: "CRITICAL"
    cwe: "CWE-22"
  - pattern: "\\b__builtins__"
    name: "__builtins__"
    risk: "Builtin namespace access — sandbox bypass"
    severity: "HIGH"
    cwe: "CWE-94"
  - pattern: "\\binput\\s*\\("
    name: "input()"
    risk: "User input in notebook — potential eval in Python 2"
    severity: "LOW"
    cwe: "CWE-94"
  - pattern: "\\bhelp\\s*\\(\\s*\\)"
    name: "help()"
    risk: "Interactive help — can invoke pager/shell"
    severity: "LOW"
    cwe: "CWE-78"

sandbox_escape:
  - pattern: "\\.__class__\\.__bases__"
    name: "__class__.__bases__"
    risk: "Class hierarchy traversal — sandbox escape"
    severity: "CRITICAL"
    cwe: "CWE-94"
  - pattern: "\\.__subclasses__\\s*\\("
    name: "__subclasses__()"
    risk: "Subclass enumeration — sandbox escape chain"
    severity: "CRITICAL"
    cwe: "CWE-94"
  - pattern: "\\.__globals__"
    name: "__globals__"
    risk: "Global namespace access via function — sandbox escape"
    severity: "CRITICAL"
    cwe: "CWE-94"
  - pattern: "\\.__init__\\.__globals__"
    name: "__init__.__globals__"
    risk: "Init globals traversal — classic sandbox escape"
    severity: "CRITICAL"
    cwe: "CWE-94"
  - pattern: "\\.__class__\\.__mro__"
    name: "__class__.__mro__"
    risk: "MRO traversal — type hierarchy escape"
    severity: "CRITICAL"
    cwe: "CWE-94"
  - pattern: "\\.__dict__\\s*\\["
    name: "__dict__[key]"
    risk: "Dict attribute access — bypass attribute filtering"
    severity: "HIGH"
    cwe: "CWE-94"
  - pattern: "\\.__code__"
    name: "__code__"
    risk: "Code object access — bytecode manipulation"
    severity: "CRITICAL"
    cwe: "CWE-94"
  - pattern: "\\.__reduce__"
    name: "__reduce__"
    risk: "Pickle reduce — arbitrary code via deserialization"
    severity: "CRITICAL"
    cwe: "CWE-502"
  - pattern: "\\.__reduce_ex__"
    name: "__reduce_ex__"
    risk: "Pickle reduce_ex — extended deserialization attack"
    severity: "CRITICAL"
    cwe: "CWE-502"
  - pattern: "\\.__import__"
    name: "__import__"
    risk: "Import function access via object traversal"
    severity: "HIGH"
    cwe: "CWE-94"
  - pattern: "\\.__spec__\\.loader"
    name: "__spec__.loader"
    risk: "Module loader access"
    severity: "HIGH"
    cwe: "CWE-94"
  - pattern: "\\bFunctionType\\s*\\("
    name: "FunctionType()"
    risk: "Dynamic function creation from code objects"
    severity: "CRITICAL"
    cwe: "CWE-94"
  - pattern: "\\bCodeType\\s*\\("
    name: "CodeType()"
    risk: "Raw bytecode construction"
    severity: "CRITICAL"
    cwe: "CWE-94"
  - pattern: "sys\\.modules\\s*\\["
    name: "sys.modules[]"
    risk: "Module cache access — import arbitrary loaded modules"
    severity: "HIGH"
    cwe: "CWE-94"
  - pattern: "gc\\.get_objects\\s*\\("
    name: "gc.get_objects()"
    risk: "GC object dump — access all live objects"
    severity: "HIGH"
    cwe: "CWE-200"
  - pattern: "gc\\.get_referrers\\s*\\("
    name: "gc.get_referrers()"
    risk: "GC referrer traversal — find hidden references"
    severity: "HIGH"
    cwe: "CWE-200"
  - pattern: "\\bframe\\.f_locals"
    name: "frame.f_locals"
    risk: "Stack frame local variable access"
    severity: "HIGH"
    cwe: "CWE-200"
  - pattern: "\\bframe\\.f_globals"
    name: "frame.f_globals"
    risk: "Stack frame global variable access"
    severity: "HIGH"
    cwe: "CWE-200"
  - pattern: "sys\\._getframe\\s*\\("
    name: "sys._getframe()"
    risk: "Stack frame access — caller introspection"
    severity: "HIGH"
    cwe: "CWE-200"

dangerous_syscalls:
  - pattern: "os\\.system\\s*\\("
    name: "os.system()"
    risk: "Shell command execution"
    severity: "CRITICAL"
    cwe: "CWE-78"
  - pattern: "os\\.popen\\s*\\("
    name: "os.popen()"
    risk: "Shell command with pipe"
    severity: "CRITICAL"
    cwe: "CWE-78"
  - pattern: "os\\.exec[lv]p?e?\\s*\\("
    name: "os.exec*()"
    risk: "Process replacement"
    severity: "CRITICAL"
    cwe: "CWE-78"
  - pattern: "os\\.spawn[lv]p?e?\\s*\\("
    name: "os.spawn*()"
    risk: "Process spawning"
    severity: "CRITICAL"
    cwe: "CWE-78"
  - pattern: "subprocess\\.(?:call|run|Popen|check_output|check_call|getoutput|getstatusoutput)\\s*\\("
    name: "subprocess.*"
    risk: "Subprocess execution"
    severity: "CRITICAL"
    cwe: "CWE-78"
  - pattern: "os\\.remove\\s*\\("
    name: "os.remove()"
    risk: "File deletion"
    severity: "HIGH"
    cwe: "CWE-73"
  - pattern: "os\\.unlink\\s*\\("
    name: "os.unlink()"
    risk: "File unlinking"
    severity: "HIGH"
    cwe: "CWE-73"
  - pattern: "os\\.rmdir\\s*\\("
    name: "os.rmdir()"
    risk: "Directory deletion"
    severity: "HIGH"
    cwe: "CWE-73"
  - pattern: "os\\.chmod\\s*\\("
    name: "os.chmod()"
    risk: "Permission modification"
    severity: "HIGH"
    cwe: "CWE-732"
  - pattern: "os\\.chown\\s*\\("
    name: "os.chown()"
    risk: "Ownership modification"
    severity: "HIGH"
    cwe: "CWE-732"
  - pattern: "shutil\\.rmtree\\s*\\("
    name: "shutil.rmtree()"
    risk: "Recursive directory deletion"
    severity: "CRITICAL"
    cwe: "CWE-73"
  - pattern: "os\\.kill\\s*\\("
    name: "os.kill()"
    risk: "Process signal sending"
    severity: "HIGH"
    cwe: "CWE-78"
  - pattern: "os\\.setuid\\s*\\("
    name: "os.setuid()"
    risk: "UID change — privilege escalation"
    severity: "CRITICAL"
    cwe: "CWE-250"
  - pattern: "os\\.setgid\\s*\\("
    name: "os.setgid()"
    risk: "GID change — privilege escalation"
    severity: "CRITICAL"
    cwe: "CWE-250"
  - pattern: "os\\.environ\\s*\\["
    name: "os.environ[]"
    risk: "Environment variable access — credential leakage"
    severity: "MEDIUM"
    cwe: "CWE-200"
  - pattern: "os\\.putenv\\s*\\("
    name: "os.putenv()"
    risk: "Environment variable mutation"
    severity: "MEDIUM"
    cwe: "CWE-94"
  - pattern: "os\\.chroot\\s*\\("
    name: "os.chroot()"
    risk: "Change root directory — jail escape"
    severity: "CRITICAL"
    cwe: "CWE-250"
  - pattern: "os\\.fork\\s*\\("
    name: "os.fork()"
    risk: "Process forking"
    severity: "HIGH"
    cwe: "CWE-78"
  - pattern: "os\\.symlink\\s*\\("
    name: "os.symlink()"
    risk: "Symbolic link creation — path traversal"
    severity: "HIGH"
    cwe: "CWE-59"
  - pattern: "os\\.link\\s*\\("
    name: "os.link()"
    risk: "Hard link creation"
    severity: "MEDIUM"
    cwe: "CWE-59"

unsafe_ml_ops:
  - pattern: "torch\\.load\\s*\\("
    name: "torch.load()"
    risk: "Pickle deserialization — use weights_only=True"
    severity: "CRITICAL"
    cwe: "CWE-502"
  - pattern: "pickle\\.load\\s*\\("
    name: "pickle.load()"
    risk: "Arbitrary code execution"
    severity: "CRITICAL"
    cwe: "CWE-502"
  - pattern: "pickle\\.loads\\s*\\("
    name: "pickle.loads()"
    risk: "Arbitrary code execution from bytes"
    severity: "CRITICAL"
    cwe: "CWE-502"
  - pattern: "joblib\\.load\\s*\\("
    name: "joblib.load()"
    risk: "Pickle-based deserialization"
    severity: "CRITICAL"
    cwe: "CWE-502"
  - pattern: "dill\\.load\\s*\\("
    name: "dill.load()"
    risk: "Extended pickle deserialization"
    severity: "CRITICAL"
    cwe: "CWE-502"
  - pattern: "cloudpickle\\.load\\s*\\("
    name: "cloudpickle.load()"
    risk: "Extended pickle deserialization"
    severity: "CRITICAL"
    cwe: "CWE-502"
  - pattern: "trust_remote_code\\s*=\\s*True"
    name: "trust_remote_code=True"
    risk: "Executes arbitrary remote code"
    severity: "CRITICAL"
    cwe: "CWE-94"
  - pattern: "\\.from_pretrained\\s*\\([^)]*trust_remote_code"
    name: "from_pretrained(trust_remote_code)"
    risk: "Arbitrary code in model repo"
    severity: "CRITICAL"
    cwe: "CWE-94"
  - pattern: "requests\\.get\\s*\\([^)]*verify\\s*=\\s*False"
    name: "verify=False"
    risk: "SSL verification disabled"
    severity: "HIGH"
    cwe: "CWE-295"
  - pattern: "ssl\\._create_unverified_context"
    name: "unverified SSL"
    risk: "SSL verification bypass"
    severity: "HIGH"
    cwe: "CWE-295"
  - pattern: "torch\\.jit\\.load\\s*\\("
    name: "torch.jit.load()"
    risk: "TorchScript deserialization"
    severity: "HIGH"
    cwe: "CWE-502"
  - pattern: "tf\\.saved_model\\.load\\s*\\("
    name: "tf.saved_model.load()"
    risk: "TF SavedModel — may contain custom ops"
    severity: "HIGH"
    cwe: "CWE-502"
  - pattern: "onnx\\.load\\s*\\("
    name: "onnx.load()"
    risk: "ONNX model deserialization — may contain custom ops"
    severity: "HIGH"
    cwe: "CWE-502"
  - pattern: "keras\\.models\\.load_model\\s*\\("
    name: "keras.models.load_model()"
    risk: "Keras model loading — lambda layers may execute code"
    severity: "HIGH"
    cwe: "CWE-502"
  - pattern: "numpy\\.load\\s*\\([^)]*allow_pickle\\s*=\\s*True"
    name: "numpy.load(allow_pickle=True)"
    risk: "NumPy pickle deserialization"
    severity: "CRITICAL"
    cwe: "CWE-502"
  - pattern: "xgboost\\.Booster\\s*\\(\\s*model_file"
    name: "xgboost.Booster(model_file)"
    risk: "XGBoost model loading from untrusted source"
    severity: "MEDIUM"
    cwe: "CWE-502"
  - pattern: "catboost\\.CatBoostClassifier\\s*\\(\\s*\\)\\.load_model"
    name: "CatBoost.load_model()"
    risk: "CatBoost model deserialization"
    severity: "MEDIUM"
    cwe: "CWE-502"
  # --- Additional ML/AI ops ---
  - pattern: "lightgbm\\.Booster\\s*\\(\\s*model_file"
    name: "lightgbm.Booster(model_file)"
    risk: "LightGBM model loading"
    severity: "MEDIUM"
    cwe: "CWE-502"
  - pattern: "transformers\\.pipeline\\s*\\([^)]*trust_remote_code"
    name: "pipeline(trust_remote_code)"
    risk: "HuggingFace pipeline with remote code"
    severity: "CRITICAL"
    cwe: "CWE-94"
  - pattern: "huggingface_hub\\.hf_hub_download\\s*\\("
    name: "hf_hub_download()"
    risk: "Unverified model download from Hub"
    severity: "MEDIUM"
    cwe: "CWE-494"
  - pattern: "mlflow\\.pyfunc\\.load_model\\s*\\("
    name: "mlflow.pyfunc.load_model()"
    risk: "MLflow model load — may contain arbitrary code"
    severity: "HIGH"
    cwe: "CWE-502"
  - pattern: "bentoml\\.load\\s*\\("
    name: "bentoml.load()"
    risk: "BentoML model loading"
    severity: "HIGH"
    cwe: "CWE-502"
  - pattern: "yaml\\.load\\s*\\([^)]*$"
    name: "yaml.load() (unsafe)"
    risk: "Unsafe YAML load — use yaml.safe_load"
    severity: "CRITICAL"
    cwe: "CWE-502"
  - pattern: "yaml\\.load\\s*\\([^)]*Loader\\s*=\\s*yaml\\.(?:Full|Unsafe)Loader"
    name: "yaml.load(FullLoader)"
    risk: "YAML FullLoader — arbitrary object construction"
    severity: "CRITICAL"
    cwe: "CWE-502"
  - pattern: "yaml\\.unsafe_load\\s*\\("
    name: "yaml.unsafe_load()"
    risk: "Explicitly unsafe YAML loading"
    severity: "CRITICAL"
    cwe: "CWE-502"

network_ops:
  - pattern: "urllib\\.request\\.urlopen\\s*\\("
    name: "urlopen()"
    risk: "Unvalidated URL fetch"
    severity: "MEDIUM"
    cwe: "CWE-918"
  - pattern: "requests\\.(?:get|post|put|delete|patch|head|options)\\s*\\("
    name: "requests.*"
    risk: "HTTP request in notebook"
    severity: "MEDIUM"
    cwe: "CWE-918"
  - pattern: "wget\\.download\\s*\\("
