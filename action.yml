name: "Eresus Sentinel Security Scan"
description: "Run Eresus Sentinel security scans (SAST, artifact, firewall, AIBOM, red team) in CI/CD pipelines."
author: "Eresus Security"

branding:
  icon: "shield"
  color: "red"

inputs:
  scan-path:
    description: "Path to scan (default: repository root)"
    required: false
    default: "."
  fail-on-severity:
    description: "Minimum severity that causes a non-zero exit code (critical|high|medium|low)"
    required: false
    default: "high"
  format:
    description: "Output format: sarif|json|html|junit|csv|markdown (default: sarif)"
    required: false
    default: "sarif"
  output-file:
    description: "Write report to this file (default: sentinel-results.<format>)"
    required: false
    default: ""
  extra-args:
    description: "Additional arguments passed verbatim to sentinel scan"
    required: false
    default: ""
  enable-aibom:
    description: "Also run sentinel aibom and upload AIBOM artifact"
    required: false
    default: "false"
  upload-sarif:
    description: "Upload SARIF to GitHub Code Scanning (requires write permissions)"
    required: false
    default: "true"
  sentinel-version:
    description: "Eresus Sentinel version to install (default: latest)"
    required: false
    default: "latest"
  eval-config:
    description: "Path to eval YAML config file. When set, run sentinel evaluate after the scan."
    required: false
    default: ""
  fail-on-threshold:
    description: "Minimum eval pass rate (0.0–1.0) that causes a non-zero exit code. Only used when eval-config is set."
    required: false
    default: "0.0"
  pr-comment:
    description: "Post a summary comment on the PR with finding counts and eval results (requires pull-requests: write)"
    required: false
    default: "true"
  max-concurrency:
    description: "Maximum number of parallel eval workers (default: 4)"
    required: false
    default: "4"

outputs:
  sarif-file:
    description: "Path to the generated SARIF file"
    value: ${{ steps.scan.outputs.sarif-file }}
  finding-count:
    description: "Total number of findings"
    value: ${{ steps.scan.outputs.finding-count }}
  exit-code:
    description: "Sentinel exit code (0=clean, 1=findings above threshold, 2=error)"
    value: ${{ steps.scan.outputs.exit-code }}

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install Eresus Sentinel
      shell: bash
      run: |
        if [ "${{ inputs.sentinel-version }}" = "latest" ]; then
          pip install --quiet eresus-sentinel
        else
          pip install --quiet "eresus-sentinel==${{ inputs.sentinel-version }}"
        fi

    - name: Determine output file
      id: output-file
      shell: bash
      run: |
        OUT="${{ inputs.output-file }}"
        if [ -z "$OUT" ]; then
          OUT="sentinel-results.${{ inputs.format }}"
        fi
        echo "path=$OUT" >> "$GITHUB_OUTPUT"

    - name: Run Sentinel scan
      id: scan
      shell: bash
      run: |
        SARIF_FILE="sentinel-results.sarif"
        OUT_FILE="${{ steps.output-file.outputs.path }}"

        EXIT_CODE=0
        sentinel scan \
          "${{ inputs.scan-path }}" \
          --format "${{ inputs.format }}" \
          --output "$OUT_FILE" \
          --fail-on "${{ inputs.fail-on-severity }}" \
          --ci \
          ${{ inputs.extra-args }} \
          || EXIT_CODE=$?

        if [ "${{ inputs.format }}" != "sarif" ]; then
          sentinel scan \
            "${{ inputs.scan-path }}" \
            --format sarif \
            --output "$SARIF_FILE" \
            --ci 2>/dev/null || true
        else
          SARIF_FILE="$OUT_FILE"
        fi

        FINDING_COUNT=$(python3 -c "
        import json, sys
        try:
            with open('$SARIF_FILE') as f:
                d = json.load(f)
            count = sum(len(r.get('results', [])) for r in d.get('runs', []))
            print(count)
        except Exception:
            print(0)
        " 2>/dev/null || echo "0")

        echo "sarif-file=$SARIF_FILE" >> "$GITHUB_OUTPUT"
        echo "finding-count=$FINDING_COUNT" >> "$GITHUB_OUTPUT"
        echo "exit-code=$EXIT_CODE" >> "$GITHUB_OUTPUT"

        exit $EXIT_CODE

    - name: Run AIBOM scan
      if: inputs.enable-aibom == 'true'
      shell: bash
      run: |
        sentinel aibom "${{ inputs.scan-path }}" \
          --format cyclonedx \
          --output sentinel-aibom.json \
          --ci 2>/dev/null || true

    - name: Upload SARIF to GitHub Code Scanning
      if: inputs.upload-sarif == 'true' && always()
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: ${{ steps.scan.outputs.sarif-file }}
        category: "eresus-sentinel"
      continue-on-error: true

    - name: Run eval gate
      id: eval
      if: inputs.eval-config != ''
      shell: bash
      run: |
        EVAL_EXIT=0
        sentinel evaluate "${{ inputs.eval-config }}" \
          --workers "${{ inputs.max-concurrency }}" \
          --format json \
          --output sentinel-eval.json \
          2>/dev/null || EVAL_EXIT=$?

        PASS_RATE="0.0"
        if [ -f sentinel-eval.json ]; then
          PASS_RATE=$(python3 -c "
        import json, sys
        try:
            d = json.load(open('sentinel-eval.json'))
            total = d.get('total', 1) or 1
            passed = d.get('passed', 0)
            print(round(passed / total, 4))
        except Exception:
            print(0.0)
        " 2>/dev/null || echo "0.0")
        fi

        echo "pass-rate=$PASS_RATE" >> "$GITHUB_OUTPUT"
        echo "eval-exit=$EVAL_EXIT" >> "$GITHUB_OUTPUT"

        THRESHOLD="${{ inputs.fail-on-threshold }}"
        BELOW=$(python3 -c "print('true' if float('$PASS_RATE') < float('$THRESHOLD') else 'false')" 2>/dev/null || echo "false")
        if [ "$BELOW" = "true" ]; then
          echo "::error::Eval pass rate $PASS_RATE is below threshold $THRESHOLD"
          exit 1
        fi

    - name: Post PR comment
      if: >
        always() &&
        inputs.pr-comment == 'true' &&
        github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const findingCount = '${{ steps.scan.outputs.finding-count }}' || '0';
          const exitCode     = '${{ steps.scan.outputs.exit-code }}' || '0';
          const passRate     = '${{ steps.eval.outputs.pass-rate }}' || '';
          const evalConfig   = '${{ inputs.eval-config }}';
          const threshold    = '${{ inputs.fail-on-threshold }}';
          const status       = exitCode === '0' ? '✅ Clean' : '⚠️ Findings';

          let body = `## 🛡️ Eresus Sentinel — Security Scan Summary\n\n`;
          body += `| | |\n|---|---|\n`;
          body += `| **Status** | ${status} |\n`;
          body += `| **Findings** | ${findingCount} |\n`;
          body += `| **Severity gate** | \`${{ inputs.fail-on-severity }}\` |\n`;

          if (evalConfig) {
            const evalStatus = passRate && parseFloat(passRate) >= parseFloat(threshold || '0')
              ? '✅ Pass' : '❌ Fail';
            body += `| **Eval pass rate** | ${passRate} (threshold: ${threshold}) ${evalStatus} |\n`;
          }

          body += `\n<details><summary>SARIF report</summary>\n\n`;
          body += `Uploaded to GitHub Security tab as \`eresus-sentinel\`.\n\n</details>\n`;
          body += `\n> Generated by [Eresus Sentinel](https://github.com/EresusSecurity/Eresus-sentinel) v${{ inputs.sentinel-version }}`;

          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });

          const existing = comments.find(c =>
            c.user.login === 'github-actions[bot]' &&
            c.body.includes('Eresus Sentinel')
          );

          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
          }

    - name: Upload report artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: sentinel-report
        path: |
          ${{ steps.output-file.outputs.path }}
          sentinel-results.sarif
          sentinel-aibom.json
          sentinel-eval.json
        if-no-files-found: ignore
        retention-days: 30
