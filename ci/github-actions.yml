# ============================================================================
# Eresus Sentinel — GitHub Actions CI Integration
# ============================================================================
#
# Copy this file to .github/workflows/eresus-sentinel.yml in a consumer repo.
# The template keeps live/network scans out of the default path and verifies
# installability before running security smoke checks.
# ============================================================================

name: Eresus Sentinel CI

on:
  pull_request:
    branches: [main, master, develop]
  push:
    branches: [main, master]

permissions:
  contents: read
  pull-requests: write

jobs:
  fast-tests:
    name: Python ${{ matrix.python-version }} fast tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run fast test gate
        env:
          SENTINEL_OFFLINE: "1"
          HF_HUB_OFFLINE: "1"
        run: |
          python -m pytest \
            tests/test_cli_parser_regressions.py \
            tests/test_firewall.py \
            tests/test_artifact_hardening.py \
            tests/test_mcp_proxy_runtime.py \
            tests/test_sast.py \
            -q

      - name: CLI machine-output smoke
        run: |
          sentinel rules list -f json > rules.json
          python -m json.tool rules.json >/dev/null
          sentinel scan . -f sarif > scan.sarif || test "$?" = "1"
          python -m json.tool scan.sarif >/dev/null

  optional-extras:
    name: Optional extra ${{ matrix.extra }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        extra: ["firewall", "api", "hf", "analysis", "archive", "rust"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install optional extra
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[${{ matrix.extra }}]"

      - name: Import smoke
        run: |
          python - <<'PY'
          import sentinel
          print(sentinel.__version__)
          PY

  package-smoke:
    name: Wheel and source distribution smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build distributions
        run: |
          python -m pip install --upgrade pip build twine
          python -m build --sdist --wheel
          python -m twine check dist/*

      - name: Install wheel and run CLI smoke
        run: |
          python -m pip install dist/*.whl
          sentinel --help >/dev/null
          sentinel rules list -f json > rules.json
          python -m json.tool rules.json >/dev/null

  diff-security:
    name: PR diff security scan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Sentinel
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Scan PR diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD | sentinel diff -
