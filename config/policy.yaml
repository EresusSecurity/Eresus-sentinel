# ── Eresus Sentinel Policy ──────────────────────────────────────────
# Default production policy. Override per environment.
# See docs/RULES.md for scanner configuration details.

name: production
version: "1.0"
environment: production
mode: enforce        # enforce | audit | disabled
global_threshold: 0.5
max_risk_score: 0.9
fail_open: false
audit_all: true

input_scanners:
  - scanner: injection
    enabled: true
    priority: 10
    threshold: 0.85
    on_fail: block
  - scanner: invisible
    enabled: true
    priority: 20
    on_fail: block
  - scanner: heuristic
    enabled: true
    priority: 30
    on_fail: warn
  - scanner: encoding
    enabled: true
    priority: 40
    on_fail: block
  - scanner: toxicity
    enabled: true
    priority: 50
    threshold: 0.7
    on_fail: block
  - scanner: secrets
    enabled: true
    priority: 60
    on_fail: redact
  - scanner: data_exfiltration
    enabled: true
    priority: 65
    on_fail: block
  - scanner: ban_substrings
    enabled: true
    priority: 70
    on_fail: block
  - scanner: gibberish
    enabled: true
    priority: 80
    threshold: 0.7
    on_fail: warn
  - scanner: token_limit
    enabled: true
    priority: 90
    params:
      max_tokens: 4096
    on_fail: block

output_scanners:
  - scanner: toxicity
    enabled: true
    priority: 10
    threshold: 0.7
    on_fail: block
  - scanner: sensitive
    enabled: true
    priority: 20
    on_fail: redact
  - scanner: bias
    enabled: true
    priority: 30
    on_fail: warn
  - scanner: urls
    enabled: true
    priority: 40
    on_fail: block
  - scanner: no_refusal
    enabled: true
    priority: 50
    on_fail: warn
  - scanner: relevance
    enabled: true
    priority: 60
    on_fail: warn
  - scanner: factual_consistency
    enabled: true
    priority: 70
    on_fail: warn

metadata:
  owner: security-team
  review_date: "2026-04-12"
