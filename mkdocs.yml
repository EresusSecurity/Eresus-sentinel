site_name: Eresus Sentinel
site_url: https://eresussec.com/docs
site_description: Production-grade AI/LLM Security Platform
site_author: Eresus Security

repo_url: https://github.com/eresus-security/sentinel
repo_name: eresus-security/sentinel
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: slate
      primary: red
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: red
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github
  font:
    text: Inter
    code: JetBrains Mono

plugins:
  - search
  - git-revision-date-localized:
      enable_creation_date: true
      fallback_to_build_date: true

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - admonition
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Quick Start: QUICKSTART.md
      - Architecture: ARCHITECTURE.md
  - Reference:
      - YAML Rules: RULES.md
  - Development:
      - Contributing: ../CONTRIBUTING.md
      - Security Policy: ../SECURITY.md
      - Changelog: ../CHANGELOG.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/eresus-security/sentinel
    - icon: fontawesome/solid/globe
      link: https://eresussec.com
