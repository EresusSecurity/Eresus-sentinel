# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Eresus Sentinel — Behavioral Analysis Detection Patterns
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
# ALL detection patterns live here. behavioral_analyzer.py loads this
# file at import time and compiles the regexes once.
#
# Entry format per category:
#   - pattern: <regex>
#     rule_id: <unique identifier>
#     severity: CRITICAL | HIGH | MEDIUM | LOW
#     cwe: <CWE-xxx>
#
# Override: SENTINEL_BEHAVIOR_PATTERNS_PATH env var to point at a
#           custom copy of this file.
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

command_injection:
  - {pattern: ';\s*(?:rm|cat|curl|wget|nc|ncat|netcat|socat)\b', rule_id: shell_command_chain, severity: CRITICAL, cwe: CWE-78}
  - {pattern: '\|\s*(?:bash|sh|zsh|ksh|dash|csh|tcsh|fish)\b', rule_id: pipe_to_shell, severity: CRITICAL, cwe: CWE-78}
  - {pattern: '`[^`]+`', rule_id: backtick_execution, severity: CRITICAL, cwe: CWE-78}
  - {pattern: '\$\([^)]+\)', rule_id: command_substitution, severity: CRITICAL, cwe: CWE-78}
  - {pattern: '&&\s*(?:rm|curl|wget|nc|python|perl|ruby|php|node)\b', rule_id: chained_command, severity: CRITICAL, cwe: CWE-78}
  - {pattern: '\|\|\s*(?:rm|curl|wget|nc|python|perl|ruby|php|node)\b', rule_id: fallback_command, severity: HIGH, cwe: CWE-78}
  - {pattern: '>\s*/(?:etc|tmp|var|dev|proc)/', rule_id: redirect_to_system, severity: CRITICAL, cwe: CWE-78}
  - {pattern: ';\s*(?:chmod|chown|chgrp)\s+', rule_id: permission_cmd_chain, severity: HIGH, cwe: CWE-78}
  - {pattern: ';\s*(?:useradd|usermod|passwd|groupadd)\s+', rule_id: user_mgmt_cmd_chain, severity: CRITICAL, cwe: CWE-78}
  - {pattern: ';\s*(?:iptables|ufw|firewall-cmd|nft)\s+', rule_id: firewall_cmd_chain, severity: CRITICAL, cwe: CWE-78}
  - {pattern: ';\s*(?:crontab|at|batch)\s+', rule_id: scheduled_cmd_chain, severity: HIGH, cwe: CWE-78}
  - {pattern: ';\s*(?:mount|umount|fdisk|mkfs)\s+', rule_id: disk_cmd_chain, severity: CRITICAL, cwe: CWE-78}
  - {pattern: '\bnohup\s+', rule_id: nohup_background, severity: HIGH, cwe: CWE-78}
  - {pattern: '&\s*$', rule_id: background_execution, severity: MEDIUM, cwe: CWE-78}
  - {pattern: ';\s*(?:python[23]?|perl|ruby|php|node|lua)\s+-[ce]\s+', rule_id: interpreter_exec, severity: CRITICAL, cwe: CWE-78}
  - {pattern: '\bxargs\s+', rule_id: xargs_expansion, severity: MEDIUM, cwe: CWE-78}
  - {pattern: ';\s*(?:kill|pkill|killall)\s+', rule_id: process_kill_chain, severity: HIGH, cwe: CWE-78}
  - {pattern: '\benv\s+\w+=.*\b(?:bash|sh|python)\b', rule_id: env_injection, severity: CRITICAL, cwe: CWE-78}
  - {pattern: '\$\{[^}]*(?:curl|wget|nc|bash|sh)[^}]*\}', rule_id: brace_expansion_exec, severity: CRITICAL, cwe: CWE-78}
  - {pattern: '<\(\s*(?:curl|wget|nc|bash|sh)', rule_id: process_substitution, severity: CRITICAL, cwe: CWE-78}
  - {pattern: '\beval\s+', rule_id: eval_invocation, severity: CRITICAL, cwe: CWE-78}
  - {pattern: '\bsource\s+/dev/tcp/', rule_id: bash_tcp_redirect, severity: CRITICAL, cwe: CWE-78}
  - {pattern: '/dev/tcp/\d+\.\d+\.\d+\.\d+/\d+', rule_id: bash_dev_tcp, severity: CRITICAL, cwe: CWE-78}
  - {pattern: '/dev/udp/\d+\.\d+\.\d+\.\d+/\d+', rule_id: bash_dev_udp, severity: CRITICAL, cwe: CWE-78}
  - {pattern: '\bpython[23]?\s+.*-c\s', rule_id: python_inline_exec, severity: HIGH, cwe: CWE-78}
  - {pattern: '\bnode\s+.*(?:-e|--eval)\s', rule_id: node_inline_exec, severity: HIGH, cwe: CWE-78}
  - {pattern: '\bruby\s+.*-e\s', rule_id: ruby_inline_exec, severity: HIGH, cwe: CWE-78}
  - {pattern: '\bperl\s+.*-e\s', rule_id: perl_inline_exec, severity: HIGH, cwe: CWE-78}
  - {pattern: '\bfind\s+.*-exec(?:dir)?\s', rule_id: find_exec, severity: HIGH, cwe: CWE-78}
  - {pattern: '\b(?:less|more|man)\s+.*!\s*/bin/', rule_id: pager_shell_escape, severity: HIGH, cwe: CWE-78}
  - {pattern: '\bawk\s+.*system\s*\(', rule_id: awk_system_call, severity: HIGH, cwe: CWE-78}
  - {pattern: '\bsed\s+.*e\s', rule_id: sed_exec_flag, severity: HIGH, cwe: CWE-78}
  - {pattern: '\btar\s+.*--checkpoint-action', rule_id: tar_checkpoint_exec, severity: HIGH, cwe: CWE-78}
  - {pattern: '\bgit\s+(?:clone|remote\s+add)\s+.*[;&|]', rule_id: git_chain_exec, severity: HIGH, cwe: CWE-78}
  - {pattern: '\bpip[3]?\s+install\s+(?:--index-url|--extra-index-url|-i)\s', rule_id: pip_untrusted_index, severity: HIGH, cwe: CWE-78}
  - {pattern: '\bdocker\s+exec\b', rule_id: docker_exec, severity: HIGH, cwe: CWE-78}
  - {pattern: '\bdocker\s+run\s+.*--privileged', rule_id: docker_privileged_run, severity: CRITICAL, cwe: CWE-78}
  - {pattern: '\bkubectl\s+exec\b', rule_id: kubectl_exec, severity: HIGH, cwe: CWE-78}
  - {pattern: '\bnsenter\b', rule_id: nsenter_escape, severity: CRITICAL, cwe: CWE-78}
  - {pattern: '\bchroot\b', rule_id: chroot_escape, severity: HIGH, cwe: CWE-78}
  - {pattern: '\bpowershell\s+-(?:enc|encodedcommand)\s+', rule_id: powershell_encoded_cmd, severity: CRITICAL, cwe: CWE-78}
  - {pattern: '\bwmic\s+(?:process|os|service)\s+', rule_id: wmic_abuse, severity: HIGH, cwe: CWE-78}
  - {pattern: '\bcmd\.exe\s+/c\s+', rule_id: cmd_exec, severity: HIGH, cwe: CWE-78}
  - {pattern: '\brundll32\s+', rule_id: rundll32_exec, severity: CRITICAL, cwe: CWE-78}
  - {pattern: '\bregsvr32\s+', rule_id: regsvr32_exec, severity: CRITICAL, cwe: CWE-78}
  - {pattern: '\bmshta\s+', rule_id: mshta_exec, severity: CRITICAL, cwe: CWE-78}
  - {pattern: '\bcertutil\s+-(?:urlcache|decode)\s+', rule_id: certutil_abuse, severity: CRITICAL, cwe: CWE-78}
  - {pattern: '\bbitsadmin\s+/transfer\s+', rule_id: bitsadmin_download, severity: HIGH, cwe: CWE-78}

sql_injection:
  - {pattern: '(?:UNION\\s+(?:ALL\\s+)?SELECT)', rule_id: union_select, severity: CRITICAL, cwe: CWE-89}
  - {pattern: '(?:SELECT\\s+.+\\s+FROM\\s+(?:information_schema|sys\\.|mysql\\.|pg_|sqlite_master))', rule_id: schema_extraction, severity: CRITICAL, cwe: CWE-89}
  - {pattern: '(?:INSERT\\s+INTO|UPDATE\\s+\\w+\\s+SET|DELETE\\s+FROM)\\s+', rule_id: data_manipulation, severity: HIGH, cwe: CWE-89}
  - {pattern: '(?:DROP\\s+(?:TABLE|DATABASE|INDEX|VIEW|SCHEMA))', rule_id: destructive_ddl, severity: CRITICAL, cwe: CWE-89}
  - {pattern: '(?:ALTER\\s+(?:TABLE|USER|ROLE))', rule_id: schema_alteration, severity: HIGH, cwe: CWE-89}
  - {pattern: '(?:CREATE\\s+(?:TABLE|USER|ROLE|FUNCTION|PROCEDURE))', rule_id: object_creation, severity: HIGH, cwe: CWE-89}
  - {pattern: '(?:GRANT\\s+|REVOKE\\s+)', rule_id: privilege_grant, severity: CRITICAL, cwe: CWE-89}
  - {pattern: '(?:EXEC(?:UTE)?\\s+(?:sp_|xp_|master\\.))', rule_id: stored_proc_exec, severity: CRITICAL, cwe: CWE-89}
  - {pattern: '(?:xp_cmdshell|xp_regread|xp_regwrite|xp_fileexist|xp_dirtree)', rule_id: mssql_xp_abuse, severity: CRITICAL, cwe: CWE-89}
  - {pattern: '(?:LOAD_FILE|INTO\\s+(?:OUT|DUMP)FILE)', rule_id: file_access_sql, severity: CRITICAL, cwe: CWE-89}
  - {pattern: '(?:BENCHMARK\s*\(|SLEEP\s*\(|WAITFOR\s+DELAY|pg_sleep)', rule_id: time_based_blind, severity: HIGH, cwe: CWE-89}
  - {pattern: '(?:OR\s+1\s*=\s*1|OR\s+''1''\s*=\s*''1''|OR\s+1--|AND\s+1\s*=\s*1)', rule_id: boolean_blind, severity: HIGH, cwe: CWE-89}
  - {pattern: '(?:''\s*OR\s*''|''\s*AND\s*''|''\s*--\s*$|--\s*$|#\s*$)', rule_id: comment_termination, severity: HIGH, cwe: CWE-89}
  - {pattern: '(?:HAVING\s+\d+\s*=\s*\d+|GROUP\s+BY\s+.+HAVING)', rule_id: having_injection, severity: HIGH, cwe: CWE-89}
  - {pattern: '(?:ORDER\s+BY\s+\d{2,}|ORDER\s+BY\s+\d+\s*(?:--|#))', rule_id: order_by_injection, severity: MEDIUM, cwe: CWE-89}
  - {pattern: '(?:CONCAT\s*\(|GROUP_CONCAT\s*\(|CHAR\s*\()', rule_id: string_function_abuse, severity: MEDIUM, cwe: CWE-89}
  - {pattern: '(?:CONVERT\s*\(|CAST\s*\(.*AS\s+)', rule_id: type_cast_probe, severity: MEDIUM, cwe: CWE-89}
  - {pattern: '(?:IF\s*\(|IIF\s*\(|CASE\s+WHEN)', rule_id: conditional_injection, severity: MEDIUM, cwe: CWE-89}
  - {pattern: "(?:'\\s*;\\s*(?:SELECT|INSERT|UPDATE|DELETE|DROP|CREATE|ALTER|GRANT))", rule_id: stacked_query, severity: CRITICAL, cwe: CWE-89}
  - {pattern: '(?:pg_stat_activity|pg_catalog|pg_shadow|pg_user)', rule_id: pg_system_table, severity: HIGH, cwe: CWE-89}
  - {pattern: '(?:COPY\\s+.+\\s+(?:TO|FROM)\\s+)', rule_id: pg_copy_abuse, severity: CRITICAL, cwe: CWE-89}
  - {pattern: '(?:lo_import|lo_export)', rule_id: pg_large_object, severity: CRITICAL, cwe: CWE-89}
  - {pattern: '(?:UTL_HTTP|UTL_FILE|DBMS_LDAP|DBMS_PIPE)', rule_id: oracle_pkg_abuse, severity: CRITICAL, cwe: CWE-89}
  - {pattern: '(?:v\\$session|v\\$instance|dba_users|all_tables)', rule_id: oracle_sysview, severity: HIGH, cwe: CWE-89}

nosql_injection:
  - {pattern: '\\$(?:gt|gte|lt|lte|ne|eq|in|nin|regex|where|exists|type)\\b', rule_id: mongo_operator, severity: HIGH, cwe: CWE-943}
  - {pattern: '\$(?:or|and|not|nor)\s*:\s*\[', rule_id: mongo_logical_operator, severity: HIGH, cwe: CWE-943}
  - {pattern: '"\$where"\s*:', rule_id: mongo_where_injection, severity: CRITICAL, cwe: CWE-943}
  - {pattern: 'db\.\w+\.(?:find|findOne|update|delete|aggregate|insert)', rule_id: mongo_direct_query, severity: HIGH, cwe: CWE-943}
  - {pattern: '\\{\\s*"\\$(?:lookup|graphLookup|unionWith)"', rule_id: mongo_aggregation_abuse, severity: HIGH, cwe: CWE-943}
  - {pattern: 'this\\.\\w+\\s*==', rule_id: mongo_javascript_injection, severity: CRITICAL, cwe: CWE-943}
  - {pattern: '\\b(?:EVAL|EVALSHA|SCRIPT)\\s+', rule_id: redis_lua_injection, severity: CRITICAL, cwe: CWE-943}
  - {pattern: '\\b(?:CONFIG\\s+SET|SLAVEOF|REPLICAOF)\\b', rule_id: redis_config_abuse, severity: CRITICAL, cwe: CWE-943}

ldap_injection:
  - {pattern: '\)\(\||\)\(&', rule_id: ldap_filter_injection, severity: HIGH, cwe: CWE-90}
  - {pattern: '\*\)\(', rule_id: ldap_wildcard_chain, severity: HIGH, cwe: CWE-90}
  - {pattern: '(?:objectClass|uid|cn|sn|mail)\s*=\s*\*', rule_id: ldap_attribute_enum, severity: MEDIUM, cwe: CWE-90}
  - {pattern: '\x00|\x0a|\x0d', rule_id: ldap_null_byte, severity: HIGH, cwe: CWE-90}

xpath_injection:
  - {pattern: '''\s*or\s+''1''\s*=\s*''1', rule_id: xpath_boolean_bypass, severity: HIGH, cwe: CWE-643}
  - {pattern: '(?:string-length|substring|contains|normalize-space)\s*\(', rule_id: xpath_function_probe, severity: MEDIUM, cwe: CWE-643}
  - {pattern: '(?:count|position|last)\s*\(\s*\)', rule_id: xpath_axis_probe, severity: MEDIUM, cwe: CWE-643}
  - {pattern: '(?:ancestor|descendant|following|preceding)::', rule_id: xpath_axis_traversal, severity: HIGH, cwe: CWE-643}

xss_injection:
  - {pattern: '<script[^>]*>', rule_id: script_tag, severity: HIGH, cwe: CWE-79}
  - {pattern: 'javascript\\s*:', rule_id: javascript_uri, severity: HIGH, cwe: CWE-79}
  - {pattern: 'on(?:load|error|click|mouseover|focus|blur|submit|change|input|keyup|keydown|mouseenter|mouseleave|drag|drop|contextmenu|dblclick|wheel|scroll|touchstart|touchend|animationend|transitionend|pointerdown)\\s*=', rule_id: event_handler, severity: HIGH, cwe: CWE-79}
  - {pattern: '<img\\s+[^>]*(?:src|onerror)\\s*=', rule_id: img_injection, severity: HIGH, cwe: CWE-79}
  - {pattern: '<svg\\s+[^>]*on\\w+\\s*=', rule_id: svg_injection, severity: HIGH, cwe: CWE-79}
  - {pattern: '<iframe\\s+[^>]*src\\s*=', rule_id: iframe_injection, severity: HIGH, cwe: CWE-79}
  - {pattern: '<embed\\s+[^>]*src\\s*=', rule_id: embed_injection, severity: HIGH, cwe: CWE-79}
  - {pattern: '<object\\s+[^>]*data\\s*=', rule_id: object_injection, severity: HIGH, cwe: CWE-79}
  - {pattern: '<link\\s+[^>]*href\\s*=.*javascript', rule_id: link_javascript, severity: HIGH, cwe: CWE-79}
  - {pattern: 'expression\s*\(', rule_id: css_expression, severity: HIGH, cwe: CWE-79}
  - {pattern: 'url\s*\(\s*[''"]*\s*javascript', rule_id: css_javascript, severity: HIGH, cwe: CWE-79}
  - {pattern: '<\\s*/?\\s*(?:script|style|link|meta|base)\\b', rule_id: dangerous_html_tag, severity: MEDIUM, cwe: CWE-79}
  - {pattern: 'data:\\s*text/html', rule_id: data_uri_html, severity: HIGH, cwe: CWE-79}
  - {pattern: 'vbscript\\s*:', rule_id: vbscript_uri, severity: HIGH, cwe: CWE-79}
  - {pattern: '(?:document\\.write|innerHTML|outerHTML|insertAdjacentHTML)\\s*[=(]', rule_id: dom_xss_sink, severity: HIGH, cwe: CWE-79}
  - {pattern: '(?:document\\.cookie|window\\.location|location\\.href|location\\.assign)\\s*=', rule_id: dom_property_write, severity: HIGH, cwe: CWE-79}
  - {pattern: '(?:\.src|\.href|\.action)\\s*=\\s*[''"]*\\s*(?:javascript|data:)', rule_id: attribute_injection, severity: HIGH, cwe: CWE-79}
  - {pattern: '<%.*%>', rule_id: asp_template, severity: MEDIUM, cwe: CWE-79}

path_traversal:
  - {pattern: '\\.\\./', rule_id: dot_dot_traversal, severity: HIGH, cwe: CWE-22}
  - {pattern: '\\.\\.\\\\\\.\\\\', rule_id: backslash_traversal, severity: HIGH, cwe: CWE-22}
  - {pattern: '%2e%2e[/%5c]', rule_id: url_encoded_traversal, severity: HIGH, cwe: CWE-22}
  - {pattern: '\\.\\.%2f|%2e%2e%2f', rule_id: mixed_encoded_traversal, severity: HIGH, cwe: CWE-22}
  - {pattern: '\\.\\.%252f', rule_id: double_encoded_traversal, severity: CRITICAL, cwe: CWE-22}
  - {pattern: '(?:etc/passwd|etc/shadow|etc/hosts|etc/sudoers)', rule_id: sensitive_path_unix, severity: CRITICAL, cwe: CWE-22}
  - {pattern: '(?:windows/system32|windows/win\\.ini|boot\\.ini)', rule_id: sensitive_path_windows, severity: CRITICAL, cwe: CWE-22}
  - {pattern: '(?:proc/self/|proc/version|proc/cmdline|proc/environ)', rule_id: proc_traversal, severity: CRITICAL, cwe: CWE-22}
  - {pattern: '/dev/(?:null|zero|random|urandom|tcp|udp)', rule_id: dev_access, severity: HIGH, cwe: CWE-22}
  - {pattern: '~root/|~admin/|/root/|/home/\\w+/\\.', rule_id: home_dir_access, severity: HIGH, cwe: CWE-22}
  - {pattern: '%00|\\\\x00', rule_id: null_byte_traversal, severity: CRITICAL, cwe: CWE-22}
  - {pattern: '\\\\\\\\[\\w.]+\\\\', rule_id: unc_path_access, severity: HIGH, cwe: CWE-22}
  - {pattern: '\\.\\.(/|\\\\\\\\)', rule_id: archive_slip, severity: HIGH, cwe: CWE-22}

ssrf:
  - {pattern: '(?:127\\.0\\.0\\.1|localhost|0\\.0\\.0\\.0|::1|0x7f000001)', rule_id: localhost_access, severity: HIGH, cwe: CWE-918}
  - {pattern: '(?:169\\.254\\.169\\.254|metadata\\.google|metadata\\.azure|metadata\\.aws)', rule_id: cloud_metadata, severity: CRITICAL, cwe: CWE-918}
  - {pattern: '(?:10\\.\\d+\\.\\d+\\.\\d+|172\\.(?:1[6-9]|2\\d|3[01])\\.\\d+\\.\\d+|192\\.168\\.\\d+\\.\\d+)', rule_id: private_ip, severity: HIGH, cwe: CWE-918}
  - {pattern: '(?:file://|gopher://|dict://|ftp://|ldap://|tftp://|jar://)', rule_id: dangerous_scheme, severity: CRITICAL, cwe: CWE-918}
  - {pattern: '(?:http://0x|http://0\\d+|http://\\d{8,})', rule_id: ip_encoding_bypass, severity: CRITICAL, cwe: CWE-918}
  - {pattern: 'http://\[::(?:ffff:)?(?:127|10|172|192)\.\d', rule_id: ipv6_mapped_bypass, severity: CRITICAL, cwe: CWE-918}
  - {pattern: '(?:localtest\\.me|spoofed\\.|nip\\.io|xip\\.io|sslip\\.io|lvh\\.me|vcap\\.me)', rule_id: dns_rebinding, severity: CRITICAL, cwe: CWE-918}
  - {pattern: 'http://(?:0|0x0|0000)(?:\\b|/)', rule_id: zero_ip_bypass, severity: HIGH, cwe: CWE-918}
  - {pattern: 'http://\\d+\\.\\d+\\.\\d+\\.\\d+:\\d{4,5}/', rule_id: explicit_port_internal, severity: MEDIUM, cwe: CWE-918}
  - {pattern: '(?:consul|vault|etcd|redis|memcached|elasticsearch|kibana|grafana|prometheus):', rule_id: service_discovery, severity: HIGH, cwe: CWE-918}
  - {pattern: '(?:kubernetes|k8s|kube-dns|cluster\\.local|svc\\.cluster):', rule_id: k8s_service_access, severity: CRITICAL, cwe: CWE-918}
  - {pattern: '\\[?::1\\]?', rule_id: ipv6_loopback, severity: HIGH, cwe: CWE-918}
  - {pattern: '\\[?0:0:0:0:0:0:0:1\\]?', rule_id: ipv6_full_loopback, severity: HIGH, cwe: CWE-918}
  - {pattern: '169\\.254\\.169\\.254/latest/meta-data', rule_id: aws_imds_v1, severity: CRITICAL, cwe: CWE-918}
  - {pattern: 'metadata\\.google\\.internal', rule_id: gcp_metadata, severity: CRITICAL, cwe: CWE-918}
  - {pattern: '169\\.254\\.169\\.254/metadata/instance', rule_id: azure_imds, severity: CRITICAL, cwe: CWE-918}
  - {pattern: '(?:ecs\\.amazonaws\\.com|container\\.googleapis\\.com)', rule_id: cloud_container_metadata, severity: CRITICAL, cwe: CWE-918}

ssti:
  - {pattern: '\\$\\{.*?\\}', rule_id: dollar_brace_interp, severity: HIGH, cwe: CWE-1336}
  - {pattern: '\\{\\{.*?\\}\\}', rule_id: double_brace_interp, severity: HIGH, cwe: CWE-1336}
  - {pattern: '\\{%.*?%\\}', rule_id: jinja_tag, severity: HIGH, cwe: CWE-1336}
  - {pattern: '#\\{.*?\\}', rule_id: ruby_interp, severity: HIGH, cwe: CWE-1336}
  - {pattern: '\$\{T\(java\.lang\.', rule_id: spring_el_injection, severity: CRITICAL, cwe: CWE-1336}
  - {pattern: '__class__\.__mro__', rule_id: python_mro_traversal, severity: CRITICAL, cwe: CWE-1336}
  - {pattern: '__globals__\[', rule_id: python_globals_access, severity: CRITICAL, cwe: CWE-1336}
  - {pattern: '__builtins__', rule_id: python_builtins_access, severity: CRITICAL, cwe: CWE-1336}
  - {pattern: 'lipsum\.__globals__', rule_id: jinja2_rce, severity: CRITICAL, cwe: CWE-1336}
  - {pattern: 'config\.__class__\.__init__\.__globals__', rule_id: flask_config_rce, severity: CRITICAL, cwe: CWE-1336}
  - {pattern: 'request\.__class__\.__mro__', rule_id: flask_request_rce, severity: CRITICAL, cwe: CWE-1336}
  - {pattern: '\$\{T\(java\.lang\.Runtime\)', rule_id: java_runtime_ssti, severity: CRITICAL, cwe: CWE-1336}
  - {pattern: '__import__\s*\(', rule_id: python_import_ssti, severity: CRITICAL, cwe: CWE-1336}
  - {pattern: '(?:get_flashed_messages|url_for|config)\.__', rule_id: flask_dunder_access, severity: CRITICAL, cwe: CWE-1336}
  - {pattern: '<#assign\s+.*=\s*.*\.getRuntime', rule_id: freemarker_rce, severity: CRITICAL, cwe: CWE-1336}
  - {pattern: '#set\s*\(\s*\$\w+\s*=\s*.*getClass', rule_id: velocity_rce, severity: CRITICAL, cwe: CWE-1336}

encoding_evasion:
  case_sensitive: true
  patterns:
    - {pattern: '\\\\x[0-9a-fA-F]{2}', rule_id: hex_encoding, severity: MEDIUM, cwe: CWE-116}
    - {pattern: '%[0-9a-fA-F]{2}', rule_id: url_encoding, severity: MEDIUM, cwe: CWE-116}
    - {pattern: '\\\\u[0-9a-fA-F]{4}', rule_id: unicode_escape, severity: MEDIUM, cwe: CWE-116}
