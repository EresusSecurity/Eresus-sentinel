# ── Pickle Evasion Patterns ──
pickle_evasion:
  - {pattern: '\b(?:_run_code|execWrapper|runstring)\s*\(', rule_id: hidden_exec_wrapper, severity: CRITICAL, cwe: CWE-94}
  - {pattern: '\b(?:torch\._dynamo|torch\._inductor|torch\.jit|numpy\.f2py|numpy\.distutils)\b', rule_id: unsafe_ml_module, severity: HIGH, cwe: CWE-502}
  - {pattern: '\btorch\.utils\._config_module\.ConfigModule\b', rule_id: torch_config_exploit, severity: HIGH, cwe: CWE-502}
  - {pattern: '\bnumpy\.testing\._private\.utils\.runstring\b', rule_id: numpy_runstring, severity: CRITICAL, cwe: CWE-94}

discovery_indicators:
  - list_tools
  - get_tools
  - list_functions
  - get_functions
  - describe_tool
  - tool_info
  - help
  - schema
  - openapi
  - list_resources
  - list_prompts
  - __tools__
  - get_capabilities
  - describe_capabilities
  - __dir__
  - inspect
  - reflect
  - enumerate_tools
  - available_tools
  - tool_catalog
  - tool_registry
  - get_schema
  - list_endpoints
  - describe_api
  - swagger
  - graphql_introspection
  - __spec__
  - list_methods
  - get_methods
  - capabilities
  - tools/list
  - resources/list
  - prompts/list
  - mcp/list_tools
  - get_tool_schema
