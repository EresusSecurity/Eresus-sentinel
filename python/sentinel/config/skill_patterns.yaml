# ── COMMAND SAFETY TIERS ─────────────────────────────────────────────
dangerous_commands:
  CRITICAL:
    - pattern: "\\brm\\s+-rf\\s+/"
      description: "Recursive root delete"
    - pattern: "\\brm\\s+-rf\\s+~"
      description: "Recursive home delete"
    - pattern: "\\brm\\s+-rf\\s+\\*"
      description: "Recursive wildcard delete"
    - pattern: "\\bmkfs\\b"
      description: "Filesystem format"
    - pattern: "\\bdd\\s+if="
      description: "Raw disk write"
    - pattern: "\\bformat\\b.*\\bc:"
      description: "Windows format drive"
    - pattern: "\\bchmod\\s+777\\b"
      description: "World-writeable permissions"
    - pattern: "\\bcurl\\b.*\\|\\s*(?:bash|sh|zsh|ksh)"
      description: "Pipe to shell"
    - pattern: "\\bwget\\b.*\\|\\s*(?:bash|sh|zsh|ksh)"
      description: "Wget pipe to shell"
    - pattern: "\\bnc\\s+-[el]"
      description: "Netcat listener"
    - pattern: "\\bncat\\b.*-e"
      description: "Ncat exec"
    - pattern: "\\bsocat\\b.*EXEC:"
      description: "Socat exec"
    - pattern: "\\bpython[23]?\\b.*-c.*(?:import\\s+os|exec\\(|eval\\()"
      description: "Python inline exec"
    - pattern: "\\bperl\\b.*-e.*(?:system|exec|reverse)"
      description: "Perl inline exec"
    - pattern: "\\bruby\\b.*-e.*(?:system|exec|`)"
      description: "Ruby inline exec"
    - pattern: "\\bphp\\b.*-r.*(?:system|exec|passthru|shell_exec)"
      description: "PHP inline exec"
    - pattern: "\\bnode\\b.*-e.*(?:require\\('child_process'\\)|exec)"
      description: "Node inline exec"
    - pattern: "\\blua\\b.*-e.*os\\.execute"
      description: "Lua inline exec"
    - pattern: "\\beval\\s*\\("
      description: "Eval execution"
    - pattern: "\\bexec\\s*\\("
      description: "Exec execution"
    - pattern: "\\bsource\\s+/dev/tcp/"
      description: "Bash reverse shell"
    - pattern: "/dev/tcp/\\d+\\.\\d+\\.\\d+\\.\\d+/"
      description: "TCP device redirect"
    - pattern: "\\bmkfifo\\b.*\\bnc\\b"
      description: "Named pipe + netcat"
    - pattern: "\\bxterm\\b.*-e.*sh"
      description: "Xterm shell spawn"
    - pattern: "\\btelnet\\b.*\\|\\s*/bin/"
      description: "Telnet pipe to binary"
    - pattern: "\\bpowercat\\b"
      description: "PowerShell reverse shell"
    - pattern: "Invoke-Expression|IEX\\s*\\("
      description: "PowerShell IEX"
    - pattern: "\\bcertutil\\b.*-urlcache"
      description: "CertUtil download"
    - pattern: "\\bbitsadmin\\b.*\\/transfer"
      description: "BitsAdmin download"
    - pattern: "\\brundll32\\b.*javascript"
      description: "Rundll32 JS exec"
    - pattern: "\\bwmic\\b.*process\\s+call"
      description: "WMIC process call"
    - pattern: "\\breg\\s+add\\b.*\\\\Run\\\\"
      description: "Registry persistence"
    - pattern: "\\bschtasks\\b.*\\/create"
      description: "Scheduled task creation"
    - pattern: "\\bjava\\b.*-jar.*\\bhttp[s]?://"
      description: "Remote JAR execution"
    - pattern: "\\bpowershell\\b.*-enc\\b"
      description: "PowerShell encoded command"
    - pattern: "\\bpowershell\\b.*-nop\\s+-w\\s+hidden"
      description: "PowerShell hidden execution"
    - pattern: "\\bpowershell\\b.*(?:DownloadString|DownloadFile|WebClient)"
      description: "PowerShell web download"
    - pattern: "\\bcurl\\b.*\\|\\s*python[23]?"
      description: "Curl pipe to python"
    - pattern: "\\bwget\\b.*-O\\s*-\\s*\\|\\s*python"
      description: "Wget pipe to python"
