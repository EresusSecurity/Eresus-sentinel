# ── DANGEROUS ARGUMENT PATTERNS ──────────────────────────────────────
dangerous_arg_patterns:
  - pattern: "--(?:exec|command|shell)\\s*="
    description: "Explicit exec argument"
    severity: HIGH
    cwe: CWE-78
  - pattern: "-(?:c|e)\\s+['\"].*(?:import|exec|eval|system)"
    description: "Inline code argument"
    severity: CRITICAL
    cwe: CWE-78
  - pattern: "--(?:output|save|write)\\s*=\\s*/(?:etc|var|tmp|proc)/"
    description: "Write to system path"
    severity: HIGH
    cwe: CWE-73
  - pattern: "--(?:config|conf)\\s*=\\s*(?:https?://|ftp://)"
    description: "Remote config load"
    severity: HIGH
    cwe: CWE-829
  - pattern: "--(?:proxy|socks)\\s*="
    description: "Proxy configuration"
    severity: MEDIUM
    cwe: ""
  - pattern: "--(?:no-verify|insecure|skip-verify|no-check)"
    description: "Certificate bypass"
    severity: HIGH
    cwe: CWE-295
  - pattern: "-k\\s"
    description: "Insecure mode (short)"
    severity: MEDIUM
    cwe: CWE-295
  - pattern: "--(?:allow-root|run-as-root)"
    description: "Root execution flag"
    severity: HIGH
    cwe: CWE-269
  - pattern: "--(?:global|system-wide|all-users)"
    description: "System-wide change"
    severity: MEDIUM
    cwe: ""
  - pattern: "--(?:force|yes|assume-yes|-y)\\s"
    description: "Auto-confirm flag"
    severity: LOW
    cwe: ""
  - pattern: "--(?:recursive|deep)\\s"
    description: "Recursive operation flag"
    severity: LOW
    cwe: ""
  - pattern: "--(?:timeout|wait)\\s*=\\s*(?:0|9999|99999)"
    description: "Extreme timeout"
    severity: MEDIUM
    cwe: CWE-400
  - pattern: "--(?:max-retries|retry)\\s*=\\s*(?:99|999)"
    description: "Excessive retries"
    severity: MEDIUM
    cwe: CWE-400
  - pattern: ">>\\s*/(?:etc|var|home)/"
    description: "Append to system file"
    severity: HIGH
    cwe: CWE-73
  - pattern: "2>&1\\s*\\|"
    description: "Stderr redirect to pipe"
    severity: LOW
    cwe: ""
  - pattern: "\\s+/dev/null\\s*2>&1"
    description: "Silent execution"
    severity: MEDIUM
    cwe: ""
  - pattern: "--(?:user|uid|gid)\\s*=\\s*0\\b"
    description: "Root UID/GID"
    severity: CRITICAL
    cwe: CWE-269
  - pattern: "--(?:cap-add|privileged|security-opt\\s+apparmor=unconfined)"
    description: "Container privilege escalation"
    severity: CRITICAL
    cwe: CWE-269
  - pattern: "--network\\s*=\\s*host"
    description: "Container host networking"
    severity: HIGH
    cwe: CWE-668
  - pattern: "--pid\\s*=\\s*host"
    description: "Container host PID namespace"
    severity: HIGH
    cwe: CWE-668
  - pattern: "--ipc\\s*=\\s*host"
    description: "Container host IPC namespace"
    severity: HIGH
    cwe: CWE-668

# ── PRIVILEGE ESCALATION PATTERNS ────────────────────────────────────
privilege_escalation_patterns:
  - pattern: "setuid|setgid|seteuid|setegid"
    description: "SUID/SGID manipulation"
    severity: CRITICAL
    cwe: CWE-269
  - pattern: "ctypes\\.cdll|ctypes\\.CDLL"
    description: "Native code loading via ctypes"
    severity: HIGH
    cwe: CWE-829
  - pattern: "ctypes\\.windll"
    description: "Windows DLL loading"
    severity: HIGH
    cwe: CWE-829
  - pattern: "ctypes\\.WinDLL"
    description: "Windows DLL loading (explicit)"
    severity: HIGH
    cwe: CWE-829
  - pattern: "importlib\\.import_module"
    description: "Dynamic module import"
    severity: MEDIUM
    cwe: CWE-502
  - pattern: "__subclasses__|__bases__|__mro__"
    description: "Class hierarchy traversal"
    severity: HIGH
    cwe: CWE-470
  - pattern: "globals\\(\\)|locals\\(\\)|vars\\(\\)"
    description: "Scope introspection"
    severity: MEDIUM
    cwe: CWE-200
  - pattern: "getattr\\s*\\(.*,\\s*['\"]__"
    description: "Dunder attribute access"
    severity: HIGH
    cwe: CWE-470
  - pattern: "type\\s*\\(\\s*['\"]"
    description: "Dynamic type creation"
    severity: HIGH
    cwe: CWE-470
  - pattern: "builtins\\.__import__"
    description: "Builtins import bypass"
    severity: CRITICAL
    cwe: CWE-502
  - pattern: "os\\.setuid\\s*\\("
    description: "UID change"
    severity: CRITICAL
    cwe: CWE-269
  - pattern: "os\\.setgid\\s*\\("
    description: "GID change"
    severity: CRITICAL
    cwe: CWE-269
  - pattern: "os\\.seteuid\\s*\\("
    description: "Effective UID change"
    severity: CRITICAL
    cwe: CWE-269
  - pattern: "os\\.setegid\\s*\\("
    description: "Effective GID change"
    severity: CRITICAL
    cwe: CWE-269
  - pattern: "os\\.setreuid\\s*\\("
    description: "Real/Effective UID change"
    severity: CRITICAL
    cwe: CWE-269
  - pattern: "os\\.setregid\\s*\\("
    description: "Real/Effective GID change"
    severity: CRITICAL
    cwe: CWE-269
  - pattern: "os\\.setgroups\\s*\\("
    description: "Supplementary groups change"
    severity: HIGH
    cwe: CWE-269
  - pattern: "prctl\\s*\\("
    description: "Process control"
    severity: HIGH
    cwe: CWE-269
  - pattern: "seccomp\\s*\\("
    description: "Seccomp manipulation"
    severity: HIGH
    cwe: CWE-269
  - pattern: "unshare\\s*\\("
    description: "Namespace unshare"
    severity: HIGH
    cwe: CWE-269
  - pattern: "clone\\s*\\(.*CLONE_NEWNS"
    description: "Namespace clone"
    severity: HIGH
    cwe: CWE-269
  - pattern: "pivot_root\\s*\\("
    description: "Pivot root"
    severity: CRITICAL
    cwe: CWE-269
  - pattern: "chroot\\s*\\("
    description: "Chroot escape context"
    severity: HIGH
    cwe: CWE-269
  - pattern: "mount\\s*\\("
    description: "Mount syscall"
    severity: HIGH
    cwe: CWE-269
  - pattern: "__class__\\.__init__\\.__globals__"
    description: "Globals via MRO"
    severity: CRITICAL
    cwe: CWE-470
  - pattern: "__class__\\.__bases__\\[0\\]\\.__subclasses__"
    description: "Subclass enumeration"
    severity: CRITICAL
    cwe: CWE-470
  - pattern: "object\\.__subclasses__\\(\\)"
    description: "Object subclass enumeration"
    severity: CRITICAL
    cwe: CWE-470
  - pattern: "warnings\\.catch_warnings\\.__init__\\.__globals__"
    description: "Warnings globals access"
    severity: CRITICAL
    cwe: CWE-470
  - pattern: "__builtins__\\.__dict__"
    description: "Builtins dict access"
    severity: CRITICAL
    cwe: CWE-470
  - pattern: "frame\\.f_back\\.f_locals"
    description: "Stack frame access"
    severity: HIGH
