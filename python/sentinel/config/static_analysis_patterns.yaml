    - "requests\\.post\\s*\\("
    - "urllib\\.request\\.urlopen\\s*\\("
    - "httpx\\.\\w+\\s*\\("
    - "aiohttp\\.\\w+\\s*\\("
    - "urlopen\\s*\\("
    - "\\.json\\s*\\(\\)"
    - "\\.text\\s*$"
    - "response\\.content"
    - "response\\.data"

  DATABASE_RESULT:
