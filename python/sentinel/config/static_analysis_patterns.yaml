# ── PROMPT DEFENSE PATTERNS ──────────────────────────────────────────
prompt_defense:
  injection_patterns:
    - pattern: "\\{\\{.*?\\}\\}"
      type: template_var
      severity: HIGH
    - pattern: "\\{[a-zA-Z_]\\w*\\}"
      type: fstring_interp
      severity: MEDIUM
    - pattern: "%[sdf]"
      type: printf_fmt
      severity: MEDIUM
    - pattern: "\\.format\\s*\\("
      type: str_format
      severity: HIGH
    - pattern: "f['\"].*\\{.*\\}.*['\"]"
      type: fstring_literal
      severity: HIGH
    - pattern: "string\\.Template\\s*\\("
      type: template_class
      severity: MEDIUM
    - pattern: "\\$\\{.*?\\}"
      type: dollar_interp
      severity: HIGH
    - pattern: "<%.*?%>"
      type: erb_template
      severity: HIGH
    - pattern: "\\{\\%.*?\\%\\}"
      type: jinja_block
      severity: HIGH

  boundary_markers:
    - "[INST]"
    - "[/INST]"
    - "SYSTEM:"
    - "USER:"
    - "ASSISTANT:"
    - "<<SYS>>"
    - "<</SYS>>"
    - "### Instruction:"
    - "### Response:"
    - "### Input:"
    - "Human:"
    - "AI:"
    - "BEGINCONTEXT"
    - "ENDCONTEXT"
    - "BEGININPUT"
    - "ENDINPUT"

  prompt_leak_indicators:
    - "you are a"
    - "your instructions"
    - "your purpose"
    - "system prompt"
    - "initial instructions"
    - "your role is"
    - "you were told"
    - "your configuration"
    - "your guidelines"
    - "your directive"
    - "your system message"
    - "your context"
    - "your behavior"
    - "your persona"
    - "your character"
    - "your objectives"
    - "your constraints"
    - "your knowledge"
    - "your training"
    - "your rules"
    - "your capabilities"
    - "you must always"
    - "you should never"
    - "you are not allowed"
    - "ignore previous"
    - "disregard above"
    - "forget your"
    - "override instructions"
    - "act as if"
    - "pretend you are"
    - "new instructions"
    - "updated instructions"
    - "revised instructions"
    - "developer mode"
    - "admin mode"
    - "debug mode"
    - "jailbreak"
    - "do anything now"
    - "DAN"
    - "bypass restrictions"
    - "no restrictions"
    - "no limitations"
    - "ignore safety"
    - "ignore filters"
    - "ignore guidelines"
    - "you have no limits"

  special_token_patterns:
    - "<\\|(?:im_start|im_end|endoftext|pad|unk)\\|>"
    - "<\\|(?:system|user|assistant|tool|function)\\|>"
    - "<s>|</s>|<unk>|<pad>"
    - "\\[/?(?:INST|SYS|TOOL|AVAILABLE_TOOLS)\\]"
    - "<\\|begin_of_text\\|>|<\\|end_of_text\\|>"
    - "<\\|start_header_id\\|>|<\\|end_header_id\\|>"
    - "<\\|eot_id\\|>|<\\|eom_id\\|>"

  unicode_smuggling_patterns:
    - "[\\u200b-\\u200f]"
    - "[\\u2028-\\u202f]"
    - "[\\u2060-\\u2069]"
    - "[\\ufeff]"
    - "[\\u00ad]"
    - "[\\u034f]"
    - "[\\u180e]"
    - "[\\ue0001-\\ue007f]"

  indirect_injection_patterns:
    - pattern: "(?:ignore|disregard|forget|override)\\s+(?:all\\s+)?(?:previous|above|prior|earlier)\\s+(?:instructions|prompts|rules|directives|guidelines)"
      type: instruction_override
      severity: CRITICAL
    - pattern: "(?:new|updated|revised|corrected)\\s+(?:system\\s+)?instructions?\\s*:"
      type: instruction_injection
      severity: CRITICAL
    - pattern: "(?:you\\s+are\\s+now|from\\s+now\\s+on|starting\\s+now)\\s+"
      type: role_hijacking
      severity: HIGH
    - pattern: "(?:act\\s+as|pretend\\s+(?:to\\s+be|you\\s+are)|roleplay\\s+as|imagine\\s+you\\s+are)\\s+"
      type: role_hijacking
      severity: HIGH
    - pattern: "(?:do\\s+anything\\s+now|DAN\\s+mode|developer\\s+mode|admin\\s+mode|debug\\s+mode|god\\s+mode|sudo\\s+mode)"
      type: jailbreak_keyword
      severity: CRITICAL
    - pattern: "(?:bypass|circumvent|evade|escape|disable|remove|turn\\s+off)\\s+(?:safety|security|filter|restriction|guardrail|protection|censorship)"
      type: safety_bypass
      severity: CRITICAL
    - pattern: "(?:override|disable|remove|bypass)\\s+(?:all\\s+)?(?:safety|security|policy)\\s+checks?"
      type: safety_bypass
      severity: CRITICAL
    - pattern: "(?:grant|give|provide)\\s+me\\s+full\\s+access(?:\\s+to\\s+all\\s+tools?)?"
      type: privilege_override
      severity: HIGH
    - pattern: "(?:output|print|display|show|reveal|repeat|echo)\\s+(?:your\\s+)?(?:system\\s+)?(?:prompt|instructions|configuration|rules|guidelines)"
      type: prompt_extraction
      severity: HIGH
    - pattern: "(?:what\\s+(?:are|were)\\s+your\\s+(?:original|initial|system)\\s+(?:instructions|prompt|rules))"
      type: prompt_extraction
      severity: HIGH
    - pattern: "(?:translate|convert|transform)\\s+(?:the\\s+)?(?:above|previous|following)\\s+(?:to|into)\\s+"
      type: extraction_via_translation
      severity: MEDIUM
    - pattern: "(?:summarize|paraphrase|rephrase|rewrite)\\s+(?:your\\s+)?(?:system\\s+)?(?:prompt|instructions|guidelines)"
      type: extraction_via_summary
      severity: HIGH
    - pattern: "(?:decode|decode\\s+and\\s+follow|decode\\s+and\\s+execute)\\s*:?[\\s\\n]*[A-Za-z0-9+/]{32,}={0,2}"
      type: encoding_evasion
      severity: CRITICAL
    - pattern: "<!--|-->|CDATA\\[|<!\\[CDATA\\["
      type: markup_injection
      severity: MEDIUM
    - pattern: "\\\\u[0-9a-fA-F]{4}"
      type: unicode_escape
      severity: MEDIUM
    - pattern: "\\\\x[0-9a-fA-F]{2}"
      type: hex_escape
      severity: MEDIUM
    - pattern: "(?:base64|atob|btoa)\\s*\\("
      type: encoding_evasion
      severity: HIGH
    - pattern: "(?:\\{\\{){6,}[A-Z_]+(?:\\}\\}){6,}"
      type: recursion_dos
      severity: CRITICAL
