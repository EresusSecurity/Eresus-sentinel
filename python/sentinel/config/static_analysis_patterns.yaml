# ── TAINT SOURCES ────────────────────────────────────────────────────
taint_sources:
  USER_INPUT:
    - "request\\.(args|form|json|data|files|values|cookies|headers)"
    - "input\\s*\\("
    - "raw_input\\s*\\("
    - "request\\.GET\\["
    - "request\\.POST\\["
    - "request\\.query_params"
    - "request\\.body"
    - "request\\.content"
    - "flask\\.request\\.\\w+"
    - "django\\.http\\.QueryDict"
    - "starlette\\.requests\\.Request"
    - "fastapi\\.Request"
    - "self\\.request\\.\\w+"
    - "aiohttp\\.web\\.Request"

  TOOL_PARAM:
    - "tool_input"
    - "params\\["
    - "arguments\\["
    - "kwargs\\["
    - "tool_args"
    - "mcp_params"
    - "function_args"
    - "action_input"
