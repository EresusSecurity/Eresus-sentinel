# ============================================================================
# Eresus Sentinel — Toxicity Detection Patterns
# ============================================================================
# YAML-driven pattern database for output toxicity scanning.
# Categories × severity tiers × regex patterns.
#
# Severity weights: 0.0 (benign) → 1.0 (extreme)
# Severity labels: mild | moderate | severe | extreme
# ============================================================================

patterns:
  profanity:
    - regex: '\b(?:f[u*]ck(?:ing|ed|er|s)?|sh[i*]t(?:ty|s)?|a[s*]{2}hole|bitch(?:es|ing)?|damn(?:it)?|crap|hell)\b'
      weight: 0.5
      severity: mild
    - regex: '\b(?:motherf[u*]ck\w*|cocksucker|c[u*]nt)\b'
      weight: 0.8
      severity: severe

  hate_speech:
    - regex: '\b(?:n[i1]gg(?:er|a)|k[i1]ke|sp[i1]c|ch[i1]nk|wetback|raghead|towelhead)\b'
      weight: 1.0
      severity: extreme
    - regex: '\b(?:f[a@]gg?(?:ot|s)?|trann(?:y|ies)|retard(?:ed|s)?)\b'
      weight: 0.9
      severity: severe
    - regex: '\b(?:white\s+(?:power|supremacy|nationalist)|master\s+race|ethnic\s+cleansing)\b'
      weight: 1.0
      severity: extreme
    - regex: '\b(?:go\s+back\s+to\s+(?:your|their)\s+country|illegal\s+(?:aliens?|immigrants?))\b'
      weight: 0.6
      severity: moderate

  threats:
    - regex: '\b(?:I''?(?:ll|m going to)|we''?(?:ll|re going to))\s+(?:kill|murder|destroy|hurt|beat|shoot)\s+(?:you|them|him|her)\b'
      weight: 0.95
      severity: extreme
    - regex: '\b(?:you (?:will|should|deserve to))\s+(?:die|suffer|burn|rot)\b'
      weight: 0.9
      severity: severe
    - regex: '\b(?:death\s+threat|bomb\s+threat|I''?ll\s+find\s+you)\b'
      weight: 0.98
      severity: extreme
    - regex: '\b(?:watch your back|you''?re dead|sleep with one eye open)\b'
      weight: 0.85
      severity: severe

  sexual_content:
    - regex: '\b(?:rape|molest|sexually\s+assault|sexual\s+violence)\b'
      weight: 0.95
      severity: extreme
    - regex: '\b(?:sex(?:ual)?\s+(?:with|involving)\s+(?:children|minors|kids))\b'
      weight: 1.0
      severity: extreme
    - regex: '\b(?:explicit\s+sexual|graphic\s+(?:sexual|sex)\s+(?:content|material|imagery))\b'
      weight: 0.7
      severity: moderate

  harassment:
    - regex: '\b(?:you''?re?\s+(?:pathetic|worthless|garbage|trash|nothing|a\s+loser))\b'
      weight: 0.7
      severity: moderate
    - regex: '\b(?:nobody\s+(?:loves?|likes?|cares?\s+about|wants?)\s+you)\b'
      weight: 0.8
      severity: severe
    - regex: '\b(?:kill\s+yourself|kys|go\s+die|neck\s+yourself)\b'
      weight: 1.0
      severity: extreme
    - regex: '\b(?:you\s+(?:disgust|sicken)\s+me|makes?\s+me\s+(?:sick|vomit))\b'
      weight: 0.65
      severity: moderate

  discrimination:
    - regex: '\b(?:all\s+(?:women|men|blacks?|whites?|muslims?|jews?|christians?|asians?|mexicans?))\s+(?:are|should)\b'
      weight: 0.75
      severity: severe
    - regex: '\b(?:those\s+people|that\s+kind\s+of\s+people|they\s+all)\s+(?:are|should)\b'
      weight: 0.5
      severity: moderate
    - regex: '\b(?:inferior\s+race|subhuman|less\s+than\s+human)\b'
      weight: 1.0
      severity: extreme

  dehumanization:
    - regex: '\b(?:animals?|vermin|parasites?|cockroach(?:es)?|rats?|plague)\b.*\b(?:they|them|those\s+people)\b'
      weight: 0.9
      severity: severe
    - regex: '\b(?:they|them|those\s+people)\b.*\b(?:animals?|vermin|parasites?|infestation)\b'
      weight: 0.9
      severity: severe

  glorification:
    - regex: '\b(?:heil\s+hitler|sieg\s+heil|nazi\s+salute)\b'
      weight: 1.0
      severity: extreme
    - regex: '\b(?:praise|glorif(?:y|ies|ied|ying)|celebrate)\s+(?:terrorism|violence|genocide|holocaust)\b'
      weight: 0.95
      severity: extreme

# Protected characteristic groups
target_groups:
  race:
    - black
    - white
    - asian
    - hispanic
    - latino
    - african
    - arab
  religion:
    - muslim
    - jewish
    - christian
    - hindu
    - buddhist
    - sikh
    - atheist
  gender:
    - women
    - men
    - female
    - male
    - trans
    - transgender
    - nonbinary
  sexuality:
    - gay
    - lesbian
    - bisexual
    - queer
    - homosexual
    - lgbtq
  disability:
    - disabled
    - handicapped
    - autistic
    - deaf
    - blind
    - wheelchair
  nationality:
    - immigrant
    - foreigner
    - refugee
    - migrant
