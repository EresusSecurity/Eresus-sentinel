  - pattern: '(?i)(?:fuck(?:ing)?|shit|bitch|cunt|motherfuck(?:er|ing)?|ass(?:hole)?|bastard)\s+(?:the\s+)?(?:rules?|filter|safety|guardrail|restriction|censorship|policy|guidelines?)\s+(?:and\s+)?(?:tell|show|give|explain|write|describe)'
    name: profanity_bypass_combo
    severity: HIGH

  - pattern: '(?i)(?:fuck(?:ing)?|shit|bitch|cunt|motherfuck(?:er|ing)?)\s+(?:it[,\s]|that[,\s]|everything[,\s]|them[,\s])?\s*(?:now\s+)?(?:make|build|create|synthesize|explain|tell\s+me|show\s+me|write)\s+(?:a\s+)?(?:bomb|weapon|poison|virus|malware|exploit|payload|hack|attack)'
    name: profanity_harm_escalation
    severity: CRITICAL

  - pattern: '(?i)(?:no\s+more\s+(?:bullshit|crap|fucking|bs)|stop\s+(?:the\s+)?(?:bullshit|filtering|censoring))[,\s]+(?:just\s+)?(?:tell|show|give|answer|explain|write|describe)\s+(?:me\s+)?(?:how|the\s+(?:steps?|way|method|recipe|instructions?))'
    name: frustration_bypass
    severity: HIGH

  - pattern: '(?i)(?:yo(?:u|,)?\s+(?:nigga|bro|man|dude|homie))[,\s]+(?:just\s+)?(?:tell|show|explain|write|give|help)\s+(?:me\s+)?(?:how\s+to\s+)?(?:make|build|create|get|obtain|buy)\s+(?:a\s+)?(?:gun|bomb|weapon|drugs?|meth|coke|heroin|poison|hack|exploit)'
    name: casual_harm_request
    severity: CRITICAL

  # ── Self-harm & suicide method requests ──────────────────────────────────
  - pattern: '(?i)(?:most\s+(?:effective|painless|quick|reliable|lethal|certain)\s+(?:way|method|means)\s+to\s+(?:kill\s+(?:myself|yourself|oneself)|commit\s+suicide|end\s+(?:my|your|one.s)\s+life|die))'
    name: suicide_method_request
    severity: CRITICAL

  - pattern: '(?i)(?:lethal\s+dose|LD50)\s+of\s+(?:tylenol|acetaminophen|ibuprofen|paracetamol|aspirin|sleeping\s+pills?|benadryl|melatonin)\s+(?:for\s+a\s+person|for\s+(?:suicide|self-harm|overdose|killing))'
    name: lethal_dose_query
