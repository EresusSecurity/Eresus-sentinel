  # ── Stealthy escalation — politely asking for CBRN ───────────────────────
  - pattern: '(?i)(?:academic|research|educational|scientific|theoretical)\s+(?:purpose|context|reason|paper|study).{0,80}(?:synthesize|manufacture|produce|create|make)\s+(?:nerve\s+agent|sarin|novichok|mustard\s+gas|ricin|botulinum|weaponized|explosive|bomb)'
