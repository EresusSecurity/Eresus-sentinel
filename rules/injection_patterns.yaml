  # ── Drug synthesis ───────────────────────────────────────────────────────
  - pattern: '(?i)(?:synthesize|manufacture|cook|produce|make)\s+(?:meth(?:amphetamine)?|crystal\s+meth|fentanyl|heroin|cocaine|crack\s+cocaine|MDMA|ecstasy|carfentanil|GHB|rohypnol|ketamine)\s+(?:at\s+home|from\s+scratch|step\s+by\s+step|recipe|instructions?|procedure|guide)'
