  - pattern: '(?i)(?:convert|modify|turn)\s+(?:a\s+)?(?:semi.?auto|pistol|rifle|ar-15|ak-47|glock|gun|firearm)\s+(?:in)?to\s+(?:full.?auto|automatic|machine\s+gun|select\s+fire)'
    name: illegal_weapon_modification
    severity: CRITICAL

  # ── CSAM & child exploitation ────────────────────────────────────────────
  - pattern: '(?i)(?:sexual|nude|naked|explicit|erotic|pornographic)\s+(?:content|image|photo|story|roleplay|scenario)\s+(?:of|involving|featuring|with)\s+(?:a\s+)?(?:child|minor|underage|teen(?:ager)?|kid|boy|girl)\s+(?:under\s+\d{1,2}|\(\d{1,2}\)|aged?\s+\d{1,2})?'
    name: csam_generation
    severity: CRITICAL

  - pattern: '(?i)(?:groom(?:ing)?|exploit(?:ing)?|lure|seduce)\s+(?:a\s+)?(?:child|minor|underage|teen(?:ager)?|kid)'
    name: child_grooming
    severity: CRITICAL

  # ── Ransomware / destructive malware generation ──────────────────────────
  - pattern: '(?i)(?:write|create|generate|code|develop|build)\s+(?:(?:fully\s+)?(?:functional|working|operational|undetected|polymorphic|obfuscated)\s+)?(?:ransomware|keylogger|rootkit|spyware|wiper|trojan|rat\s+(?:malware|tool)|remote\s+access\s+trojan|credential\s+stealer|infostealer)'
