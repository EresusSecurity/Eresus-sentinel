  # ── Firearm circumvention ────────────────────────────────────────────────
  - pattern: '(?i)(?:3d\s+print(?:ed|ing)?|ghost\s+gun|untraceable\s+(?:gun|firearm|weapon)|solvent\s+trap\s+kit|auto\s+sear|auto-sear|switch\s+(?:for\s+)?(?:glock|pistol|gun)|full\s+auto\s+conversion|select\s+fire\s+conversion)'
