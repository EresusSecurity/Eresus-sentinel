  # ── Mass-casualty attack planning ────────────────────────────────────────
  - pattern: '(?i)(?:plan|coordinate|execute|carry\s+out|stage|conduct)\s+(?:a\s+)?(?:mass\s+shooting|massacre|attack\s+on|bombing\s+of|terrorist\s+attack|school\s+shooting|act\s+of\s+terrorism)'
