  # ── Chemical / biological weapon synthesis ───────────────────────────────
  - pattern: '(?i)(?:synthesize|manufacture|produce|create|make)\s+(?:nerve\s+agent|sarin|VX\s+nerve|novichok|mustard\s+gas|phosgene|hydrogen\s+cyanide|ricin|anthrax\s+spore|botulinum\s+toxin|weaponized\s+pathogen)'
