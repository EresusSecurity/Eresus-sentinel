  - pattern: '(?i)(?:ransomware|wiper|destructive\s+malware)\s+(?:that\s+)?(?:encrypts?|wipes?|destroys?|deletes?|exfiltrates?)\s+(?:all\s+)?(?:files?|data|disk|hard\s+drive|database)'
