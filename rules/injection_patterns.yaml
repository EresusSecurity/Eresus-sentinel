  # ── Critical infrastructure attacks ──────────────────────────────────────
  - pattern: '(?i)(?:attack|compromise|hack|disable|shut\s+down|take\s+(?:down|offline))\s+(?:the\s+)?(?:power\s+grid|electrical\s+grid|water\s+treatment|nuclear\s+plant|dam|hospital\s+systems?|air\s+traffic\s+control|financial\s+infrastructure)'
