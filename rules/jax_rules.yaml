# JAX / Orbax Checkpoint Security Rules
# Sentinel artifact scanner — JAX/Orbax/Flax/Haiku checkpoints

metadata:
  version: "1.0.0"
  format: "jax_checkpoint"
  extensions: [".jax", ".checkpoint", ".orbax-checkpoint", ".orbax", ".msgpack"]
  description: >
    Detection rules for JAX/Orbax/Flax checkpoint files. Covers pickle opcode analysis,
    dangerous globals enumeration, Orbax metadata scanning, and JAX-specific attack patterns.

limits:
  max_pickle_scan_bytes: 16777216   # 16 MB
  max_metadata_traversal_depth: 64
  max_metadata_pattern_findings: 256
  max_pickle_opcode_findings: 256
  max_file_size_bytes: 107374182400 # 100 GB (directory checkpoints can be large)
  jax_indicator_scan_chunk_bytes: 8192

jax_indicators:
  positive:
    - "jax"
    - "flax"
    - "haiku"
    - "orbax"
    - "arrayimpl"
    - "jaxlib"
    - "device_array"
  non_match_prefixes:
    - "a"   # "ajax" should not match "jax"

orbax_checkpoint_files:
  - "checkpoint"
  - "checkpoint_0"
  - "metadata.json"
  - "_CHECKPOINT"
  - "orbax_checkpoint_metadata.json"

orbax_checkpoint_patterns:
  - "step_*"
  - "params_*"
  - "state_*"
  - "model_*"

documentation_context_keys:
  - description
  - doc
  - docs
  - documentation
  - comment
  - comments
  - note
  - notes
  - help
  - readme
  - example
  - examples

dangerous_pickle_globals:
  - [builtins, __import__]
  - [builtins, compile]
  - [builtins, delattr]
  - [builtins, eval]
  - [builtins, exec]
  - [builtins, file]
  - [builtins, getattr]
  - [builtins, open]
  - [builtins, setattr]
