  - [ctypes, cdll]
  - [ctypes, cfunctype]
  - [ctypes, oledll]
  - [ctypes, pydll]
  - [ctypes, pythonapi]
  - [ctypes, windll]
  - [ctypes, winfunctype]
  - [dill, load]
  - [dill, loads]
  - [importlib, import_module]
  - [io, open]
  - [joblib, _pickle_load]
  - [joblib, load]
  - [marshal, load]
  - [marshal, loads]
  - [nt, system]
  - [numpy, load]
  - [numpy.testing._private.utils, runstring]
  - [operator, attrgetter]
  - [operator, getitem]
  - [operator, itemgetter]
  - [operator, methodcaller]
  - [os, execl]
  - [os, execle]
  - [os, execlp]
  - [os, execlpe]
  - [os, execv]
  - [os, execve]
  - [os, execvp]
  - [os, execvpe]
  - [os, popen]
  - [os, popen2]
  - [os, popen3]
  - [os, popen4]
  - [os, spawn]
  - [os, spawnl]
  - [os, spawnle]
  - [os, spawnlp]
  - [os, spawnlpe]
  - [os, spawnv]
  - [os, spawnve]
  - [os, spawnvp]
  - [os, spawnvpe]
  - [os, system]
  - [pdb, run]
  - [pdb, runcall]
  - [pdb, runctx]
  - [pdb, runeval]
  - [pickle, load]
  - [pickle, loads]
  - [pip, main]
  - [pip._internal, main]
  - [pip._internal.cli.main, main]
  - [pkgutil, resolve_name]
  - [posix, system]
  - [profile, run]
  - [profile, runctx]
