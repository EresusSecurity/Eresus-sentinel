# Jinja2 Template Injection (SSTI) Security Rules
# Sentinel artifact scanner — Jinja2 templates in ML model artifacts
# Covers CVE-2024-34359 and general SSTI attack patterns

metadata:
  version: "1.0.0"
  format: "jinja2_template"
  extensions: [".jinja", ".j2", ".template", ".json", ".yaml", ".yml"]
  description: >
    SSTI detection rules for Jinja2 templates embedded in ML model artifacts.
    Targets tokenizer_config.json, chat_template fields, GGUF metadata,
    and standalone template files.

limits:
  max_template_size_bytes: 51200
  max_file_size_bytes: 10485760
  max_findings_per_category: 10
  raw_fallback_context_bytes: 1024
  raw_fallback_max_windows: 8
  raw_fallback_read_bytes: 262144

template_indicators:
  - "{{"
  - "{%"
  - "{#"

ml_context_filenames:
  - "tokenizer_config.json"
  - "tokenizer.json"
  - "chat_template.json"
  - "generation_config.json"

ml_context_path_terms:
  - "model"
  - "checkpoint"
  - "huggingface"
  - "transformers"
  - "config"

safe_ml_patterns:
  - "messages"
  - "role"
  - "content"
  - "user"
  - "assistant"
  - "system"
  - "bos_token"
  - "eos_token"
  - "add_generation_prompt"
  - "loop.last"
  - "loop.first"
  - "loop.index"
  - "loop.index0"
  - "loop.revindex"
  - "loop.length"
  - "loop.depth"
  - "joiner"
  - "namespace"

ssti_patterns:
  critical_rce:
    severity: CRITICAL
    cwe_ids: ["CWE-94", "CWE-78"]
    description: >
      Direct Remote Code Execution via Jinja2 SSTI. These patterns allow
      arbitrary Python/OS command execution when the template is rendered.
    patterns:
      - '__class__\s*\.\s*__mro__'
      - '__subclasses__\s*\(\s*\)'
      - '__globals__\s*\[\s*["'']os["'']'
      - '__builtins__\s*\[\s*["'']__import__["'']'
      - 'popen\s*\('
      - 'subprocess\s*\.\s*(?:call|run|Popen|check_output|check_call)'
      - 'os\s*\.\s*system\s*\('
      - '__import__\s*\(\s*["''](os|subprocess|sys|importlib|builtins)["'']\s*\)'
      - 'eval\s*\('
      - 'exec\s*\('
      - 'compile\s*\(\s*'
      - 'getattr\s*\(\s*.*__class__'
      - '__reduce__\s*\('
      - '__reduce_ex__\s*\('

  code_execution:
    severity: CRITICAL
    cwe_ids: ["CWE-94"]
    description: >
      Code execution via attribute traversal or Python object introspection
      in Jinja2 template context.
    patterns:
      - '\{\{[^}]*__class__[^}]*\}\}'
      - '\{\{[^}]*__mro__[^}]*\}\}'
      - '\{\{[^}]*__subclasses__[^}]*\}\}'
      - '\{%[^%]*__import__[^%]*%\}'
      - '\{\{[^}]*\[\s*["'']__[a-z]+__["''].*\]\s*\}\}'
      - 'request\s*\.\s*application\s*\.\s*__globals__'
      - 'config\s*\.\s*__class__\s*\.\s*__init__'
      - '\[\s*["'']\s*__class__\s*["'']'
      - 'lipsum\s*\.__globals__'
      - 'cycler\s*\.__init__\s*\.__globals__'
      - 'joiner\s*\.__init__\s*\.__globals__'
      - 'namespace\s*\.__init__\s*\.__globals__'

  attribute_access:
    severity: HIGH
    cwe_ids: ["CWE-94", "CWE-200"]
    description: >
      Suspicious attribute access patterns that may be used as stepping stones
      toward full SSTI exploitation via Python object introspection.
    patterns:
      - '\|attr\s*\(\s*["''][_a-z]'
      - '__dict__\s*\['
      - '__dict__\s*\.'
      - 'request\s*\.\s*environ\s*\['
      - 'request\s*\.\s*environ\s*\.\s*get'
      - 'config\s*\.\s*items\s*\(\s*\)'
      - 'self\s*\.\s*_sa_instance_state'

  filter_bypass:
    severity: HIGH
    cwe_ids: ["CWE-94"]
    description: >
      Jinja2 filter-based bypass techniques used to obfuscate SSTI payloads
      from WAFs and static analysis tools.
    patterns:
      - '\|int\s*\|chr'
      - '\|map\s*\(\s*["''](eval|exec|import)'
      - '\|select\s*\(\s*["''](eval|exec|import)'
      - 'format\s*\(\s*.*__class__'
      - '\|lower\s*\|replace'
      - '\|upper\s*\|replace'
      - 'request\|attr'
      - '\[\s*request\s*\.\s*args'
      - '\[\s*request\s*\.\s*form'

  obfuscation:
    severity: HIGH
    cwe_ids: ["CWE-94", "CWE-506"]
    description: >
      Encoded or obfuscated SSTI payload delivery. Base64-encoded strings
      adjacent to decode/eval patterns.
    patterns:
      - 'b64decode\s*\('
      - 'base64\s*\.\s*b64decode'
      - 'frombase64string\s*\('
      - '\\\\x[0-9a-fA-F]{2}.*__class__'
      - 'chr\s*\(\s*\d+\s*\)'
      - '\|replace\s*\(["''](?:[0-9a-zA-Z/+]{40,})["'']'

  waf_bypass:
    severity: HIGH
    cwe_ids: ["CWE-94"]
    description: >
      Techniques specifically designed to bypass WAF or template sandboxing,
      including use of Unicode escapes and string concatenation.
    patterns:
      - '["'']\s*~\s*["''].*__class__'
      - '\[\s*\(\s*["''][a-z_]+["''].*\~.*["''][a-z_]+["'']\s*\)\s*\]'
      - '__class__.*__init__.*__globals__.*__builtins__'
      - '\\\\u0027.*__class__'
      - 'dict\.__doc__\[0\]'

suspicious_template_keys:
  - "chat_template"
  - "restore_fn"
  - "custom_template"
  - "jinja_template"
  - "prompt_template"
  - "system_template"
  - "instruction_template"
  - "template_string"
  - "format_string"
  - "eval_template"

# ─────────────────────────────────────────────────────────────────────────────
# SAST Rules — Jinja2 Web Application Security
# Detect misconfigurations and unsafe patterns in Python web applications
# using Jinja2 (Flask, FastAPI, Starlette, standalone).
# ─────────────────────────────────────────────────────────────────────────────
sast_rules:

  - id: JINJA-001
    title: "Jinja2 autoescape disabled"
    severity: HIGH
    cwe: CWE-116
    owasp: A03
    description: >
      Jinja2 Environment created with autoescape=False (or no autoescape).
      Any user-controlled variable rendered in this environment will not be
      HTML-escaped, leading to reflected or stored XSS.
    pattern: 'Environment\s*\([^)]*autoescape\s*=\s*False'
    fix: "Set autoescape=select_autoescape(['html','xml']) or autoescape=True"
    fp_suppress:
      - pattern: '(?i)(?:test_|#\s*noqa|#\s*nosec)'

  - id: JINJA-002
    title: "Jinja2 Environment with no autoescape argument"
    severity: MEDIUM
    cwe: CWE-116
    description: >
      Jinja2 Environment instantiated without specifying autoescape.
      The default is False, which disables HTML escaping for all templates.
    pattern: 'Environment\s*\([^)]*\)\s*(?!.*autoescape)'
    fix: "Always pass autoescape=select_autoescape() when creating an Environment"

  - id: JINJA-003
    title: "render_template_string with user-controlled input"
    severity: CRITICAL
    cwe: CWE-1336
    owasp: A03
    description: >
      render_template_string() called with a variable that may contain user input.
      This enables Server-Side Template Injection (SSTI) — an attacker can craft
      a value like {{''.__class__.__mro__[1].__subclasses__()}} to achieve RCE.
    pattern: '(?:render_template_string|Template)\s*\([^)]*(?:request\.|f["\x27]|format\(|\+\s*\w|%\s*\w|\w\s*\+)'
    fix: "Never pass user input to render_template_string. Use render_template with a static file."
    references:
      - "CVE-2019-8341"
      - "https://portswigger.net/research/server-side-template-injection"

  - id: JINJA-004
    title: "Markup() wrapping user-controlled variable"
    severity: HIGH
    cwe: CWE-79
    owasp: A03
    description: >
      jinja2.Markup() (or markupsafe.Markup()) marks a string as safe HTML,
      bypassing autoescaping. Wrapping user input in Markup() exposes the
      application to XSS.
    pattern: '(?:Markup|markupsafe\.Markup)\s*\(\s*(?:request\.|f["\x27]|\w+\s*\+|str\(|\w+\[)'
    fix: "Never pass untrusted data to Markup(). Only mark known-safe static strings."

  - id: JINJA-005
    title: "|safe filter on user-controlled variable"
    severity: HIGH
    cwe: CWE-79
    owasp: A03
    description: >
      The Jinja2 |safe filter disables HTML escaping for the expression it is
      applied to. If the variable holds user-supplied content, this is an XSS sink.
    pattern: '\{\{[^}]*(?:request\.|user_|input_|data\.|body\.|param)\w*\s*\|\s*safe\s*\}\}'
    fix: "Remove |safe from user-controlled variables. Let autoescape do its job."

  - id: JINJA-006
    title: "LLM output piped into Jinja2 template"
    severity: CRITICAL
    cwe: CWE-1336
    owasp: A05
    description: >
      LLM/AI model output used as a Jinja2 template string or injected into one
      without sanitization. An attacker who controls model inputs can craft a
      prompt that causes the model to output a SSTI payload.
    pattern: '(?:render_template_string|Template)\s*\([^)]{0,200}(?:response|completion|output|generated|llm_|ai_|model_output|chat_response)'
    fix: >
      Never use LLM output as a template. Treat all model output as untrusted user
      input. Render into a static template with escaped variables.

  - id: JINJA-007
    title: "f-string or string concatenation passed to Template()"
    severity: CRITICAL
    cwe: CWE-1336
    description: >
      A Python f-string or string concatenation is directly passed to
      jinja2.Template() — common pattern when developers want to interpolate
      a variable into a template before rendering it, inadvertently creating SSTI.
    pattern: '(?:jinja2\.)?Template\s*\(\s*(?:f["\x27][^"\x27]*\{|["\x27][^"\x27]*["\x27]\s*\+|["\x27][^"\x27]*["\x27]\s*%)'
    fix: "Pass only static string literals to Template(). Put variables inside the template as {{ var }}."

  - id: JINJA-008
    title: "Jinja2 sandbox escape via __class__ traversal"
    severity: CRITICAL
    cwe: CWE-94
    description: >
      Jinja2 SandboxedEnvironment escape via Python object introspection chain.
      Even sandboxed environments can be escaped in some Python versions.
    pattern: '(?:__class__|__mro__|__subclasses__|__globals__|__builtins__)\s*[\.\[]'
    fix: >
      Avoid using SandboxedEnvironment with user input. Use a whitelist approach
      or avoid templating user-supplied content entirely.

  - id: JINJA-009
    title: "Jinja2 template loaded from user-controlled file path"
    severity: HIGH
    cwe: CWE-22
    description: >
      Template file path derived from user input, enabling path traversal to
      load arbitrary templates from the filesystem.
    pattern: '(?:get_template|from_string)\s*\([^)]*(?:request\.|user_|input_|\+\s*\w|\w\s*\+)'
    fix: "Validate and whitelist template names before passing to get_template()."

  - id: JINJA-010
    title: "Disabled sandbox via unsafe_undefined or DebugUndefined"
    severity: MEDIUM
    cwe: CWE-749
    description: >
      Using DebugUndefined or Undefined with unsafe_undefined weakens Jinja2's
      variable isolation, potentially leaking internal context values.
    pattern: '(?:DebugUndefined|unsafe_undefined\s*=\s*True|Undefined\s*\(\s*[^)]*unsafe)'
    fix: "Use StrictUndefined in production to surface template errors early without leaking context."
