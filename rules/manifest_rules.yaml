# ML Manifest / Configuration File Security Rules
# Sentinel artifact scanner — JSON/YAML/TOML model config files

metadata:
  version: "1.0.0"
  format: "ml_manifest"
  description: >
    Detection rules for ML model manifest and configuration files.
    Covers unsafe URLs, weak hash algorithms, suspicious script keys,
    credential leakage, and dangerous dependency references.

limits:
  max_file_size_bytes: 10485760   # 10 MB
  max_url_findings: 20
  max_key_findings: 30
  max_depth: 32

exact_filenames:
  - manifest.json
  - model.json
  - params.json
  - hyperparams.yaml
  - training_args.json
  - dataset_info.json
  - environment.yml
  - conda.yaml
  - metadata.json
  - index.json
  - config.json
  - tokenizer_config.json
  - generation_config.json
  - adapter_config.json
  - model_config.yaml

exact_extensions:
  - .manifest
  - .metadata

model_name_keys:
  - name
  - model_name
  - model
  - model_id
  - id
  - title
  - artifact_name
  - artifact_id
  - package_name

hash_integrity_keys:
  - hash
  - checksum
  - digest
  - md5
  - sha1
  - sha256
  - sha512
  - file_hash
  - model_hash
  - weight_hash
  - integrity

weak_hash_patterns:
  - id: MANIFEST-HASH-001
    rule_id: "MANIFEST-HASH-001"
    title: "Weak hash algorithm (MD5) used for model integrity verification"
    description: >
      An MD5 hash value was found in the manifest. MD5 is cryptographically broken
      and trivially collisible. An attacker can substitute a malicious model artifact
      that matches the MD5 checksum of the legitimate file.
    severity: HIGH
    cwe_ids: ["CWE-327", "CWE-328"]
    key_pattern: '^md5$|_md5$|^md5_'
    value_hex_length: 32

  - id: MANIFEST-HASH-002
    rule_id: "MANIFEST-HASH-002"
    title: "Weak hash algorithm (SHA-1) used for model integrity verification"
    description: >
      A SHA-1 hash value was found in the manifest. SHA-1 is deprecated and
      theoretically collisible. Use SHA-256 or SHA-512 for model integrity.
    severity: MEDIUM
    cwe_ids: ["CWE-327", "CWE-328"]
    key_pattern: '^sha1$|_sha1$|^sha1_'
    value_hex_length: 40

