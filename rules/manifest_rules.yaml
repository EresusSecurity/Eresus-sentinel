url_rules:
  - id: MANIFEST-URL-001
    rule_id: "MANIFEST-URL-001"
    title: "Untrusted external URL in model manifest"
    description: >
      The manifest references a URL from a domain not in the trusted ML
      infrastructure allowlist. This may indicate supply-chain tampering,
      a malicious model weight source, or a C2 callback endpoint.
    severity: HIGH
    cwe_ids: ["CWE-494", "CWE-829"]
    url_pattern: 'https?://[a-zA-Z0-9.\-_]+(?:/[^\s"<>]*)?'

  - id: MANIFEST-URL-002
    rule_id: "MANIFEST-URL-002"
    title: "Cloud storage reference in model manifest"
    description: >
      The manifest contains a cloud storage URI (S3/GCS/Azure). These references
      indicate external model weight dependencies that bypass local integrity checks.
    severity: MEDIUM
    cwe_ids: ["CWE-829"]
    patterns:
      - 's3://[a-zA-Z0-9.\-_]+(?:/[^\s"<>]*)?'
      - 'gs://[a-zA-Z0-9.\-_]+(?:/[^\s"<>]*)?'
      - 'az://[a-zA-Z0-9.\-_]+(?:/[^\s"<>]*)?'
      - 'wasbs?://[^\s"<>@]+@[a-zA-Z0-9.\-_]+\.blob\.core\.windows\.net(?:/[^\s"<>]*)?'
      - 'abfss?://[^\s"<>@]+@[a-zA-Z0-9.\-_]+\.dfs\.core\.windows\.net(?:/[^\s"<>]*)?'

suspicious_key_rules:
  - id: MANIFEST-KEY-001
    rule_id: "MANIFEST-KEY-001"
    title: "Script/command execution key in model manifest"
    description: >
      A key associated with script or command execution was found in the manifest.
      ML loaders may invoke the value of these keys at model load or training time.
    severity: HIGH
    cwe_ids: ["CWE-78", "CWE-94"]
    key_patterns:
      - '^(pre_|post_)?script$'
      - '^(pre_|post_)?command$'
      - '^(pre_|post_)?cmd$'
      - '^entrypoint$'
      - '^run$'
      - '^exec$'
      - '^hook$'
      - '^on_load$'
      - '^on_init$'
      - '^on_start$'
      - '^startup$'
      - '^init_command$'
      - '^setup_command$'
      - '^install_command$'

  - id: MANIFEST-KEY-002
    rule_id: "MANIFEST-KEY-002"
    title: "Credential or secret key in model manifest"
    description: >
      A key name typically associated with credentials or secrets was found
      in the model manifest. Credentials in manifest files expose them to
      any party that can read the model artifact.
    severity: CRITICAL
    cwe_ids: ["CWE-312", "CWE-522"]
    key_patterns:
      - 'password'
      - 'passwd'
      - 'secret'
      - 'api_key'
      - 'apikey'
      - 'access_key'
      - 'private_key'
      - 'auth_token'
      - 'bearer_token'
      - 'oauth_token'
      - 'jwt'
      - 'credential'
      - 'aws_secret'
      - 'aws_access'

  - id: MANIFEST-KEY-003
    rule_id: "MANIFEST-KEY-003"
    title: "Jinja2 template field in model manifest"
    description: >
      A Jinja2 template field (chat_template, prompt_template, etc.) was found
      in the manifest. Template fields may contain SSTI payloads executed when
      the template is rendered by the ML framework.
    severity: HIGH
    cwe_ids: ["CWE-94"]
    key_patterns:
      - '^chat_template$'
      - '^prompt_template$'
      - '^system_template$'
      - '^instruction_template$'
      - '^template_string$'
      - '^format_string$'
      - '^jinja_template$'
      - '^custom_template$'
