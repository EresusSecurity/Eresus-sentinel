# RKNN Model Security Rules
# Sentinel artifact scanner — Rockchip Neural Network (.rknn)

metadata:
  version: "1.0.0"
  format: "rknn"
  extensions: [".rknn"]
  description: >
    Detection rules for Rockchip RKNN model artifacts. Covers header validation,
    path/URL references, command+network execution correlation, and encoded payload hints.

magic:
  rknn_header:
    magic_bytes: "RKNN"
    min_file_size_bytes: 16
    max_signature_read_bytes: 64
    description: "RKNN binary header — first 4 bytes must be ASCII RKNN"
  structural_magic_max:
    max_count: 2
    description: >
      Legitimate RKNN files contain at most 2 standalone structural RKNN markers
      (file header + FlatBuffer header). More than 2 isolated RKNN magic occurrences
      indicates possible tampering or format confusion.

limits:
  max_scan_bytes: 12582912      # 12 MB
  max_extracted_strings: 4000
  min_printable_run: 6
  max_printable_run: 512
  max_evidence_per_category: 10

safe_metadata_keys:
  - model_name
  - model_version
  - platform
  - target
  - device
  - author
  - description
  - framework
  - input
  - output
  - quantization
  - runtime
  - dtype
  - op_type
  - tensor_type
  - layout
  - activation
  - padding
  - stride
  - kernel_size
  - dilation
  - group
  - multiplier

path_rules:
  - id: RKNN-PATH-001
    rule_id: "RKNN-PATH-001"
    title: "Absolute filesystem path reference in RKNN model metadata"
    description: >
      An absolute filesystem path was found in the extracted string metadata of the
      RKNN model. Real filesystem references embedded in model weights may indicate
      training-environment information leakage or a path-traversal precursor.
    severity: HIGH
    cwe_ids: ["CWE-200", "CWE-22"]
    real_fs_prefixes:
      - "/bin/"
      - "/dev/"
      - "/etc/"
      - "/home/"
      - "/lib/"
      - "/mnt/"
      - "/opt/"
      - "/proc/"
      - "/root/"
      - "/run/"
      - "/sbin/"
      - "/srv/"
      - "/sys/"
      - "/tmp/"
      - "/usr/"
      - "/var/"
      - "/Users/"
      - "/Windows/"
      - "/Program Files/"
      - "/AppData/"
      - "~/"
    windows_drive_pattern: '^[a-zA-Z]:[\\\/]'
    min_length_for_tilde: 8

  - id: RKNN-PATH-002
    rule_id: "RKNN-PATH-002"
    title: "Path traversal sequence in RKNN model metadata"
    description: >
      A directory traversal sequence (../ or ..\) was found in extracted RKNN metadata.
      Traversal sequences in model files can be used to load or overwrite arbitrary files
      on the target device when the RKNN runtime resolves external data references.
    severity: CRITICAL
    cwe_ids: ["CWE-22"]
    traversal_pattern: '(^|[\\\/])\.\.([\\/]|$)'

  - id: RKNN-PATH-003
    rule_id: "RKNN-PATH-003"
    title: "URL reference in RKNN model metadata"
    description: >
      An HTTP/HTTPS/FTP/S3/GCS URL was found in extracted RKNN metadata. External URL
      references in model artifacts may indicate a model that fetches remote resources
      at inference time, enabling supply-chain or C2 attacks.
    severity: HIGH
    cwe_ids: ["CWE-494", "CWE-829"]
    url_pattern: '(?i)\b(?:https?|ftp|s3|gs|file)://[^\s"<>]+'

command_rules:
  - id: RKNN-CMD-001
    rule_id: "RKNN-CMD-001"
    title: "Command execution indicator in RKNN model metadata"
    description: >
      A shell command execution keyword was found in extracted RKNN printable string data.
      RKNN custom operators can invoke host-side code; these patterns suggest the model
      was designed to execute shell commands at inference time.
    severity: HIGH
    cwe_ids: ["CWE-78"]
    patterns:
      - 'os\.system'
      - 'subprocess\.(?:popen|run|call|check_output|check_call)'
      - 'powershell(?:\.exe)?'
      - 'cmd(?:\.exe)?\s+/c'
      - '/bin/sh'
      - '/bin/bash'
      - 'bash\s+-c'
      - 'sh\s+-c'
      - 'curl\s+'
      - 'wget\s+'
      - 'netcat'
      - '\bnc\s+'

  - id: RKNN-CMD-002
    rule_id: "RKNN-CMD-002"
    title: "Command + network execution correlation in RKNN model"
    description: >
      A command-execution pattern and a network indicator were found together. This
      high-confidence combination strongly suggests an RKNN model designed for C2
      callback or data exfiltration at inference time.
    severity: CRITICAL
    cwe_ids: ["CWE-78", "CWE-200"]
    network_patterns:
      - '\bsocket\b'
      - '\bhttp\b'
      - '\bhttps\b'
      - '\bftp\b'
      - '\btcp\b'
      - '\budp\b'
      - '\bdns\b'
      - '\bwebhook\b'
      - '\bcallback\b'
      - '\bexfil\b'
    ip_pattern: '\b(?:\d{1,3}\.){3}\d{1,3}(?::\d{2,5})?\b'
    requires_command_match: true

obfuscation_rules:
  - id: RKNN-OBF-001
    rule_id: "RKNN-OBF-001"
    title: "Encoded payload with decode+exec context in RKNN model"
    description: >
      A long Base64-encoded blob was found alongside both a decode keyword and
      a command-execution or import keyword. This triple-signal combination is
      characteristic of stage-2 payload delivery embedded in model weights.
    severity: CRITICAL
    cwe_ids: ["CWE-506", "CWE-94"]
    base64_min_length: 96
    base64_pattern: '\b[A-Za-z0-9+/]{96,}={0,2}\b'
    decode_patterns:
      - "base64"
      - "b64decode"
      - "decode("
      - "frombase64string"
      - "atob("
    exec_patterns:
      - "eval("
      - "exec("
      - "__import__"
      - "loadlibrary"
      - "dlopen("
      - "ctypes."
