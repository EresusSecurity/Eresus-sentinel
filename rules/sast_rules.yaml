    severity: CRITICAL
    cwe_ids: [CWE-78]
    fix_hint: "Named pipe reverse shells must be removed; audit commit history"
    fp_risk: LOW

  - id: SAST-204
    name: socat_pty_shell
    description: "socat EXEC:/bin/bash PTY reverse shell"
    pattern: 'socat\b.*EXEC:[''"]?/bin/(?:bash|sh)'
    severity: CRITICAL
    cwe_ids: [CWE-78]
    fix_hint: "Remove socat shell execution; use authenticated, encrypted channels only"
