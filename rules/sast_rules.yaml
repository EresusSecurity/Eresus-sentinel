    pattern: '(?:nc|ncat|netcat)\b.*-e\s+/bin/(?:bash|sh|zsh|dash)'
    severity: CRITICAL
    cwe_ids: [CWE-78]
    fix_hint: "netcat -e /bin/sh is a backdoor; remove from all deployment code"
    fp_risk: LOW

  - id: SAST-203
    name: mkfifo_reverse_shell
