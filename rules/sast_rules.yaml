# ============================================================================
# Eresus Sentinel — SAST Rules for LLM Application Code
# ============================================================================
# Static analysis rules for detecting security issues in AI/ML codebases.
# Source: huntr.com research + OWASP LLM Top 10 + CWE ML extensions
#
# Fields:
#   id:            Unique rule ID (SAST-NNN)
#   name:          Short rule name
#   description:   What the rule detects
#   pattern:       Regex pattern (Python re syntax)
#   severity:      CRITICAL | HIGH | MEDIUM | LOW | INFO
#   cwe_ids:       CWE references
#   fix_hint:      Remediation guidance
#   fp_risk:       LOW | MEDIUM | HIGH — false positive likelihood
#   references:    URLs for context
# ============================================================================

version: "1.0"

rules:
  # ─── Insecure Deserialization ────────────────────────────────────────
  - id: SAST-001
    name: unsafe_pickle_load
    description: "Unsafe pickle deserialization — leads to arbitrary code execution via __reduce__"
    pattern: '(?i)(?:pickle|cPickle|_pickle)\.(?:load|loads)\s*\('
    severity: CRITICAL
    cwe_ids: [CWE-502]
    fix_hint: "Replace with safetensors, JSON, or validate with a no-load artifact scanner"
    fp_risk: LOW
    references:
      - "https://blog.huntr.com/pickle-rickd-how-loading-a-malicious-pickle-can-pwn-your-machine"
      - "https://blog.huntr.com/dont-trust-your-model-how-a-malicious-pickle-payload-in-pytorch-can-execute-code"

  - id: SAST-002
    name: unsafe_torch_load
    description: "torch.load() uses pickle internally — arbitrary code execution risk"
    pattern: '(?i)torch\.load\s*\((?![^)]*weights_only\s*=\s*True)'
    severity: CRITICAL
    cwe_ids: [CWE-502]
    fix_hint: "Use torch.load(weights_only=True) or migrate to safetensors format"
    fp_risk: LOW
    references:
      - "https://blog.huntr.com/dont-trust-your-model-how-a-malicious-pickle-payload-in-pytorch-can-execute-code"

  - id: SAST-003
    name: unsafe_joblib_load
    description: "joblib.load() uses pickle internally — same deserialization risks"
    pattern: '(?i)joblib\.load\s*\('
    severity: HIGH
    cwe_ids: [CWE-502]
    fix_hint: "Only load joblib files from trusted sources; consider ONNX export"
    fp_risk: LOW

  - id: SAST-004
    name: unsafe_shelve_open
    description: "shelve.open() uses pickle — code execution during deserialization"
    pattern: '(?i)shelve\.open\s*\('
    severity: HIGH
    cwe_ids: [CWE-502]
    fix_hint: "Replace with safer storage like SQLite or JSON"
    fp_risk: LOW

  - id: SAST-005
    name: unsafe_yaml_load
    description: "yaml.load() without Loader can execute arbitrary Python via !!python tags"
    pattern: '(?i)yaml\.load\s*\([^)]*(?:(?!Loader)[^)])*\)'
    severity: HIGH
    cwe_ids: [CWE-502]
    fix_hint: "Use yaml.safe_load() instead"
    fp_risk: MEDIUM

  - id: SAST-006
    name: unsafe_numpy_load
    description: "numpy.load() with allow_pickle=True enables pickle deserialization"
    pattern: '(?i)(?:np|numpy)\.load\s*\([^)]*allow_pickle\s*=\s*True'
    severity: HIGH
    cwe_ids: [CWE-502]
    fix_hint: "Use allow_pickle=False (default since NumPy 1.16.3)"
    fp_risk: LOW

  - id: SAST-007
    name: unsafe_keras_load_safe_mode_off
    description: "Keras model load with safe_mode=False enables Lambda layer code execution"
    pattern: '(?i)(?:keras|tf\.keras)\.(?:models\.)?load_model\s*\([^)]*safe_mode\s*=\s*False'
    severity: CRITICAL
    cwe_ids: [CWE-502, CWE-94]
    fix_hint: "Never set safe_mode=False when loading untrusted models"
    fp_risk: LOW
    references:
      - "https://blog.huntr.com/hunting-vulnerabilities-in-keras-model-deserialization"

  - id: SAST-008
    name: unsafe_keras_load_legacy
    description: "Loading legacy HDF5/H5 Keras models — potential unsafe deserialization"
    pattern: '(?i)(?:keras|tf\.keras)\.(?:models\.)?load_model\s*\([^)]*\.h(?:df)?5[''"]'
    severity: HIGH
    cwe_ids: [CWE-502]
    fix_hint: "Convert to .keras format with safe_mode=True; audit for Lambda layers"
    fp_risk: MEDIUM
    references:
      - "https://blog.huntr.com/hunting-vulnerabilities-in-keras-model-deserialization"

  - id: SAST-009
    name: unsafe_tf_saved_model
    description: "Loading TensorFlow SavedModel from untrusted source"
    pattern: '(?i)tf\.saved_model\.load\s*\('
    severity: MEDIUM
    cwe_ids: [CWE-502]
    fix_hint: "Only load SavedModels from trusted sources; verify model signatures"
    fp_risk: HIGH

  - id: SAST-010
    name: unsafe_onnx_load
    description: "Loading ONNX models with custom ops — potential native code execution"
    pattern: '(?i)(?:onnx\.load|onnxruntime\.InferenceSession)\s*\('
    severity: MEDIUM
    cwe_ids: [CWE-502]
    fix_hint: "Validate model graph before inference; check for custom ops"
    fp_risk: HIGH
    references:
      - "https://blog.huntr.com/hunting-vulnerabilities-in-machine-learning-model-file-formats"

  - id: SAST-011
    name: unsafe_marshal_loads
    description: "marshal.loads() can execute bytecode — used in Keras Lambda exploits"
    pattern: '(?i)marshal\.loads?\s*\('
    severity: CRITICAL
    cwe_ids: [CWE-502]
    fix_hint: "Never use marshal with untrusted data"
    fp_risk: LOW
    references:
      - "https://blog.huntr.com/hunting-vulnerabilities-in-keras-model-deserialization"

  - id: SAST-012
    name: unsafe_dill_load
    description: "dill.load() extends pickle with more object types — same RCE risks"
    pattern: '(?i)dill\.(?:load|loads)\s*\('
    severity: CRITICAL
    cwe_ids: [CWE-502]
    fix_hint: "Replace dill with safer serialization"
    fp_risk: LOW

  - id: SAST-013
    name: unsafe_cloudpickle_load
    description: "cloudpickle.load() — pickle variant used in distributed ML"
    pattern: '(?i)cloudpickle\.(?:load|loads)\s*\('
    severity: CRITICAL
    cwe_ids: [CWE-502]
    fix_hint: "Only deserialize cloudpickle from trusted sources"
    fp_risk: LOW

  # ─── Code Injection / Dynamic Execution ──────────────────────────────
  - id: SAST-020
    name: eval_llm_output
    description: "eval() or exec() on potentially untrusted LLM output"
    pattern: '(?<!\w)(?<!def )(?<!\.)(?:eval|exec)\s*\([^)]*\b(?:response|output|result|completion|message|text|content|llm|gpt|chat)\b'
    severity: CRITICAL
    cwe_ids: [CWE-94, CWE-95]
    fix_hint: "Never eval/exec LLM output; use structured parsers (JSON, regex)"
    fp_risk: LOW

  - id: SAST-020b
    name: bare_eval_exec
    description: "Bare eval() or exec() call — potential code injection"
    pattern: '(?<!\w)(?<!def )(?<!\.)(?:eval|exec)\s*\('
    severity: HIGH
    cwe_ids: [CWE-94, CWE-95]
    fix_hint: "Avoid eval/exec; use ast.literal_eval() or structured parsers"
    fp_risk: MEDIUM
    exclude_pattern: '(?:def \w*eval|def \w*exec|\.\w*eval\s*\(|\.\w*exec\s*\(|subprocess_exec|create_subprocess_exec|_assert_geval|\.eval\(\))'

  - id: SAST-020c
    name: getattr_exec_obfuscation
    description: "getattr() used to indirectly call exec/eval — obfuscated code execution"
    pattern: 'getattr\s*\([^,]+,\s*[''"](\w*)(?:exec|eval|system|popen|__import__|compile)[''"](\w*)'
    severity: CRITICAL
    cwe_ids: [CWE-94, CWE-95]
    fix_hint: "getattr-based exec/eval is an obfuscation technique; never call exec/eval indirectly on untrusted data"
    fp_risk: LOW

  - id: SAST-020d
    name: base64_exec_chain
    description: "base64.b64decode() result passed to exec/eval — obfuscated payload execution"
    pattern: '(?i)b64decode\s*\([^)]*\)[^\n#]*(?:exec|eval|system)\s*\(|getattr[^\n]*b64decode|b64decode[^\n]*getattr'
    severity: CRITICAL
    cwe_ids: [CWE-94, CWE-506]
    fix_hint: "Executing base64-decoded content is a malware obfuscation technique; inspect and remove"
    fp_risk: LOW

  - id: SAST-020e
    name: getattr_dangerous_module
    description: "getattr() on os/subprocess/sys/builtins module — indirect dangerous function call, possibly with string obfuscation"
    pattern: 'getattr\s*\(\s*(?:os|subprocess|sys|builtins|importlib|shutil|ctypes|socket)\s*,'
    severity: HIGH
    cwe_ids: [CWE-94, CWE-78]
    fix_hint: "Calling getattr on system modules is a common obfuscation technique to hide exec/system/popen calls; use direct, explicit calls instead"
    fp_risk: MEDIUM

  - id: SAST-021
    name: compile_exec
    description: "compile() + exec() pattern — dynamic code execution"
    pattern: '(?i)compile\s*\([^)]*\)\s*.*exec\s*\('
    severity: CRITICAL
    cwe_ids: [CWE-94]
    fix_hint: "Avoid dynamic code compilation with untrusted input"
    fp_risk: MEDIUM

  - id: SAST-022
    name: subprocess_shell_true
    description: "subprocess with shell=True — command injection risk"
    pattern: '(?i)subprocess\.(?:Popen|run|call|check_output)\s*\([^)]*shell\s*=\s*True'
    severity: HIGH
    cwe_ids: [CWE-78]
    fix_hint: "Use shell=False with argument list instead"
    fp_risk: MEDIUM

  - id: SAST-023
    name: os_system_call
    description: "os.system() call — command injection risk"
    pattern: '(?i)os\.system\s*\('
    severity: HIGH
    cwe_ids: [CWE-78]
    fix_hint: "Use subprocess.run() with shell=False"
    fp_risk: LOW

  - id: SAST-023b
    name: os_popen_call
    description: "os.popen() — command execution via shell pipe, equivalent to os.system()"
    pattern: '(?i)\bos\.popen\s*\('
    severity: HIGH
    cwe_ids: [CWE-78]
    fix_hint: "Replace os.popen() with subprocess.run(shell=False) and capture stdout via PIPE"
    fp_risk: LOW

  - id: SAST-096
    name: vars_dict_exec
    description: "vars() used to access dangerous function by string key — obfuscated dynamic dispatch"
    pattern: '(?i)\bvars\s*\([^)]*\)\s*\[\s*["\x27](?:system|exec|popen|call|run|spawn|execve|execfile|compile)["\x27]'
    severity: CRITICAL
    cwe_ids: [CWE-94, CWE-78]
    fix_hint: "vars()[\"system\"] is an obfuscation pattern; use direct function calls from an explicit allowlist"
    fp_risk: LOW

  - id: SAST-097
    name: globals_builtins_exec
    description: "globals()/__builtins__ used to indirectly call exec/eval — runtime globals injection"
    pattern: '(?i)globals\s*\(\s*\)\s*\[|__builtins__\s*\[|\bgetattr\s*\(\s*globals\s*\(\s*\)'
    severity: CRITICAL
    cwe_ids: [CWE-94, CWE-95]
    fix_hint: "Accessing builtins via globals() or __builtins__ dict is a sandbox-escape pattern; avoid dynamic dispatch through runtime globals"
    fp_risk: LOW

  - id: SAST-098
    name: ctypes_system_call
    description: "ctypes used to directly call libc system() — native code execution bypass"
    pattern: '(?i)ctypes\.(?:CDLL|cdll|LibraryLoader|WinDLL|OleDLL|PyDLL)\s*\(|ctypes\.c_char_p\b.*(?:system|exec|popen)|(?:libc|libm|ntdll)\.system\s*\('
    severity: CRITICAL
    cwe_ids: [CWE-78, CWE-676]
    fix_hint: "Direct ctypes calls to libc.system() bypass all Python-level security; avoid ctypes for shell execution"
    fp_risk: MEDIUM

  - id: SAST-099
    name: pty_spawn
    description: "pty.spawn() — spawns an interactive shell, common in reverse-shell payloads"
    pattern: '(?i)\bpty\.spawn\s*\('
    severity: CRITICAL
    cwe_ids: [CWE-78]
    fix_hint: "pty.spawn is used in interactive shell and reverse-shell exploits; remove this call"
    fp_risk: LOW

  - id: SAST-100
    name: subprocess_getoutput
    description: "subprocess.getoutput()/getstatusoutput() — executes shell command, bypasses shell=False check"
    pattern: '(?i)\bsubprocess\.(?:getoutput|getstatusoutput)\s*\('
    severity: HIGH
    cwe_ids: [CWE-78]
    fix_hint: "subprocess.getoutput() uses shell=True internally; use subprocess.run(shell=False, capture_output=True) instead"
    fp_risk: LOW

  - id: SAST-024
    name: importlib_import
    description: "Dynamic module import via importlib — arbitrary code loading risk"
    pattern: '(?i)importlib\.import_module\s*\('
    severity: MEDIUM
    cwe_ids: [CWE-94]
    fix_hint: "Only import from a validated allowlist of modules"
    fp_risk: HIGH
    references:
      - "https://blog.huntr.com/hunting-vulnerabilities-in-keras-model-deserialization"

  # ─── Hardcoded Secrets ───────────────────────────────────────────────
  - id: SAST-030
    name: hardcoded_openai_key
    description: "Hardcoded OpenAI API key in source code"
    pattern: '(?:''|"|`)sk-[a-zA-Z0-9]{20,}(?:''|"|`)'
    severity: CRITICAL
    cwe_ids: [CWE-798]
    fix_hint: "Use environment variables: os.environ['OPENAI_API_KEY']"
    fp_risk: LOW

  - id: SAST-031
    name: hardcoded_anthropic_key
    description: "Hardcoded Anthropic API key in source code"
    pattern: '(?:''|"|`)sk-ant-[a-zA-Z0-9\-]{20,}(?:''|"|`)'
    severity: CRITICAL
    cwe_ids: [CWE-798]
    fix_hint: "Use environment variables: os.environ['ANTHROPIC_API_KEY']"
    fp_risk: LOW

  - id: SAST-032
    name: hardcoded_aws_key
    description: "Hardcoded AWS credentials in source code"
    pattern: '(?:''|"|`)AKIA[A-Z0-9]{16}(?:''|"|`)'
    severity: CRITICAL
    cwe_ids: [CWE-798]
    fix_hint: "Use AWS credentials file, IAM roles, or environment variables"
    fp_risk: LOW

  - id: SAST-033
    name: hardcoded_generic_secret
    description: "Generic hardcoded secret assignment"
    pattern: '(?i)(?:api_key|apikey|secret_key|password|token|auth_token)\s*=\s*[''"][^\s''"]{8,}[''"]'
    severity: HIGH
    cwe_ids: [CWE-798]
    fix_hint: "Use environment variables or a secrets manager"
    fp_risk: MEDIUM
    exclude_path_patterns:
      - 'test[s_]'
      - 'fixture'
      - 'demo'
      - 'example'
      - 'mock'
    exclude_value_patterns:
      - 'csrf_token'
      - 'test'
      - 'dummy'
      - 'placeholder'
      - 'changeme'
      - 'xxxxxxx'
      - '<[|｜][^>]{1,40}[|｜]>'
      - '=\s*["\u0027]<[|｜]'

  # ─── Unsafe Network / Download ───────────────────────────────────────
  - id: SAST-040
    name: unsafe_model_download
    description: "Downloading model from URL without integrity verification"
    pattern: '(?i)(?:urllib|requests|wget|curl|httpx)\.(?:get|urlretrieve|download)\s*\([^)]*(?:model|weights|checkpoint)'
    severity: MEDIUM
    cwe_ids: [CWE-494]
    fix_hint: "Verify SHA256 hash after download; use signed URLs"
    fp_risk: HIGH

  - id: SAST-041
    name: http_model_download
    description: "Model download over plain HTTP (no TLS)"
    pattern: '(?:''|"|`)http://[^''"`]*(?:model|weights|checkpoint|\.(?:pt|pth|pkl|gguf|bin|safetensors))'
    severity: HIGH
    cwe_ids: [CWE-319]
    fix_hint: "Always use HTTPS for model downloads"
    fp_risk: LOW

  # ─── Archive / Path Traversal ────────────────────────────────────────
  - id: SAST-050
    name: unsafe_extractall
    description: "Archive extractall() without path validation — archive slip risk"
    pattern: '(?i)\.extractall\s*\('
    severity: HIGH
    cwe_ids: [CWE-22]
    fix_hint: "Validate each member path before extraction; reject entries with ../ or absolute paths"
    fp_risk: MEDIUM
    references:
      - "https://blog.huntr.com/pivoting-archive-slip-bugs-into-high-value-ai-ml-bounties"

  - id: SAST-051
    name: unsafe_tarfile_extract
    description: "tarfile extract without member filtering — symlink and path traversal"
    pattern: '(?i)\.extractall\s*\(\s*(?!.*filter\s*=)'
    severity: HIGH
    cwe_ids: [CWE-22, CWE-59]
    fix_hint: "Use tarfile.extractall(filter='data') (Python 3.12+) or validate members"
    fp_risk: MEDIUM
    references:
      - "https://blog.huntr.com/pivoting-archive-slip-bugs-into-high-value-ai-ml-bounties"

  # ─── Prompt Construction ─────────────────────────────────────────────
  - id: SAST-060
    name: unvalidated_prompt_construction
    description: "User input directly interpolated into prompt template"
    pattern: '(?i)(?:prompt|system_message|instruction)\s*=\s*f[''"].*\{.*(?:user_input|query|message|request|input)'
    severity: HIGH
    cwe_ids: [CWE-74]
    fix_hint: "Sanitize user input; use parameterized prompt templates"
    fp_risk: HIGH

  - id: SAST-061
    name: prompt_format_injection
    description: "String format() with user input in prompt"
    pattern: '(?i)(?:prompt|template|instruction).*\.format\s*\(.*(?:user|input|query)'
    severity: MEDIUM
    cwe_ids: [CWE-74]
    fix_hint: "Use parameterized templates with explicit escaping"
    fp_risk: HIGH

  # ─── LLM Output Handling ────────────────────────────────────────────
  - id: SAST-070
    name: unescaped_llm_html_output
    description: "LLM output directly rendered as HTML — XSS risk"
    pattern: '(?i)(?:innerHTML|dangerouslySetInnerHTML|Markup|safe)\s*[=({]\s*.*(?:response|output|completion|result)'
    severity: HIGH
    cwe_ids: [CWE-79]
    fix_hint: "Always HTML-escape LLM output before rendering"
    fp_risk: MEDIUM

  - id: SAST-071
    name: llm_output_sql
    description: "LLM output used in SQL query construction"
    pattern: '(?i)(?:cursor|conn(?:ection)?|db|engine|session|connection)\s*\.(?:execute|executemany|query)\s*\(.*(?:response|output|completion|generated|result)'
    severity: CRITICAL
    cwe_ids: [CWE-89]
    fix_hint: "Never use LLM output in raw SQL; use parameterized queries"
    fp_risk: LOW

  - id: SAST-080
    name: weak_hash_md5
    description: "MD5 used for security-sensitive hashing — collision-vulnerable"
    pattern: '(?i)(?:hashlib\.md5|MD5(?:Hash)?|new\s*\(\s*["'']md5["'']|DigestUtils\.md5|MessageDigest\.getInstance\s*\(\s*["'']MD5["''])'
    severity: HIGH
    cwe_ids: [CWE-327]
    fix_hint: "Replace MD5 with SHA-256 or SHA-3 for security hashing"
    fp_risk: MEDIUM

  - id: SAST-081
    name: weak_hash_sha1
    description: "SHA-1 used for security-sensitive hashing — broken for collision resistance"
    pattern: '(?i)(?:hashlib\.sha1|SHA1(?:Hash)?|new\s*\(\s*["'']sha1["'']|DigestUtils\.sha1|MessageDigest\.getInstance\s*\(\s*["'']SHA-?1["''])'
    severity: MEDIUM
    cwe_ids: [CWE-327]
    fix_hint: "Replace SHA-1 with SHA-256 or SHA-3; SHA-1 is deprecated for signing"
    fp_risk: MEDIUM

  - id: SAST-082
    name: weak_cipher_des
    description: "DES/3DES block cipher — insecure key size"
    pattern: '(?i)(?:DES\.new|Cipher\.getInstance\s*\(\s*["'']DES["'']|CipherSuite\.TLS_RSA_WITH_3DES|from\s+Crypto\.Cipher\s+import\s+DES)'
    severity: HIGH
    cwe_ids: [CWE-327]
    fix_hint: "Use AES-256-GCM instead of DES/3DES"
    fp_risk: MEDIUM

  - id: SAST-083
    name: weak_cipher_rc4
    description: "RC4 stream cipher — cryptographically broken"
    pattern: '(?i)(?:RC4|ARC4|from\s+Crypto\.Cipher\s+import\s+ARC4|arcfour)'
    severity: HIGH
    cwe_ids: [CWE-327]
    fix_hint: "Replace RC4 with AES-256-GCM or ChaCha20-Poly1305"
    fp_risk: LOW

  - id: SAST-084
    name: static_iv_hardcoded
    description: "Hardcoded IV/nonce in symmetric encryption — breaks IND-CPA security"
    pattern: '(?i)(?:iv\s*=\s*["''][0-9a-fA-F]{16,32}["'']|nonce\s*=\s*["''][0-9a-fA-F]{24,32}["'']|IV\s*=\s*b["''][\x00-\xff]{8,}["''])'
    severity: HIGH
    cwe_ids: [CWE-329]
    fix_hint: "Always generate IVs/nonces randomly with os.urandom() or secrets module"
    fp_risk: LOW

  - id: SAST-085
    name: insecure_random_secret
    description: "random.random()/random.randint() used for secrets — not cryptographically secure"
    pattern: '(?i)(?:random\.random\(\)|random\.randint\(|random\.choice\().{0,80}(?:token|secret|key|password|salt|otp|code|pin|nonce)'
    severity: HIGH
    cwe_ids: [CWE-338]
    fix_hint: "Use secrets.token_hex() or os.urandom() for security-sensitive random values"
    fp_risk: MEDIUM

  # ─── Risky File Access ────────────────────────────────────────────────────────
  - id: SAST-090
    name: path_traversal_open
    description: "File open() with user-controlled path — path traversal risk"
    pattern: '(?i)(?:open\s*\(|Path\s*\(|pathlib\.Path\s*\().{0,60}(?:request\.|args\.|params\.|environ\.|getenv\(|user_input|untrusted|unvalidated)'
    severity: HIGH
    cwe_ids: [CWE-22]
    fix_hint: "Resolve and validate paths against an allowlist before opening; reject '...' sequences"
    fp_risk: HIGH

  - id: SAST-090b
    name: path_traversal_string_concat
    description: "File open() path built via string concatenation with a variable — path traversal risk"
    pattern: '(?i)(?:open|Path|pathlib\.Path)\s*\(\s*(?:["\x27][^"\x27]{1,60}["\x27]\s*\+|\w+\s*\+\s*["\x27])'
    severity: HIGH
    cwe_ids: [CWE-22]
    fix_hint: "Validate that the resolved path stays within the intended directory; use Path.resolve() and check against a base directory"
    fp_risk: MEDIUM

  - id: SAST-091
    name: arbitrary_file_write
    description: "File write with user-controlled filename — arbitrary write risk"
    pattern: '(?i)(?:open\s*\(.{0,60}(?:\"w\"|\"wb\"|\"a\"|\"ab\")\s*\)|write\s*\().{0,80}(?:request\.|args\.|params\.|user_input|untrusted|filename|filepath|path)'
    severity: HIGH
    cwe_ids: [CWE-73]
    fix_hint: "Validate and sanitize filenames; use a fixed output directory and reject path separators"
    fp_risk: HIGH

  - id: SAST-092
    name: unsafe_tempfile
    description: "tempfile.mktemp() — insecure temporary file with TOCTOU race"
    pattern: '(?i)tempfile\.mktemp\s*\('
    severity: MEDIUM
    cwe_ids: [CWE-377]
    fix_hint: "Use tempfile.mkstemp() or tempfile.NamedTemporaryFile() instead"
    fp_risk: LOW

  - id: SAST-093
    name: unsafe_zipslip
    description: "Zip/tar extraction without path validation — ZipSlip attack vector"
    pattern: '(?i)(?:\.extract\s*\(|\.extractall\s*\().{0,80}(?:member|path|name|arcname|filename)'
    severity: HIGH
    cwe_ids: [CWE-22]
    fix_hint: "Validate extracted paths to ensure they stay within the target directory"
    fp_risk: MEDIUM

  # ─── Supply Chain / Agent Skill Patterns (SAST-300 series) ────────────────────
  - id: SAST-300
    name: skill_hardcoded_webhook
