# =============================================================================
# Reverse Shell Detection (SAST-200–SAST-214)
# =============================================================================

  - id: SAST-200
    name: bash_dev_tcp_reverse_shell
    description: "bash /dev/tcp reverse shell — direct TCP connection back to attacker"
    pattern: '/dev/(?:tcp|udp)/[0-9a-zA-Z.\-]+/\d{1,5}'
    severity: CRITICAL
    cwe_ids: [CWE-78]
    fix_hint: "Remove /dev/tcp shell spawning; never include reverse shell commands in source code"
    fp_risk: LOW

  - id: SAST-201
    name: bash_interactive_redirect_shell
    description: "bash -i >& /dev/tcp ... 0>&1 interactive reverse shell pattern"
    pattern: 'bash\s+-[ic]\s+[''"].*(?:/dev/tcp|/dev/udp)'
    severity: CRITICAL
    cwe_ids: [CWE-78]
    fix_hint: "Remove bash redirect-based reverse shell; this is a clear backdoor indicator"
    fp_risk: LOW

  - id: SAST-202
    name: netcat_e_shell
