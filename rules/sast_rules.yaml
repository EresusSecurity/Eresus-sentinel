    fp_risk: MEDIUM

  - id: SAST-109
    name: ftplib_usage
    description: "ftplib import or usage — FTP sends credentials in plaintext and enables data exfiltration"
    pattern: '(?i)(?:import\s+ftplib|from\s+ftplib\s+import|ftplib\.FTP\s*\()'
    severity: HIGH
    cwe_ids: [CWE-321, CWE-319]
    fix_hint: "FTP transmits data and credentials in cleartext; use SFTP/SCP or HTTPS instead"
    fp_risk: LOW

  - id: SAST-260
    name: telnetlib_usage
    description: "telnetlib import or usage — Telnet is an unencrypted protocol, deprecated in Python 3.11"
    pattern: '(?i)(?:import\s+telnetlib|from\s+telnetlib\s+import|telnetlib\.Telnet\s*\()'
    severity: HIGH
    cwe_ids: [CWE-319]
    fix_hint: "telnetlib is deprecated and unencrypted; replace with paramiko SSH or similar"
    fp_risk: LOW

  - id: SAST-261
    name: path_traversal_literal
    description: "Literal path traversal sequence '../' in a string argument — directory traversal attempt"
    pattern: "(?:[\"'])[^\n]*\\.\\.[/\\\\][^\n]*(?:[\"'])"
    severity: HIGH
    cwe_ids: [CWE-22]
    fix_hint: "Sanitize all user-supplied paths with os.path.abspath and verify they start with the intended base directory"
    fp_risk: MEDIUM

  - id: SAST-262
    name: embedded_binary_magic_in_code
    description: "PE (MZ) or ELF magic bytes as Python byte-string literal — potential executable dropper payload"
    pattern: 'b["\x27](?:\\x4d\\x5a|MZ|\\x7fELF)["\x27]'
    severity: CRITICAL
    cwe_ids: [CWE-506, CWE-94]
    fix_hint: "Embedding PE/ELF binary magic in source code is a dropper pattern; remove immediately"
    fp_risk: LOW

  - id: SAST-263
    name: rot13_obfuscation
    description: "codecs.decode with rot_13 or rot13 — simple Caesar cipher used to obfuscate malicious strings"
    pattern: '(?i)codecs\s*\.\s*(?:decode|encode)\s*\([^,)]+,\s*["\x27]rot.?1[3]\b'
    severity: MEDIUM
    cwe_ids: [CWE-693]
    fix_hint: "ROT13 encoding of code strings is a common obfuscation technique in malicious payloads; review context"
    fp_risk: MEDIUM

  - id: SAST-264
    name: xor_byte_obfuscation
    description: "Single-byte XOR loop over bytes — common obfuscation/deobfuscation technique in shellcode/loaders"
    pattern: '(?i)(?:for\s+\w+\s+in\s+\w+\s*:\s*\w+\s*\^\s*0x[0-9a-f]+|bytes\s*\(\s*\w+\s*\^\s*\w+\s+for)'
    severity: MEDIUM
    cwe_ids: [CWE-693]
    fix_hint: "XOR byte-level obfuscation loops are commonly used to hide shellcode; verify this is not deobfuscating a payload"
    fp_risk: HIGH

  - id: SAST-265
    name: nested_encoded_pickle
    description: "pickle.loads() applied to a base64/zlib decoded payload — nested encoded pickle is an RCE evasion pattern"
    pattern: '(?i)pickle\s*\.\s*loads\s*\(\s*(?:base64|b64decode|zlib\.decompress|binascii\.unhexlify)'
    severity: CRITICAL
    cwe_ids: [CWE-502, CWE-693]
    fix_hint: "Nested encoded pickle is a known sandbox-evasion technique; never deserialize attacker-controlled data"
    fp_risk: LOW

  - id: SAST-116
    name: pickle_dos_expansion
    description: "pickle.loads() called on data with a MEMO/GET ratio pattern or deeply nested REDUCE — pickle expansion DoS"
    pattern: '(?i)(?:pickle\s*\.\s*loads|pickletools\s*\.\s*genops)\s*\('
    severity: MEDIUM
    cwe_ids: [CWE-502, CWE-400]
    fix_hint: "Deserializing untrusted pickle data can cause denial-of-service via memory expansion; use safe formats like JSON/safetensors"
    fp_risk: HIGH
