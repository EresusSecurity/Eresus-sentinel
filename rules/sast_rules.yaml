  - id: SAST-206
    name: perl_reverse_shell
    description: "Perl use Socket; connect() reverse shell"
    pattern: 'perl\s+-e\s+[''"].*use\s+Socket.*connect'
    severity: CRITICAL
    cwe_ids: [CWE-78]
    fix_hint: "Remove Perl socket reverse shell; audit all one-liner command invocations"
    fp_risk: LOW

  - id: SAST-207
    name: ruby_rsocket_shell
    description: "Ruby -rsocket reverse shell one-liner"
    pattern: 'ruby\s+-rsocket\s+-e'
    severity: CRITICAL
    cwe_ids: [CWE-78]
    fix_hint: "Remove Ruby socket reverse shell"
    fp_risk: LOW

  - id: SAST-208
    name: php_fsockopen_shell
    description: "PHP fsockopen()-based reverse shell"
    pattern: 'php\s+-r\s+[''"].*fsockopen'
    severity: CRITICAL
    cwe_ids: [CWE-78]
    fix_hint: "Remove PHP reverse shell from scripts; enforce PHP code review"
    fp_risk: LOW

  - id: SAST-209
    name: powershell_tcp_client
    description: "PowerShell New-Object Net.Sockets.TCPClient reverse shell"
    pattern: '(?i)powershell.*New-Object.*Net\.Sockets\.TCPClient'
    severity: CRITICAL
    cwe_ids: [CWE-78]
    fix_hint: "Remove PowerShell TCPClient reverse shell from all scripts"
    fp_risk: LOW

  - id: SAST-210
    name: powershell_encoded_command
    description: "PowerShell -EncodedCommand base64 obfuscation"
    pattern: '(?i)powershell(?:\.exe)?\s+(?:-[Ee]nc(?:odedCommand)?|-[Ee])\s+'
    severity: CRITICAL
    cwe_ids: [CWE-78, CWE-116]
    fix_hint: "Avoid PowerShell -EncodedCommand in production; use plain scripts with logging"
