# Eresus Sentinel — Enterprise Secrets Scanner Configuration
# 120+ provider-specific patterns for hardcoded credential detection
# Used by: sentinel/sast/secrets_scanner.py
#
# Categories:
#   cloud: AWS, GCP, Azure
#   devops: GitHub, GitLab, Bitbucket, Docker, CircleCI
#   payment: Stripe, Square, PayPal, Braintree
#   messaging: Slack, Discord, Telegram, Twilio, SendGrid
#   database: PostgreSQL, MySQL, MongoDB, Redis, Firebase
#   ai: OpenAI, Anthropic, Cohere, HuggingFace, Replicate
#   auth: OAuth, JWT, SAML, Auth0, Okta
#   monitoring: Datadog, New Relic, Sentry, PagerDuty
#   storage: Supabase, Cloudflare, Vercel, Netlify
#   crypto: Ethereum, Solana, Coinbase
#   generic: Private keys, passwords, connection strings

patterns:
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # CLOUD PROVIDERS
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  cloud:
    - id: SEC-AWS-001
      name: AWS Access Key ID
      pattern: '(?:AKIA|ASIA)[A-Z0-9]{16}'
      severity: CRITICAL
      description: AWS access key (AKIA/ASIA prefix)

    - id: SEC-AWS-002
      name: AWS Secret Access Key
      pattern: '(?i)(?:aws_secret_access_key|aws_secret_key)\s*[=:]\s*["\x27]?([A-Za-z0-9/+=]{40})["\x27]?'
      severity: CRITICAL
      description: AWS secret access key

    - id: SEC-AWS-003
      name: AWS Session Token
      pattern: '(?i)aws_session_token\s*[=:]\s*["\x27]?([A-Za-z0-9/+=]{100,})["\x27]?'
      severity: CRITICAL
      description: AWS temporary session token

    - id: SEC-AWS-004
      name: AWS MWS Auth Token
      pattern: 'amzn\.mws\.[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}'
      severity: CRITICAL
      description: Amazon MWS authentication token

    - id: SEC-GCP-001
      name: GCP API Key
      pattern: 'AIza[A-Za-z0-9_\-]{35}'
      severity: CRITICAL
      description: Google Cloud API key

    - id: SEC-GCP-002
      name: GCP OAuth Client Secret
      pattern: '(?i)client_secret\s*[=:]\s*["\x27]?([A-Za-z0-9_\-]{24,})["\x27]?'
      severity: HIGH
      description: GCP OAuth2 client secret

    - id: SEC-GCP-003
      name: GCP Service Account Key
      pattern: '"type"\s*:\s*"service_account"[^}]*"private_key"\s*:\s*"-----BEGIN'
      severity: CRITICAL
      description: GCP service account JSON key file with embedded private key

    - id: SEC-AZ-001
      name: Azure Storage Account Key
      pattern: '(?i)(?:AccountKey|azure_storage_key)\s*[=:]\s*["\x27]?([A-Za-z0-9/+=]{88})["\x27]?'
      severity: CRITICAL
      description: Azure Storage account key (base64, 88 chars)

    - id: SEC-AZ-002
      name: Azure AD Client Secret
      pattern: '(?i)(?:client_secret|azure_client_secret)\s*[=:]\s*["\x27]?([A-Za-z0-9~._\-]{34,})["\x27]?'
      severity: CRITICAL
      description: Azure Active Directory client secret

    - id: SEC-AZ-003
      name: Azure Connection String
      pattern: '(?i)DefaultEndpointsProtocol=https?;AccountName=[^;]+;AccountKey=[A-Za-z0-9/+=]+'
      severity: CRITICAL
      description: Azure Storage connection string

    - id: SEC-AZ-004
      name: Azure SAS Token
      pattern: '(?i)[?&]sig=[A-Za-z0-9%/+=]+&se=\d+'
      severity: HIGH
      description: Azure Shared Access Signature

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # DEVOPS & CI/CD
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  devops:
    - id: SEC-GH-001
      name: GitHub Personal Access Token
      pattern: 'ghp_[A-Za-z0-9]{36}'
      severity: CRITICAL
      description: GitHub PAT (classic)

    - id: SEC-GH-002
      name: GitHub Fine-Grained Token
      pattern: 'github_pat_[A-Za-z0-9]{22}_[A-Za-z0-9]{59}'
      severity: CRITICAL
      description: GitHub fine-grained PAT

    - id: SEC-GH-003
      name: GitHub OAuth Access Token
      pattern: 'gho_[A-Za-z0-9]{36}'
      severity: HIGH
      description: GitHub OAuth access token

    - id: SEC-GH-004
      name: GitHub App Token
      pattern: '(?:ghu|ghs)_[A-Za-z0-9]{36}'
      severity: HIGH
      description: GitHub user/server-to-server installation token

    - id: SEC-GH-005
      name: GitHub App Private Key
      pattern: '-----BEGIN RSA PRIVATE KEY-----[\s\S]{100,}-----END RSA PRIVATE KEY-----'
      severity: CRITICAL
      description: GitHub App RSA private key

    - id: SEC-GL-001
      name: GitLab Personal Access Token
      pattern: 'glpat-[A-Za-z0-9_\-]{20,}'
      severity: CRITICAL
      description: GitLab PAT

    - id: SEC-GL-002
      name: GitLab Pipeline Token
      pattern: 'glptt-[A-Za-z0-9]{20,}'
      severity: HIGH
      description: GitLab pipeline trigger token

    - id: SEC-GL-003
      name: GitLab Runner Token
      pattern: 'GR1348941[A-Za-z0-9_\-]{20,}'
      severity: HIGH
      description: GitLab runner registration token

    - id: SEC-BB-001
      name: Bitbucket App Password
      pattern: '(?i)bitbucket.*[=:]\s*["\x27]?([A-Za-z0-9]{18,})["\x27]?'
      severity: HIGH
      description: Bitbucket app password

    - id: SEC-DH-001
      name: Docker Hub Token
      pattern: 'dckr_pat_[A-Za-z0-9_\-]{20,}'
      severity: HIGH
      description: Docker Hub personal access token

    - id: SEC-CI-001
      name: CircleCI API Token
      pattern: '(?i)circle.*token\s*[=:]\s*["\x27]?([a-f0-9]{40})["\x27]?'
      severity: HIGH
      description: CircleCI personal API token

    - id: SEC-TR-001
      name: Travis CI API Token
      pattern: '(?i)travis.*token\s*[=:]\s*["\x27]?([A-Za-z0-9]{22})["\x27]?'
      severity: HIGH
      description: Travis CI API token

    - id: SEC-NPM-001
      name: NPM Access Token
      pattern: 'npm_[A-Za-z0-9]{36}'
      severity: CRITICAL
      description: NPM registry access token

    - id: SEC-PYPI-001
      name: PyPI API Token
      pattern: 'pypi-[A-Za-z0-9_]{100,}'
      severity: CRITICAL
      description: PyPI API token

    - id: SEC-NUGET-001
      name: NuGet API Key
      pattern: 'oy2[A-Za-z0-9]{43}'
      severity: HIGH
      description: NuGet gallery API key

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # PAYMENT PROCESSORS
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  payment:
    - id: SEC-STRIPE-001
      name: Stripe Secret Key
      pattern: 'sk_(?:live|test)_[A-Za-z0-9]{24,}'
      severity: CRITICAL
      description: Stripe API secret key

    - id: SEC-STRIPE-002
      name: Stripe Publishable Key
      pattern: 'pk_(?:live|test)_[A-Za-z0-9]{24,}'
      severity: INFO
      description: Stripe publishable key (public, safe to expose — not a secret)

    - id: SEC-STRIPE-003
      name: Stripe Restricted Key
      pattern: 'rk_(?:live|test)_[A-Za-z0-9]{24,}'
      severity: HIGH
      description: Stripe restricted API key

    - id: SEC-STRIPE-004
      name: Stripe Webhook Secret
      pattern: 'whsec_[A-Za-z0-9]{32,}'
      severity: HIGH
      description: Stripe webhook signing secret

    - id: SEC-ANTH-001
      name: Anthropic API Key
      pattern: 'sk-ant-api[0-9]{2}-[A-Za-z0-9_\-]{40,}'
      severity: CRITICAL
      description: Anthropic Claude API secret key

    - id: SEC-STRIPE-005
      name: Stripe Key Prefix (partial / split string)
      pattern: 'sk_(?:live|test)_[A-Za-z0-9]{6,23}(?![A-Za-z0-9])'
      severity: MEDIUM
      description: Partial Stripe secret key (too short for full match) — may be a multiline string split across literals; concatenation reconstructs the full key

    - id: SEC-SQ-001
      name: Square Access Token
      pattern: 'sq0atp-[A-Za-z0-9_\-]{22}'
      severity: CRITICAL
      description: Square access token

    - id: SEC-SQ-002
      name: Square OAuth Secret
      pattern: 'sq0csp-[A-Za-z0-9_\-]{43}'
      severity: CRITICAL
      description: Square OAuth application secret

    - id: SEC-PP-001
      name: PayPal Client Secret
      pattern: '(?i)paypal.*secret\s*[=:]\s*["\x27]?([A-Za-z0-9_\-]{32,})["\x27]?'
      severity: CRITICAL
      description: PayPal REST API client secret

    - id: SEC-BT-001
      name: Braintree Access Token
      pattern: 'access_token\$(?:production|sandbox)\$[a-z0-9]{16}\$[a-f0-9]{32}'
      severity: CRITICAL
      description: Braintree payment gateway access token

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # MESSAGING & COMMUNICATION
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  messaging:
    - id: SEC-SLACK-001
      name: Slack Bot Token
      pattern: 'xoxb-[A-Za-z0-9\-]{10,}'
      severity: CRITICAL
      description: Slack bot user OAuth token

    - id: SEC-SLACK-002
      name: Slack User Token
      pattern: 'xoxp-[A-Za-z0-9\-]{10,}'
      severity: CRITICAL
      description: Slack user OAuth token

    - id: SEC-SLACK-003
      name: Slack App Token
      pattern: 'xapp-[0-9]+-[A-Za-z0-9\-]{10,}'
      severity: HIGH
      description: Slack app-level token

    - id: SEC-SLACK-004
      name: Slack Webhook URL
      pattern: 'https://hooks\.slack\.com/services/T[A-Z0-9]+/B[A-Z0-9]+/[A-Za-z0-9]+'
      severity: HIGH
      description: Slack incoming webhook URL

    - id: SEC-DISC-001
      name: Discord Bot Token
      pattern: '(?:Bot\s+)?[MN][A-Za-z0-9]{23,}\.[A-Za-z0-9_\-]{6}\.[A-Za-z0-9_\-]{27,}'
      severity: CRITICAL
      description: Discord bot authentication token

    - id: SEC-DISC-002
      name: Discord Webhook URL
      pattern: 'https://discord(?:app)?\.com/api/webhooks/\d+/[A-Za-z0-9_\-]+'
      severity: HIGH
      description: Discord webhook URL

    - id: SEC-TG-001
      name: Telegram Bot Token
      pattern: '\d{8,10}:[A-Za-z0-9_\-]{35}'
      severity: CRITICAL
      description: Telegram Bot API token

    - id: SEC-TWIL-001
      name: Twilio API Key
      pattern: 'SK[a-f0-9]{32}'
      severity: CRITICAL
      description: Twilio API key SID

    - id: SEC-TWIL-002
      name: Twilio Auth Token
      pattern: '(?i)twilio.*(?:auth_token|secret)\s*[=:]\s*["\x27]?([a-f0-9]{32})["\x27]?'
      severity: CRITICAL
      description: Twilio account auth token

    - id: SEC-SG-001
      name: SendGrid API Key
      pattern: 'SG\.[A-Za-z0-9_\-]{22}\.[A-Za-z0-9_\-]{43}'
      severity: CRITICAL
      description: SendGrid API key

    - id: SEC-MG-001
      name: Mailgun API Key
      pattern: 'key-[a-f0-9]{32}'
      severity: CRITICAL
      description: Mailgun API key

    - id: SEC-MC-001
      name: Mailchimp API Key
      pattern: '[a-f0-9]{32}-us[0-9]{1,2}'
      severity: HIGH
      description: Mailchimp marketing API key

    - id: SEC-POST-001
      name: Postmark Server Token
      pattern: '(?i)postmark.*token\s*[=:]\s*["\x27]?([a-f0-9\-]{36})["\x27]?'
      severity: HIGH
      description: Postmark transactional email server token

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # DATABASE & STORAGE
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  database:
    - id: SEC-PG-001
      name: PostgreSQL Connection String
      pattern: 'postgres(?:ql)?://[^:]+:[^@]+@[^/]+'
      severity: CRITICAL
      description: PostgreSQL connection string with credentials

    - id: SEC-MY-001
      name: MySQL Connection String
      pattern: 'mysql://[^:]+:[^@]+@[^/]+'
      severity: CRITICAL
      description: MySQL connection string with credentials

    - id: SEC-MONGO-001
      name: MongoDB Connection String
      pattern: 'mongodb(?:\+srv)?://[^:]+:[^@]+@[^/]+'
      severity: CRITICAL
      description: MongoDB connection string with credentials

    - id: SEC-REDIS-001
      name: Redis Connection URL
      pattern: 'redis(?:s)?://[^:]*:[^@]+@[^/]+'
      severity: CRITICAL
      description: Redis connection URL with password

    - id: SEC-FB-001
      name: Firebase API Key
      pattern: '(?i)firebase.*api_?key\s*[=:]\s*["\x27]?([A-Za-z0-9_\-]{39})["\x27]?'
      severity: HIGH
      description: Firebase web API key

    - id: SEC-FB-002
      name: Firebase Service Account
      pattern: '(?i)firebase.*private_key.*-----BEGIN'
      severity: CRITICAL
      description: Firebase Admin SDK private key

    - id: SEC-SB-001
      name: Supabase Service Role Key
      pattern: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9\.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6'
      severity: CRITICAL
      description: Supabase service_role JWT (full DB access)

    - id: SEC-SB-002
      name: Supabase Anon Key
      pattern: '(?i)supabase.*(?:anon|public).*key\s*[=:]\s*["\x27]?(eyJ[A-Za-z0-9_\-]+\.eyJ[A-Za-z0-9_\-]+\.[A-Za-z0-9_\-]+)["\x27]?'
      severity: MEDIUM
      description: Supabase anonymous/public key

    - id: SEC-DYNAMO-001
      name: DynamoDB/Generic Connection String
      pattern: '(?i)(?:dynamodb|cosmosdb|couchdb).*(?:key|secret|password)\s*[=:]\s*["\x27]?([^\s"]+)'
      severity: HIGH
      description: NoSQL database credential

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # AI & ML PLATFORMS
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  ai:
    - id: SEC-OAI-001
      name: OpenAI API Key
      pattern: 'sk-[A-Za-z0-9]{20}T3BlbkFJ[A-Za-z0-9]{20}'
      severity: CRITICAL
      description: OpenAI API key (legacy format)

    - id: SEC-OAI-002
      name: OpenAI API Key (new format)
      pattern: 'sk-proj-[A-Za-z0-9_\-]{40,}'
      severity: CRITICAL
      description: OpenAI project API key

    - id: SEC-OAI-003
      name: OpenAI Organization ID
      pattern: 'org-[A-Za-z0-9]{24}'
      severity: LOW
      description: OpenAI organization identifier

    - id: SEC-OAI-004
      name: OpenAI Service Account Token
      pattern: 'sk-svcacct-[A-Za-z0-9_\-]{40,}'
      severity: CRITICAL
      description: OpenAI service account token (sk-svcacct- prefix)

    - id: SEC-ANT-001
      name: Anthropic API Key
      pattern: 'sk-ant-[A-Za-z0-9_\-]{90,}'
      severity: CRITICAL
      description: Anthropic/Claude API key

    - id: SEC-COH-001
      name: Cohere API Key
      pattern: '(?i)cohere.*(?:api_?key|token)\s*[=:]\s*["\x27]?([A-Za-z0-9]{40})["\x27]?'
      severity: CRITICAL
      description: Cohere API key

    - id: SEC-HF-001
      name: Hugging Face Token
      pattern: 'hf_[A-Za-z0-9]{34,}'
      severity: CRITICAL
      description: Hugging Face access token

    - id: SEC-REP-001
      name: Replicate API Token
      pattern: 'r8_[A-Za-z0-9]{36}'
      severity: CRITICAL
      description: Replicate API token

    - id: SEC-WB-001
      name: Weights & Biases API Key
      pattern: '(?i)wandb.*(?:api_?key|token)\s*[=:]\s*["\x27]?([a-f0-9]{40})["\x27]?'
      severity: HIGH
      description: Weights & Biases API key

    - id: SEC-PALM-001
      name: Google AI Studio / PaLM Key
      pattern: '(?i)(?:palm|gemini|google_ai).*(?:api_?key)\s*[=:]\s*["\x27]?([A-Za-z0-9_\-]{39})["\x27]?'
      severity: CRITICAL
      description: Google AI Studio / Gemini API key

    - id: SEC-MIST-001
      name: Mistral API Key
      pattern: '(?i)mistral.*(?:api_?key)\s*[=:]\s*["\x27]?([A-Za-z0-9]{32})["\x27]?'
      severity: CRITICAL
      description: Mistral AI API key

    - id: SEC-GROQ-001
      name: Groq API Key
      pattern: 'gsk_[A-Za-z0-9]{52}'
      severity: CRITICAL
      description: Groq cloud inference API key

    - id: SEC-TOG-001
      name: Together AI API Key
      pattern: '(?i)together.*api_?key\s*[=:]\s*["\x27]?([a-f0-9]{64})["\x27]?'
      severity: CRITICAL
      description: Together AI API key

    - id: SEC-PIN-001
      name: Pinecone API Key
      pattern: '(?i)pinecone.*(?:api_?key)\s*[=:]\s*["\x27]?([a-f0-9\-]{36})["\x27]?'
      severity: HIGH
      description: Pinecone vector database API key

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # AUTHENTICATION & IDENTITY
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  auth:
    - id: SEC-JWT-001
      name: JWT / Bearer Token
      pattern: 'eyJ[A-Za-z0-9_\-]+\.eyJ[A-Za-z0-9_\-]+\.[A-Za-z0-9_\-]+'
      severity: HIGH
      description: JSON Web Token (encoded)

    - id: SEC-OAUTH-001
      name: OAuth Client Secret
      pattern: '(?i)(?:client_secret|oauth_secret|app_secret)\s*[=:]\s*["\x27]?([A-Za-z0-9_\-]{20,})["\x27]?'
      severity: HIGH
      description: OAuth2 client secret

    - id: SEC-AUTH0-001
      name: Auth0 Client Secret
      pattern: '(?i)auth0.*client_?secret\s*[=:]\s*["\x27]?([A-Za-z0-9_\-]{40,})["\x27]?'
      severity: CRITICAL
      description: Auth0 management/application secret

    - id: SEC-OKTA-001
      name: Okta API Token
      pattern: '(?i)okta.*(?:api_?token|ssws)\s*[=:]\s*["\x27]?(00[A-Za-z0-9_\-]{40,})["\x27]?'
      severity: CRITICAL
      description: Okta API token (SSWS)

    - id: SEC-CLERK-001
      name: Clerk Secret Key
      pattern: 'sk_(?:live|test)_[A-Za-z0-9]{24,}'
      severity: CRITICAL
      description: Clerk authentication secret key

    - id: SEC-SAML-001
      name: SAML Private Key
      pattern: '(?i)(?:saml.*private[_\-]?key|saml.*signing[_\-]?(?:key|cert)|xmlsec.*private)[\s\S]{0,80}-----BEGIN'
      severity: CRITICAL
      description: SAML signing/encryption private key

    - id: SEC-JWT-002
      name: JWT Signing Secret
      pattern: '(?i)(?:jwt[_\-]?secret|jwt[_\-]?key|token[_\-]?secret|signing[_\-]?secret)\s*[=:]\s*["\x27]([^"\x27\s]{16,})["\x27]'
      severity: CRITICAL
      description: Hardcoded JWT signing secret or HMAC key
  # MONITORING & OBSERVABILITY
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  monitoring:
    - id: SEC-DD-001
      name: Datadog API Key
      pattern: '(?i)dd.*api_?key\s*[=:]\s*["\x27]?([a-f0-9]{32})["\x27]?'
      severity: HIGH
      description: Datadog API key

    - id: SEC-DD-002
      name: Datadog App Key
      pattern: '(?i)dd.*app_?key\s*[=:]\s*["\x27]?([a-f0-9]{40})["\x27]?'
      severity: HIGH
      description: Datadog application key

    - id: SEC-NR-001
      name: New Relic License Key
      pattern: '(?i)new_?relic.*(?:license|key)\s*[=:]\s*["\x27]?([a-f0-9]{40})["\x27]?'
      severity: HIGH
      description: New Relic license key

    - id: SEC-SENTRY-001
      name: Sentry DSN
      pattern: 'https://[a-f0-9]{32}@(?:o\d+\.)?(?:sentry\.io|[^/]+)/\d+'
      severity: MEDIUM
      description: Sentry error tracking DSN

    - id: SEC-PD-001
      name: PagerDuty API Key
      pattern: '(?i)pagerduty.*(?:api_?key|token)\s*[=:]\s*["\x27]?([A-Za-z0-9_\-]{20,})["\x27]?'
      severity: HIGH
      description: PagerDuty REST API key

    - id: SEC-GRAF-001
      name: Grafana API Key
      pattern: 'eyJrIjoi[A-Za-z0-9_\-]+={0,2}'
      severity: HIGH
      description: Grafana API key (base64 encoded)

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # HOSTING & CDN
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  hosting:
    - id: SEC-CF-001
      name: Cloudflare API Key
      pattern: '(?i)cloudflare.*api_?key\s*[=:]\s*["\x27]?([a-f0-9]{37})["\x27]?'
      severity: CRITICAL
      description: Cloudflare global API key

    - id: SEC-CF-002
      name: Cloudflare API Token
      pattern: '(?i)cloudflare.*token\s*[=:]\s*["\x27]?([A-Za-z0-9_\-]{40})["\x27]?'
      severity: HIGH
      description: Cloudflare scoped API token

    - id: SEC-VER-001
      name: Vercel Token
      pattern: '(?i)vercel.*token\s*[=:]\s*["\x27]?([A-Za-z0-9]{24})["\x27]?'
      severity: HIGH
      description: Vercel deployment token

    - id: SEC-NET-001
      name: Netlify Token
      pattern: '(?i)netlify.*(?:token|key)\s*[=:]\s*["\x27]?([A-Za-z0-9_\-]{40,})["\x27]?'
      severity: HIGH
      description: Netlify personal access token

    - id: SEC-HRK-001
      name: Heroku API Key
      pattern: '(?i)heroku.*api_?key\s*[=:]\s*["\x27]?([a-f0-9\-]{36})["\x27]?'
      severity: HIGH
      description: Heroku platform API key

    - id: SEC-DO-001
      name: DigitalOcean Token
      pattern: 'dop_v1_[a-f0-9]{64}'
      severity: CRITICAL
      description: DigitalOcean personal access token

    - id: SEC-FLY-001
      name: Fly.io Token
      pattern: 'fo1_[A-Za-z0-9_\-]{40,}'
      severity: HIGH
      description: Fly.io deploy token

    - id: SEC-RENDER-001
      name: Render API Key
      pattern: 'rnd_[A-Za-z0-9]{32,}'
      severity: HIGH
      description: Render hosting API key

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # CRYPTO & BLOCKCHAIN
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  crypto:
    - id: SEC-ETH-001
      name: Ethereum Private Key
      pattern: '(?:0x)?[a-fA-F0-9]{64}'
      severity: CRITICAL
      description: Ethereum/EVM private key (64 hex chars)

    - id: SEC-SOL-001
      name: Solana Private Key
      pattern: '\[[0-9]{1,3}(?:,\s*[0-9]{1,3}){63}\]'
      severity: CRITICAL
      description: Solana private key (byte array)

    - id: SEC-CB-001
      name: Coinbase API Secret
      pattern: '(?i)coinbase.*(?:secret|key)\s*[=:]\s*["\x27]?([A-Za-z0-9/+=]{40,})["\x27]?'
      severity: CRITICAL
      description: Coinbase exchange API secret

    - id: SEC-ALCH-001
      name: Alchemy API Key
      pattern: '(?i)alchemy.*(?:api_?key)\s*[=:]\s*["\x27]?([A-Za-z0-9_\-]{32})["\x27]?'
      severity: HIGH
      description: Alchemy blockchain API key

    - id: SEC-INF-001
      name: Infura Project Secret
      pattern: '(?i)infura.*(?:secret|key)\s*[=:]\s*["\x27]?([a-f0-9]{32})["\x27]?'
      severity: HIGH
      description: Infura blockchain RPC secret

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # GENERIC PATTERNS
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  generic:
    - id: SEC-KEY-001
      name: RSA Private Key
      pattern: '-----BEGIN RSA PRIVATE KEY-----'
      severity: CRITICAL
      description: RSA private key in PEM format

    - id: SEC-KEY-002
      name: EC Private Key
      pattern: '-----BEGIN EC PRIVATE KEY-----'
      severity: CRITICAL
      description: Elliptic Curve private key

    - id: SEC-KEY-003
      name: DSA Private Key
      pattern: '-----BEGIN DSA PRIVATE KEY-----'
      severity: CRITICAL
      description: DSA private key

    - id: SEC-KEY-004
      name: OpenSSH Private Key
      pattern: '-----BEGIN OPENSSH PRIVATE KEY-----'
      severity: CRITICAL
      description: OpenSSH private key format

    - id: SEC-KEY-005
      name: PGP Private Key
      pattern: '-----BEGIN PGP PRIVATE KEY BLOCK-----'
      severity: CRITICAL
      description: PGP/GPG private key

    - id: SEC-PWD-001
      name: Generic Password Assignment
      pattern: '(?i)(?:password|passwd|pwd|pass)\s*[=:]\s*["\x27]([^"\x27\s]{8,})["\x27]'
      severity: HIGH
      description: Hardcoded password in assignment

    - id: SEC-PWD-002
      name: Database Password in URL
      pattern: '(?i)(?:mysql|postgres|mongodb|redis|amqp)://[^:]+:([^@]{8,})@'
      severity: CRITICAL
      description: Database password embedded in URL

    - id: SEC-PWD-003
      name: Basic Auth Header
      pattern: '(?i)authorization\s*[=:]\s*["\x27]?Basic\s+[A-Za-z0-9+/=]{20,}'
      severity: HIGH
      description: HTTP Basic authentication header with credentials

    - id: SEC-PWD-004
      name: Bearer Token in Code
      pattern: '(?i)authorization\s*[=:]\s*["\x27]?Bearer\s+[A-Za-z0-9._\-]{20,}'
      severity: HIGH
      description: Bearer token hardcoded in source

    - id: SEC-CONN-001
      name: Generic Connection String
      pattern: '(?i)(?:connection_?string|conn_?str|dsn)\s*[=:]\s*["\x27]([^"\x27]{20,})["\x27]'
      severity: HIGH
      description: Database/service connection string

    - id: SEC-ENV-001
      name: .env File Content
      pattern: '(?i)(?<![\w])(?:API_KEY|SECRET_KEY|DATABASE_URL|ACCESS_TOKEN)(?![\w])\s*=\s*["\x27]?(?!os\.getenv\b|os\.environ\b|getenv\b|environ\.get\b|None\b|none\b|null\b|your[_\-]api[_\-]key|your[_\-]secret|placeholder|example|changeme|<|your)([^\s"\x27(]{8,})'
      severity: HIGH
      description: Environment variable with sensitive value

    - id: SEC-ENV-002
      name: Hardcoded Default in os.getenv()
      pattern: '(?i)os\.(?:getenv|environ\.get)\s*\([^,)]+,\s*["\x27](?:sk_(?:live|test)_|pk_(?:live|test)_|AKIA|ghp_|gho_|xox[baprs]-|eyJ[A-Za-z0-9]{10,}|AIza|ya29\.|token_|secret_|key_)[^"\x27]{6,}["\x27]'
      severity: CRITICAL
      description: Hardcoded secret as default fallback value in os.getenv() — will be used if env var is unset

    - id: SEC-HEX-001
      name: Hex-Encoded Secret Prefix
      pattern: '(?i)bytes\.fromhex\s*\(\s*["\x27](?:736b5f6c6976655f|736b5f746573745f|414b49[0-9a-f]{2}|6768705f|786f78[0-9a-f]{2}2d|4149[0-9a-f]{2}61)[0-9a-f]{4,}["\x27]'
      severity: HIGH
      description: Known secret provider prefix encoded as hex via bytes.fromhex() — obfuscation technique
  additional:
    # --- Anthropic Admin Key ---
    - id: SEC-ANTH-002
      name: Anthropic Admin API Key
      pattern: 'sk-ant-admin01-[a-zA-Z0-9_\-]{93}AA'
      severity: CRITICAL
      description: Anthropic admin API key with admin01 prefix

    # --- AWS Bedrock ---
    - id: SEC-AWS-005
      name: AWS Bedrock Long-Lived API Key
      pattern: 'ABSK[A-Za-z0-9+/]{109,269}={0,2}'
      severity: CRITICAL
      description: AWS Amazon Bedrock long-lived API key

    - id: SEC-AWS-006
      name: AWS Bedrock Short-Lived API Key
      pattern: 'bedrock-api-key-YmVkcm9jay5hbWF6b25hd3MuY29t'
      severity: CRITICAL
      description: AWS Amazon Bedrock short-lived API key (base64 marker)

    # --- 1Password ---
    - id: SEC-1PW-001
      name: 1Password Secret Key
      pattern: 'A3-[A-Z0-9]{6}-(?:[A-Z0-9]{11}|[A-Z0-9]{6}-[A-Z0-9]{5})-[A-Z0-9]{5}-[A-Z0-9]{5}-[A-Z0-9]{5}'
      severity: CRITICAL
      description: 1Password account secret key

    - id: SEC-1PW-002
      name: 1Password Service Account Token
      pattern: 'ops_eyJ[a-zA-Z0-9+/]{250,}={0,3}'
      severity: CRITICAL
      description: 1Password service account token

    # --- GitLab Additional Token Types ---
    - id: SEC-GL-004
      name: GitLab CI/CD Job Token
      pattern: 'glcbt-[0-9a-zA-Z]{1,5}_[0-9a-zA-Z_\-]{20}'
      severity: HIGH
      description: GitLab CI/CD job token

    - id: SEC-GL-005
      name: GitLab Deploy Token
      pattern: 'gldt-[0-9a-zA-Z_\-]{20}'
      severity: HIGH
      description: GitLab deploy token

    - id: SEC-GL-006
      name: GitLab Feature Flag Client Token
      pattern: 'glffct-[0-9a-zA-Z_\-]{20}'
      severity: HIGH
      description: GitLab feature flag client token

    - id: SEC-GL-007
      name: GitLab Feed Token
      pattern: 'glft-[0-9a-zA-Z_\-]{20}'
      severity: MEDIUM
      description: GitLab feed token

    - id: SEC-GL-008
      name: GitLab Incoming Mail Token
      pattern: 'glimt-[0-9a-zA-Z_\-]{25}'
      severity: HIGH
      description: GitLab incoming mail token

    - id: SEC-GL-009
      name: GitLab Kubernetes Agent Token
      pattern: 'glagent-[0-9a-zA-Z_\-]{50}'
      severity: HIGH
      description: GitLab Kubernetes agent token

    - id: SEC-GL-010
      name: GitLab OAuth App Secret
      pattern: 'gloas-[0-9a-zA-Z_\-]{64}'
      severity: HIGH
      description: GitLab OAuth application secret

    - id: SEC-GL-011
      name: GitLab Runner Authentication Token
      pattern: 'glrt-[0-9a-zA-Z_\-]{20}'
      severity: HIGH
      description: GitLab runner authentication token (new format)

    - id: SEC-GL-012
      name: GitLab SCIM Token
      pattern: 'glsoat-[0-9a-zA-Z_\-]{20}'
      severity: HIGH
      description: GitLab SCIM provisioning token

    # --- Grafana Additional Formats ---
    - id: SEC-GRAF-002
      name: Grafana Cloud API Token
      pattern: 'glc_[A-Za-z0-9+/]{32,400}={0,3}'
      severity: HIGH
      description: Grafana Cloud API token (glc_ prefix)

    - id: SEC-GRAF-003
      name: Grafana Service Account Token
      pattern: 'glsa_[A-Za-z0-9]{32}_[A-Fa-f0-9]{8}'
      severity: HIGH
      description: Grafana service account token (glsa_ prefix)

    # --- JFrog / Artifactory Standalone Prefixes ---
    - id: SEC-ARTIF-001
      name: Artifactory API Key (AKCp prefix)
      pattern: 'AKCp[A-Za-z0-9]{69}'
      severity: HIGH
      description: JFrog Artifactory API key with AKCp prefix

    - id: SEC-ARTIF-002
      name: Artifactory Reference Token (cmVmd prefix)
      pattern: 'cmVmd[A-Za-z0-9]{59}'
      severity: HIGH
      description: JFrog Artifactory reference token with cmVmd prefix

    # --- Sentry Auth Tokens ---
    - id: SEC-SENTRY-002
      name: Sentry Organization Token
      pattern: 'sntrys_eyJpYXQiO[a-zA-Z0-9+/]{10,200}(?:LCJyZWdpb25fdXJs|InJlZ2lvbl91cmwi|cmVnaW9uX3VybCI6)[a-zA-Z0-9+/]{10,200}={0,2}_[a-zA-Z0-9+/]{43}'
      severity: CRITICAL
      description: Sentry organization auth token (sntrys_ prefix)

    - id: SEC-SENTRY-003
      name: Sentry User Token
      pattern: 'sntryu_[a-f0-9]{64}'
      severity: HIGH
      description: Sentry user auth token (sntryu_ prefix)

    # --- HashiCorp Vault Standalone Prefixes ---
    - id: SEC-VAULT-001
      name: HashiCorp Vault Batch Token
      pattern: 'hvb\.[\w\-]{138,300}'
      severity: CRITICAL
      description: HashiCorp Vault batch token (hvb. prefix)

    - id: SEC-VAULT-002
      name: HashiCorp Vault Service Token
      pattern: 'hvs\.[\w\-]{90,120}'
      severity: CRITICAL
      description: HashiCorp Vault service token (hvs. prefix)

    # --- Pulumi ---
    - id: SEC-PUL-001
      name: Pulumi API Token
      pattern: 'pul-[a-f0-9]{40}'
      severity: HIGH
      description: Pulumi infrastructure-as-code API token

    # --- PlanetScale Password ---
    - id: SEC-PS-003
      name: PlanetScale Database Password
      pattern: 'pscale_pw_[a-zA-Z0-9\-_\.]{32,64}'
      severity: CRITICAL
      description: PlanetScale database password token

    # --- Cloudflare Origin CA Key ---
    - id: SEC-CF-003
      name: Cloudflare Origin CA Key
      pattern: 'v1\.0-[a-f0-9]{24}-[a-f0-9]{146}'
      severity: HIGH
      description: Cloudflare Origin CA private key

    # --- Heroku v2 ---
    - id: SEC-HRK-002
      name: Heroku API Key v2
      pattern: 'HRKU-AA[0-9a-zA-Z_\-]{58}'
      severity: HIGH
      description: Heroku API key v2 format (HRKU-AA prefix)

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# ENTROPY DETECTION CONFIG
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
entropy:
  enabled: true
  min_length: 16
  hex_threshold: 3.5
  base64_threshold: 4.2
  generic_threshold: 4.5
  ignore_patterns:
    - '(?:test|example|placeholder|dummy|fake|sample|mock|fixture)'
    - '(?:TODO|FIXME|XXX|CHANGEME)'
    - '(?:0{16,}|1{16,}|a{16,}|f{16,})'
    - '(?:sha256|sha1|md5|hash|checksum|digest|fingerprint)\s*[=:(]'
    - '(?:assert|expect|assertEqual|assertEquals)\s*\('
    - 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9\.eyJ(?:zdWIiOiIxMjM0NTY3ODkw|0ZXN0)'
    - '(?:generated|auto.?generated|computed|calculated)\s*(?:id|key|token|hash)'
    - '(?:uuid|guid|ulid|nanoid|cuid)\s*[=(:]'
    - '\\b[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}\\b'
