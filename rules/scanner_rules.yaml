# ============================================================================
# Eresus Sentinel — Artifact Scanner Rules
# ============================================================================
# Centralized threat detection patterns for all artifact scanners.
# Scanners load their section at init; inline defaults used as fallback.
# ============================================================================

version: "1.0"

# Shared patterns used across multiple scanners
common:
  executable_extensions:
    - ".sh"
    - ".bash"
    - ".bat"
    - ".cmd"
    - ".ps1"
    - ".exe"
    - ".dll"
    - ".so"
    - ".dylib"
    - ".com"
    - ".msi"
    - ".py"
    - ".rb"
    - ".pl"

  suspicious_names:
    - "backdoor"
    - "trojan"
    - "payload"
    - "exploit"
    - "malware"
    - "reverse_shell"
    - "c2"
    - "exfil"
    - "keylogger"

# TorchScript scanner patterns (PAIT-TS-200/300/301/302)
torchscript:
  code_patterns:
    - pattern: "os.system"
      description: "System command execution"
      severity: CRITICAL
    - pattern: "os.popen"
      description: "System command execution"
      severity: CRITICAL
    - pattern: "subprocess"
      description: "Subprocess invocation"
      severity: CRITICAL
    - pattern: "__import__"
      description: "Dynamic import"
      severity: CRITICAL
    - pattern: "eval\\("
      description: "Dynamic code evaluation"
      severity: CRITICAL
    - pattern: "exec\\("
      description: "Dynamic code execution"
      severity: CRITICAL
    - pattern: "open\\("
      description: "File access"
      severity: HIGH
    - pattern: "os.remove"
      description: "File deletion"
      severity: HIGH
    - pattern: "os.unlink"
      description: "File deletion"
      severity: HIGH
    - pattern: "shutil.rmtree"
      description: "Directory deletion"
      severity: CRITICAL
    - pattern: "socket"
      description: "Network socket access"
      severity: HIGH
    - pattern: "http.client"
      description: "HTTP client access"
      severity: HIGH
    - pattern: "urllib"
      description: "URL access"
      severity: HIGH
    - pattern: "requests."
      description: "HTTP requests"
      severity: HIGH

  pickle_dangerous_modules:
    - "os"
    - "posixpath"
    - "nt"
    - "ntpath"
    - "subprocess"
    - "shutil"
    - "builtins"
    - "webbrowser"
    - "socket"
    - "http"
    - "ctypes"
    - "importlib"
    - "runpy"

  custom_op_patterns:
    - "torch.ops."
    - "torch._C._jit"
    - "torch.classes."
    - "torch.cuda."

  safe_extensions:
    - ".py"
    - ".pkl"
    - ".json"
    - ".txt"
    - ""
    - ".debug_pkl"

# TensorFlow SavedModel scanner patterns (PAIT-TF-200/300/301/302)
tensorflow:
  critical_ops:
    - "PyFunc"
    - "PyFuncStateless"
    - "EagerPyFunc"
    - "ShellOp"
    - "ExternalProcess"
    - "Abort"

  high_ops:
    - "ReadFile"
    - "WriteFile"
    - "MatchingFiles"
    - "WholeFileReader"
    - "WholeFileReaderV2"
    - "FileSystemSetConfiguration"
    - "TempFileResourceHandle"
    - "InitializeTableFromTextFile"
    - "InitializeTableFromTextFileV2"
    - "LMDBReader"
    - "DebugIdentity"
    - "DebugNanCount"
    - "DebugNumericSummary"
    - "Print"
    - "PrintV2"
    - "DecodeRaw"
    - "DecodeCSV"

  medium_ops:
    - "CollectiveGather"
    - "CollectiveReduce"
    - "CollectiveBcastSend"
    - "CollectiveBcastRecv"
    - "Assert"
    - "PartitionedCall"
    - "StatefulPartitionedCall"

# TFLite / LiteRT scanner patterns (PAIT-LITERT-300/301/302)
tflite:
  # TFLite built-in operator count (ops 0..N are standard)
  # Any opcode >= this threshold is a custom operator
  builtin_op_count: 210

  # Dangerous ops that can appear in TFLite models
  dangerous_ops:
    - "ReadFile"
    - "WriteFile"
    - "CallOnce"
    - "VarHandle"
    - "HashTable"
    - "HashTableFind"
    - "HashtableLookup"

  # Maximum sane tensor dimension values
  max_tensor_dim: 1073741824  # 1GB element count limit
  max_tensor_rank: 16

# LlamaFile scanner patterns (PAIT-LMAFL-300)
llamafile:
  # APE (Actually Portable Executable) header magic bytes
  ape_magic: "MZ"
  elf_magic: "\\x7fELF"

  # Maximum allowed header/offset values
  max_header_size: 67108864  # 64MB — APE headers shouldn't exceed this
  max_gguf_scan_range: 104857600  # 100MB — scan range for GGUF magic

  # Suspicious section names in executable
  suspicious_sections:
    - ".shellcode"
    - ".payload"
    - ".backdoor"
    - ".exploit"
    - ".malware"
