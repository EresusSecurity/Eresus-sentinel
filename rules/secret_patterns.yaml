  description: JFrog Artifactory API Key (AKCp prefix)
  pattern: 'AKCp[A-Za-z0-9]{69}'
  severity: HIGH
  category: cicd

- id: artifactory-reference-token
  description: JFrog Artifactory Reference Token (cmVmd prefix)
  pattern: 'cmVmd[A-Za-z0-9]{59}'
  severity: HIGH
  category: cicd

# --- Sentry (auth tokens) ---
- id: sentry-org-token
  description: Sentry Organization Auth Token (sntrys_ prefix)
  pattern: 'sntrys_eyJpYXQiO[a-zA-Z0-9+/]{10,200}(?:LCJyZWdpb25fdXJs|InJlZ2lvbl91cmwi|cmVnaW9uX3VybCI6)[a-zA-Z0-9+/]{10,200}={0,2}_[a-zA-Z0-9+/]{43}'
  severity: CRITICAL
  category: saas

- id: sentry-user-token
  description: Sentry User Auth Token (sntryu_ prefix)
  pattern: 'sntryu_[a-f0-9]{64}'
  severity: HIGH
  category: saas

# --- HashiCorp Vault (standalone token prefixes) ---
- id: vault-batch-token
  description: HashiCorp Vault Batch Token (hvb. prefix)
  pattern: 'hvb\.[\w\-]{138,300}'
  severity: CRITICAL
  category: secrets_manager

- id: vault-service-token
  description: HashiCorp Vault Service Token (hvs. prefix)
  pattern: 'hvs\.[\w\-]{90,120}'
  severity: CRITICAL
  category: secrets_manager

# --- Fly.io ---
- id: flyio-access-token
  description: Fly.io Access Token
  pattern: '(?:fo1_[\w\-]{43}|fm1[ar]_[a-zA-Z0-9+/]{100,}={0,3}|fm2_[a-zA-Z0-9+/]{100,}={0,3})'
  severity: HIGH
  category: cloud_provider

# --- Pulumi ---
- id: pulumi-api-token
  description: Pulumi API Token
  pattern: 'pul-[a-f0-9]{40}'
  severity: HIGH
  category: cicd

# --- Heroku v2 ---
- id: heroku-api-key-v2
  description: Heroku API Key v2 (HRKU-AA prefix)
  pattern: 'HRKU-AA[0-9a-zA-Z_\-]{58}'
  severity: HIGH
  category: cloud_provider

# --- PlanetScale password ---
- id: planetscale-password
  description: PlanetScale Database Password
  pattern: 'pscale_pw_[a-zA-Z0-9\-_\.]{32,64}'
  severity: CRITICAL
  category: database

# --- Cloudflare Origin CA Key ---
- id: cloudflare-origin-ca-key
  description: Cloudflare Origin CA Key
  pattern: 'v1\.0-[a-f0-9]{24}-[a-f0-9]{146}'
  severity: HIGH
  category: cloud_provider

