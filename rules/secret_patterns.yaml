# ============================================================================
# Eresus Sentinel — Secret Detection Patterns
# ============================================================================
#
# Comprehensive credential/secret detection rules for input scanning.
# 120+ patterns covering all major cloud providers, SaaS platforms,
# payment processors, messaging services, CI/CD, databases, and more.
#
# Each pattern has:
#   - id: unique identifier
#   - description: what the pattern detects
#   - pattern: regex (Python-style)
#   - severity: CRITICAL / HIGH / MEDIUM / LOW / INFO
#   - category: logical grouping
#
# Categories:
#   - cloud_provider: AWS, Azure, GCP, DigitalOcean, etc.
#   - ai_ml: OpenAI, Anthropic, Cohere, HuggingFace, etc.
#   - payment: Stripe, Square, PayPal, Braintree, etc.
#   - vcs: GitHub, GitLab, Bitbucket, etc.
#   - messaging: Slack, Discord, Telegram, Twilio, etc.
#   - database: Connection strings, Redis, MongoDB, etc.
#   - saas: SendGrid, Mailchimp, Datadog, New Relic, etc.
#   - crypto: Private keys, PEM, SSH, JWTs, etc.
#   - generic: Generic secrets and high-entropy strings
# ============================================================================

# ======================== CLOUD PROVIDERS ========================

- id: aws-access-key
  description: AWS Access Key ID
  pattern: '(?:^|[^A-Z0-9])(?:AKIA|ABIA|ACCA|ASIA)[0-9A-Z]{16}(?:[^A-Z0-9]|$)'
  severity: CRITICAL
  category: cloud_provider

- id: aws-secret-key
  description: AWS Secret Access Key
  pattern: '(?i)(?:aws|amazon).{0,40}(?:secret|access).{0,40}[''"][0-9a-zA-Z/+=]{40}[''"]'
  severity: CRITICAL
  category: cloud_provider

- id: aws-session-token
  description: AWS Session Token
  pattern: '(?i)(?:aws).{0,20}(?:session|security).{0,20}token.{0,10}[=:]\s*[''"]?[A-Za-z0-9/+=]{100,}'
  severity: CRITICAL
  category: cloud_provider

- id: aws-mws-key
  description: AWS Marketplace Web Service Key
  pattern: 'amzn\.mws\.[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}'
  severity: HIGH
  category: cloud_provider

- id: azure-storage-key
  description: Azure Storage Account Key
  pattern: '(?i)(?:DefaultEndpointsProtocol|AccountName|AccountKey|EndpointSuffix).{0,40}[A-Za-z0-9+/=]{86}=='
  severity: CRITICAL
  category: cloud_provider

- id: azure-ad-client-secret
  description: Azure Active Directory Client Secret
  pattern: '(?i)(?:azure|aad|msal).{0,40}(?:client.?secret|password).{0,20}[=:]\s*[''"]?[a-zA-Z0-9~._-]{34,}'
  severity: CRITICAL
  category: cloud_provider

- id: azure-connection-string
  description: Azure Connection String
  pattern: '(?i)(?:Server|Data Source)=(?:tcp:)?[a-zA-Z0-9.-]+(?:\.database\.windows\.net|\.database\.azure\.com).{0,200}(?:Password|pwd)=[^;''"]{8,}'
  severity: CRITICAL
  category: cloud_provider

- id: azure-sas-token
  description: Azure Shared Access Signature Token
  pattern: '(?i)[?&](?:sv|sig|se|sp|srt|ss)=[^&\s]{10,}(?:&(?:sv|sig|se|sp|srt|ss)=[^&\s]+){2,}'
  severity: HIGH
  category: cloud_provider

- id: azure-devops-pat
  description: Azure DevOps Personal Access Token
  pattern: '(?i)(?:azure.?devops|vsts|ado).{0,40}(?:pat|token|password).{0,20}[=:]\s*[''"]?[a-z2-7]{52}'
  severity: CRITICAL
  category: cloud_provider

- id: gcp-api-key
  description: Google Cloud Platform API Key
  pattern: 'AIza[0-9A-Za-z\-_]{35}'
  severity: HIGH
  category: cloud_provider

- id: gcp-service-account
  description: GCP Service Account Key (JSON Key File)
  pattern: '(?i)"type"\s*:\s*"service_account"'
  severity: CRITICAL
  category: cloud_provider

- id: gcp-oauth-token
  description: Google OAuth Access Token
  pattern: 'ya29\.[0-9A-Za-z_-]{50,}'
  severity: HIGH
  category: cloud_provider

- id: gcp-oauth-refresh
  description: Google OAuth Refresh Token
  pattern: '1//[0-9A-Za-z_-]{40,}'
  severity: HIGH
  category: cloud_provider

- id: firebase-key
  description: Firebase API Key
  pattern: '(?i)(?:firebase|firebaseio).{0,40}(?:key|token|secret|password).{0,20}[=:]\s*[''"]?AIza[0-9A-Za-z\-_]{35}'
  severity: HIGH
  category: cloud_provider

- id: digitalocean-pat
  description: DigitalOcean Personal Access Token
  pattern: '(?:dop_v1_)[a-f0-9]{64}'
  severity: HIGH
  category: cloud_provider

- id: digitalocean-oauth
  description: DigitalOcean OAuth Token
  pattern: '(?:doo_v1_)[a-f0-9]{64}'
  severity: HIGH
  category: cloud_provider

- id: digitalocean-refresh
  description: DigitalOcean Refresh Token
  pattern: '(?:dor_v1_)[a-f0-9]{64}'
  severity: HIGH
  category: cloud_provider

- id: alibaba-access-key
  description: Alibaba Cloud Access Key ID
  pattern: '(?:^|[^A-Z0-9])LTAI[0-9A-Za-z]{12,20}(?:[^A-Z0-9]|$)'
  severity: HIGH
  category: cloud_provider

- id: ibm-cloud-key
  description: IBM Cloud IAM Key
  pattern: '(?i)(?:ibm|cloud).{0,40}(?:api.?key|iam).{0,20}[=:]\s*[''"]?[a-zA-Z0-9_-]{44}'
  severity: HIGH
  category: cloud_provider

- id: heroku-api-key
  description: Heroku API Key
  pattern: '(?i)(?:heroku).{0,40}(?:api.?key|token|secret).{0,20}[=:]\s*[''"]?[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}'
  severity: HIGH
  category: cloud_provider

- id: cloudflare-api-key
  description: Cloudflare API Key
  pattern: '(?i)(?:cloudflare|cf).{0,40}(?:api.?key|token).{0,20}[=:]\s*[''"]?[a-f0-9]{37}'
  severity: HIGH
  category: cloud_provider

- id: cloudflare-global-key
  description: Cloudflare Global API Key
  pattern: '(?i)(?:cloudflare|cf).{0,40}global.{0,20}[=:]\s*[''"]?[a-f0-9]{37}'
  severity: CRITICAL
  category: cloud_provider

