# ======================== CRYPTO / PKI / KEYS ========================

- id: private-key-pem
  description: Private Key (PEM Format)
  pattern: '-----BEGIN (?:RSA |EC |DSA |OPENSSH |ED25519 )?PRIVATE KEY-----'
  severity: CRITICAL
  category: crypto

- id: private-key-pkcs8
  description: PKCS8 Private Key
  pattern: '-----BEGIN ENCRYPTED PRIVATE KEY-----'
  severity: CRITICAL
  category: crypto

- id: pgp-private-key
  description: PGP Private Key Block
  pattern: '-----BEGIN PGP PRIVATE KEY BLOCK-----'
  severity: CRITICAL
  category: crypto

- id: ssh-private-key
  description: SSH Private Key
  pattern: '-----BEGIN OPENSSH PRIVATE KEY-----'
  severity: CRITICAL
  category: crypto

- id: jwt-token
  description: JSON Web Token
  pattern: 'eyJ[A-Za-z0-9_-]{10,}\.eyJ[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]+'
  severity: HIGH
  category: crypto

- id: base64-encoded-key
  description: Base64 Encoded Private Key Material
  pattern: '(?i)(?:private.?key|secret.?key|signing.?key).{0,20}[=:]\s*[''"]?(?:[A-Za-z0-9+/]{40,}={0,2})'
  severity: HIGH
  category: crypto

- id: encryption-key-hex
  description: Hex Encoded Encryption Key
  pattern: '(?i)(?:encryption|aes|signing|hmac).{0,10}(?:key|secret).{0,10}[=:]\s*[''"]?[a-f0-9]{32,}'
  severity: HIGH
  category: crypto

- id: generic-api-key-assignment
  description: Generic API Key Assignment
  pattern: '(?i)(?:api|access|auth|admin|master).?(?:key|token|secret|password|passwd|pwd|credential).{0,10}[=:]\s*[''"][a-zA-Z0-9/+=_\-.]{16,}[''"]'
  severity: MEDIUM
  category: generic

- id: generic-password-assignment
  description: Generic Password Assignment
  pattern: '(?i)(?:password|passwd|pwd|pass)\s*[=:]\s*[''"][^\s''"]{8,}[''"]'
  severity: HIGH
  category: generic

- id: connection-string-generic
  description: Generic Connection String with Password
  pattern: '(?i)(?:connection.?string|dsn|jdbc|odbc)\s*[=:]\s*[''"]?[^\s''"]*(?:password|pwd)=[^;''"]{6,}'
  severity: HIGH
  category: generic

- id: bearer-token-header
  description: Bearer Token in Authorization Header
  pattern: '(?i)(?:authorization|bearer)\s*[=:]\s*[''"]?Bearer\s+[a-zA-Z0-9._~+/=-]{20,}'
  severity: HIGH
  category: generic

- id: basic-auth-header
  description: Basic Auth in Authorization Header
  pattern: '(?i)(?:authorization)\s*[=:]\s*[''"]?Basic\s+[A-Za-z0-9+/=]{20,}'
  severity: CRITICAL
  category: generic

- id: hardcoded-ip-with-port
  description: Hardcoded Internal IP with Port
  pattern: '(?:10\.\d{1,3}\.\d{1,3}\.\d{1,3}|172\.(?:1[6-9]|2\d|3[01])\.\d{1,3}\.\d{1,3}|192\.168\.\d{1,3}\.\d{1,3}):\d{2,5}'
  severity: LOW
  category: generic

- id: x-api-key-header
  description: X-API-Key Header Value
  pattern: '(?i)x-api-key\s*[=:]\s*[''"]?[a-zA-Z0-9_\-]{20,}'
  severity: MEDIUM
  category: generic


