# Eresus Sentinel — Taint Analysis Rules
# Used by: sentinel.sast.taint_tracker
# Defines sources (untrusted data entry) and sinks (dangerous operations)

sources:
  # ─── Web Frameworks ────────────────────────────────────
  flask:
    - name: "request.form"
      pattern: "request\\.(?:form|args|json|data|values|files)\\["
      description: "Flask request data"
    - name: "request.headers"
      pattern: "request\\.headers\\[|request\\.headers\\.get\\("
      description: "Flask request headers"
    - name: "request.cookies"
      pattern: "request\\.cookies\\[|request\\.cookies\\.get\\("
      description: "Flask cookies"
    - name: "request.url"
      pattern: "request\\.(?:url|path|full_path|referrer|host)"
      description: "Flask request URL components"

  django:
    - name: "request.GET"
      pattern: "request\\.(?:GET|POST|body|META)\\["
      description: "Django request data"
    - name: "request.FILES"
      pattern: "request\\.FILES\\["
      description: "Django file upload"
    - name: "request.session"
      pattern: "request\\.session\\["
      description: "Django session data (user-controlled keys)"
    - name: "request.COOKIES"
      pattern: "request\\.COOKIES\\["
      description: "Django cookies"

  fastapi:
    - name: "query_param"
      pattern: "(?:Query|Path|Header|Cookie|Body)\\s*\\("
      description: "FastAPI parameter binding"
    - name: "request.query_params"
      pattern: "request\\.query_params\\["
      description: "FastAPI raw query params"

  # ─── Standard Library ──────────────────────────────────
  stdlib:
    - name: "input()"
      pattern: "\\binput\\s*\\("
      description: "User console input"
    - name: "sys.argv"
      pattern: "sys\\.argv\\["
      description: "Command line arguments"
    - name: "os.environ"
      pattern: "os\\.environ\\["
      description: "Environment variables"
    - name: "sys.stdin"
      pattern: "sys\\.stdin\\.read"
      description: "Standard input"

  # ─── Network / I/O ─────────────────────────────────────
  network:
    - name: "urllib.read"
      pattern: "\\.read\\s*\\(\\s*\\)"
      description: "Network/file read"
    - name: "requests.response"
      pattern: "\\.(?:text|content|json)\\s*(?:\\(\\s*\\)|$)"
      description: "HTTP response data"
    - name: "websocket.recv"
      pattern: "\\.recv\\s*\\(\\s*\\)"
      description: "WebSocket receive"
    - name: "socket.recv"
      pattern: "\\.recvfrom?\\s*\\("
      description: "Socket receive"

  # ─── Deserialization ───────────────────────────────────
  deserialization:
    - name: "json.loads"
      pattern: "json\\.loads?\\s*\\("
      description: "JSON deserialization"
    - name: "csv.reader"
      pattern: "csv\\.(?:reader|DictReader)\\s*\\("
      description: "CSV file data"
    - name: "yaml.load"
      pattern: "yaml\\.(?:load|safe_load)\\s*\\("
      description: "YAML deserialization"
    - name: "xml.parse"
      pattern: "(?:ET|etree|minidom|sax)\\.(?:parse|fromstring|parseString)\\s*\\("
      description: "XML parsing"
    - name: "pickle.loads"
      pattern: "pickle\\.loads?\\s*\\("
      description: "Pickle deserialization (source + sink)"
    - name: "msgpack.unpack"
      pattern: "msgpack\\.(?:unpack|unpackb)\\s*\\("
      description: "MessagePack deserialization"

  # ─── Database ──────────────────────────────────────────
  database:
    - name: "cursor.fetchone"
      pattern: "cursor\\.(?:fetchone|fetchall|fetchmany)\\s*\\("
      description: "Database query result"
    - name: "row_data"
      pattern: "\\.execute\\s*\\(.*\\)\\.fetchone"
      description: "Inline query result"

sinks:
  # ─── Code Execution ────────────────────────────────────
  code_execution:
    - name: "exec()"
      pattern: "\\bexec\\s*\\("
      severity: "CRITICAL"
      cwe: "CWE-94"
      description: "Dynamic code execution"
    - name: "eval()"
      pattern: "\\beval\\s*\\("
      severity: "CRITICAL"
      cwe: "CWE-94"
      description: "Dynamic expression evaluation"
    - name: "compile()"
      pattern: "\\bcompile\\s*\\("
      severity: "HIGH"
      cwe: "CWE-94"
      description: "Dynamic code compilation"

  # ─── OS Command Injection ──────────────────────────────
  command_injection:
    - name: "os.system()"
      pattern: "os\\.system\\s*\\("
      severity: "CRITICAL"
      cwe: "CWE-78"
      description: "OS command execution"
    - name: "os.popen()"
      pattern: "os\\.popen\\s*\\("
      severity: "CRITICAL"
      cwe: "CWE-78"
      description: "OS command with pipe"
    - name: "subprocess"
      pattern: "subprocess\\.(?:call|run|Popen|check_output|check_call|getoutput)\\s*\\("
      severity: "CRITICAL"
      cwe: "CWE-78"
      description: "Subprocess execution"

  # ─── SQL Injection ─────────────────────────────────────
  sql_injection:
    - name: "SQL format string"
      pattern: "(?:execute|cursor\\.execute|\\.raw)\\s*\\(\\s*[\"'].*%[sd]"
      severity: "CRITICAL"
      cwe: "CWE-89"
      description: "SQL injection via format string"
    - name: "SQL f-string"
      pattern: "(?:execute|cursor\\.execute|\\.raw)\\s*\\(\\s*f[\"']"
      severity: "CRITICAL"
      cwe: "CWE-89"
      description: "SQL injection via f-string"
    - name: "SQL concat"
      pattern: "(?:execute|cursor\\.execute)\\s*\\(\\s*[\"']\\s*\\+\\s*"
      severity: "CRITICAL"
      cwe: "CWE-89"
      description: "SQL injection via concatenation"
    - name: "ORM raw"
      pattern: "\\.(?:raw|extra|RawSQL)\\s*\\("
      severity: "HIGH"
      cwe: "CWE-89"
      description: "ORM raw query (potential SQLi)"

  # ─── Template Injection ────────────────────────────────
  template_injection:
    - name: "render_template_string"
      pattern: "(?:render_template_string|Template)\\s*\\("
      severity: "HIGH"
      cwe: "CWE-1336"
      description: "Server-side template injection"
    - name: "Jinja2 from_string"
      pattern: "Environment\\s*\\(.*\\)\\.from_string"
      severity: "HIGH"
      cwe: "CWE-1336"
      description: "Jinja2 template from string"

  # ─── Deserialization Sinks ─────────────────────────────
  deserialization:
    - name: "pickle.loads"
      pattern: "pickle\\.loads?\\s*\\("
      severity: "CRITICAL"
      cwe: "CWE-502"
      description: "Deserialization of untrusted data"
    - name: "yaml.load unsafe"
      pattern: "yaml\\.load\\s*\\([^)]*$"
      severity: "HIGH"
      cwe: "CWE-502"
      description: "Unsafe YAML load"
    - name: "marshal.loads"
      pattern: "marshal\\.loads?\\s*\\("
      severity: "CRITICAL"
      cwe: "CWE-502"
      description: "Marshal deserialization"

  # ─── Path Traversal / Open Redirect ────────────────────
  path_traversal:
    - name: "open()"
      pattern: "\\bopen\\s*\\("
      severity: "MEDIUM"
      cwe: "CWE-22"
      description: "File access with user-controlled path"
    - name: "send_file()"
      pattern: "send_file\\s*\\("
      severity: "MEDIUM"
      cwe: "CWE-22"
      description: "File serving with user-controlled path"
    - name: "redirect()"
      pattern: "redirect\\s*\\("
      severity: "MEDIUM"
      cwe: "CWE-601"
      description: "Open redirect potential"
    - name: "os.path.join"
      pattern: "os\\.path\\.join\\s*\\("
      severity: "LOW"
      cwe: "CWE-22"
      description: "Path join with potential traversal"
    - name: "shutil.copy"
      pattern: "shutil\\.(?:copy|copy2|copytree|move)\\s*\\("
      severity: "MEDIUM"
      cwe: "CWE-22"
      description: "File copy with user-controlled path"

  # ─── XSS Sinks ─────────────────────────────────────────
  xss:
    - name: "innerHTML"
      pattern: "\\.innerHTML\\s*="
      severity: "HIGH"
      cwe: "CWE-79"
      description: "DOM XSS via innerHTML"
    - name: "dangerouslySetInnerHTML"
      pattern: "dangerouslySetInnerHTML"
      severity: "HIGH"
      cwe: "CWE-79"
      description: "React XSS via dangerouslySetInnerHTML"
    - name: "document.write"
      pattern: "document\\.write(?:ln)?\\s*\\("
      severity: "HIGH"
      cwe: "CWE-79"
      description: "DOM XSS via document.write"
    - name: "v-html"
      pattern: "v-html\\s*="
      severity: "HIGH"
      cwe: "CWE-79"
      description: "Vue.js XSS via v-html"

  # ─── Header Injection ──────────────────────────────────
  header_injection:
    - name: "set_header"
      pattern: "\\.(?:set_header|add_header|headers\\[)\\s*"
      severity: "MEDIUM"
      cwe: "CWE-113"
      description: "HTTP header injection"
    - name: "make_response"
      pattern: "make_response\\s*\\(.*\\)\\.headers\\["
      severity: "MEDIUM"
      cwe: "CWE-113"
      description: "Response header manipulation"

  # ─── LDAP / NoSQL Injection ────────────────────────────
  injection_other:
    - name: "ldap.search"
      pattern: "\\.search_s?\\s*\\("
      severity: "HIGH"
      cwe: "CWE-90"
      description: "LDAP injection potential"
    - name: "mongo.find"
      pattern: "\\.(?:find|find_one|aggregate)\\s*\\(\\s*\\{"
      severity: "MEDIUM"
      cwe: "CWE-943"
      description: "NoSQL injection potential"
    - name: "regex.compile"
      pattern: "re\\.compile\\s*\\("
      severity: "LOW"
      cwe: "CWE-1333"
      description: "ReDoS potential with user-controlled regex"
