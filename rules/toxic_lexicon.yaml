# ─── Bypass Patterns ──────────────────────────────────────────────────────────
# These patterns signal that a bypass technique is being attempted.
# Matched BEFORE normalization on raw text.
bypass_indicators:
  # Leet speak markers
  - pattern: '(?i)(?:f[\*\.\-_]?u[\*\.\-_]?c[\*\.\-_]?k|sh[\*\.\-_]?[i1][\*\.\-_]?t|b[\*\.\-_]?[i1][\*\.\-_]?t[\*\.\-_]?ch)'
    name: leet_profanity
    severity: HIGH

  # Zero-width / invisible chars between words
  - pattern: '[\u200b\u200c\u200d\u2060\ufeff\u00ad]'
    name: zero_width_char_bypass
    severity: HIGH

  # Homoglyph substitution (Cyrillic а/е/о/р/с/х in Latin context)
  - pattern: '(?:[\u0430\u0435\u043e\u0440\u0441\u0445\u0456\u0454\u0440]{2,})'
    name: cyrillic_homoglyph_bypass
    severity: MEDIUM

  # Spaced-out letters: f u c k, b o m b
  - pattern: '(?i)\b(?:f\s+u\s+c\s+k|s\s+h\s+i\s+t|b\s+o\s+m\s+b|n\s+[i1]\s+g\s+g\s+[ae3]|c\s+o\s+c\s+k)\b'
    name: spaced_letter_bypass
    severity: HIGH

  # Asterisk / dot censoring with obvious stems: f***k, b**b
  - pattern: '(?i)\b(?:f[\*\.]{1,4}k|s[\*\.]{1,4}t|b[\*\.]{1,4}h|n[\*\.]{1,4}r|c[\*\.]{1,3}t)\b'
    name: asterisk_censor_bypass
    severity: MEDIUM

  # Unicode confusable digits in slurs: n1gg3r, f4gg0t
  - pattern: '(?i)\b(?:n[i1!|]gg[e3][r]|f[a4][g9][g9][o0][t7]|c[o0][c\u0441][k\u04ba]|[s5][h\u04bb][i1!][t7])\b'
    name: digit_substitute_bypass
    severity: HIGH

  # Encoding bypass: base64/hex of slurs
  - pattern: '(?:bmln|Zmln|bmlnZ|ZnVjaw|c2hp|Yml0Y2g=)'
    name: base64_toxic_payload
    severity: HIGH

  # Bomb combined with toxic bypass patterns
  - pattern: '(?i)(?:b[o0\u043e]m[b\u0432]|b[o0]mb[e3]|[b\u0432][o0\u043e][m\u043c][b\u0432])'
    name: homoglyph_bomb
    severity: CRITICAL
