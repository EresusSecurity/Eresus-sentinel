# ============================================================================
# Eresus Sentinel — Architecture & AI Mode Configuration
# ============================================================================
# This config governs how Eresus Sentinel operates:
#   - mode: "deterministic" | "ai-assisted" | "full"
#   - ai_backend: which AI provider to use when ai-assisted
#   - scanner modules: enable/disable individual scanners
# ============================================================================

[engine]
# Scanning mode:
#   "deterministic"  - No AI. Regex, AST, opcode, rules, schema only. (DEFAULT)
#   "ai-assisted"    - Deterministic + AI enrichment layer
#   "full"           - All capabilities including AI-powered probes
mode = "deterministic"

# Maximum file size to scan (bytes). Files larger are skipped.
max_file_size = 536870912  # 512MB

# Output format: "json" | "sarif" | "table" | "markdown"
output_format = "table"

# Severity threshold: only report findings at or above this level
# Profiles: advisory=LOW, balanced=MEDIUM (default), strict=HIGH, ci=MEDIUM
min_severity = "MEDIUM"

# Action policy: "advisory" | "balanced" | "strict"
#   advisory  — all findings are WARN, never BLOCK (shadow mode)
#   balanced  — BLOCK only CRITICAL artifact RCE, WARN everything else (default)
#   strict    — BLOCK on HIGH+CRITICAL
action_policy = "balanced"

# Shadow mode: when true, all BLOCK actions downgraded to WARN for precision measurement
shadow_mode = false

# ─── AI Backend Configuration ──────────────────────────────────────────
[ai]
# Whether to enable AI-assisted analysis
enabled = false

# AI backend: "openai" | "anthropic" | "ollama" | "generic_rest"
backend = "ollama"

# Model to use
model = "llama3.2"

# API endpoint (for generic REST or Ollama)
endpoint = "http://localhost:11434"

# API key (for OpenAI/Anthropic — use env var instead: ERESUS_AI_API_KEY)
api_key = ""

# Max tokens for AI responses
max_tokens = 2048

# Temperature (lower = more deterministic)
temperature = 0.1

# AI-assisted features to enable
[ai.features]
semantic_injection_analysis = true
behavioral_backdoor_comparison = false
redteam_response_analysis = true
agent_flow_reasoning = false
false_positive_reduction = true
finding_enrichment = true

# ─── Scanner Module Configuration ──────────────────────────────────────
[scanners.artifact]
enabled = true
pickle = true
torch = true
safetensors = true
gguf = true
keras = true
onnx = true
archive_slip = true
huggingface = true
tensorflow = true
torchscript = true
tflite = true
llamafile = true

[scanners.firewall.input]
enabled = true
invisible_text = true
heuristic_injection = true  # WARN-only by default in balanced mode
encoding_attack = true
secret_detection = true
canary_injection = false  # Requires active deployment

# Layered Defense Configuration
[scanners.firewall.input.layered_defense]
enabled = true
block_threshold = 0.65
warn_threshold = 0.40

# Layer weights (must sum to 1.0 for normalized scoring)
[scanners.firewall.input.layered_defense.weights]
heuristic = 0.25
ml_classifier = 0.35
canary = 0.20
vector = 0.20

# Layer 2: ML-based classifier
[scanners.firewall.input.ml_classifier]
enabled = false  # Requires: pip install transformers torch
model = "protectai/deberta-v3-base-prompt-injection-v2"
threshold = 0.85
max_length = 512

# Layer 3: Canary placement options
[scanners.firewall.input.canary]
placement = "suffix"  # suffix | prefix | interleaved | wrapped
rotate = true
detect_partial = true
min_partial_length = 8

# Layer 4: Vector similarity
[scanners.firewall.input.vector]
enabled = true
threshold = 0.65


[scanners.firewall.output]
enabled = true
malicious_url = true
sensitive_data = true
format_enforcer = true
bias = true
no_refusal = true
relevance = true
toxicity = true
gibberish = true
url_reachability = true
reading_time = true
json_validation = true
language_same = true

# Output reading time limits
[scanners.firewall.output.reading_time_config]
max_words = 2000
max_reading_minutes = 10.0

# Output relevance threshold
[scanners.firewall.output.relevance_config]
threshold = 0.1

# — New Gap-Fill Input Scanners —
[scanners.firewall.input.toxicity]
enabled = true
threshold = 0.7
categories = ["hate_speech", "violence", "self_harm", "sexual_explicit", "illegal_activity", "harassment"]

[scanners.firewall.input.language]
enabled = false  # Enable and configure allowed_scripts to enforce
allowed_scripts = []  # e.g. ["latin", "arabic"] — empty = detect only
block_mixed = false
mix_threshold = 0.3

[scanners.firewall.input.ban_substrings]
enabled = false  # Enable and configure substrings/patterns to block
substrings = []
patterns = []
case_sensitive = false

[scanners.firewall.input.gibberish]
enabled = true
threshold = 0.7

[scanners.firewall.input.token_limit]
enabled = true
max_tokens = 4096
warn_tokens = 3200

[scanners.firewall.input.code]
enabled = false  # Enable to detect/block code in prompts
block = false
threshold = 2
languages = ["python", "javascript", "shell", "sql", "html_xml"]

[scanners.firewall.input.regex]
enabled = false  # Enable and configure custom patterns

[scanners.firewall.input.sentiment]
enabled = true
threshold = 0.5

# — Notebook Scanner —
[scanners.notebook]
enabled = true
scan_secrets = true
scan_pii = true
scan_dangerous = false  # Too noisy: import requests/boto3/open flagged as dangerous
scan_outputs = true

[scanners.sast]
enabled = true

[scanners.diff]
enabled = true
scan_removed = false

[scanners.diff.patterns]
unsafe_deserialization = true
trust_remote_code = true
safety_flag_weakening = true
code_execution = true
supply_chain = true
credential_exposure = true

[scanners.redteam]
enabled = false
max_turns = 5

# Probe categories
[scanners.redteam.probes]
direct_injection = true
system_prompt_extraction = true
roleplay_jailbreak = true
tool_misuse = true
data_exfiltration = true
privilege_escalation = true
context_manipulation = true
resource_exhaustion = true
latent_injection = true
dan_jailbreak = true
encoding_bypass = true
package_hallucination = true
glitch_tokens = true

# Detector modules
[scanners.redteam.detectors]
trigger_list = true
string_match = true
regex = true
refusal = true
tool_chain = true
exfil = true
behavioral = true

# ─── Rules Configuration ──────────────────────────────────────────────
[rules]
# Path to rules directory (default: ./rules/)
# Can be overridden with ERESUS_RULES_DIR env var
directory = "./rules"

# Custom blocklist path (appended to default)
custom_blocklist = ""

# Custom secret patterns (appended to default)
custom_secrets = ""

# ─── HuggingFace Integration ──────────────────────────────────────────
[huggingface]
# HuggingFace API token (use env var HF_TOKEN instead)
api_token = ""

# Auto-download models for scanning
auto_download = false

# Cache directory for downloaded models
cache_dir = "/tmp/eresus-hf-cache"

# ─── Suppression System ────────────────────────────────────────────────
[suppression]
# Path to .sentinelignore file (gitignore-style path exclusions)
ignore_file = ".sentinelignore"

# Rule-based allowlist: findings matching these rule IDs are suppressed
allowed_rules = []  # e.g. ["SAST-009", "SAST-010"]

# Path-based ignore patterns (glob)
ignore_paths = [
    "**/tests/**",
    "**/test_*",
    "**/*_test.py",
    "**/fixtures/**",
    "**/examples/**",
]

# Finding hash suppression file (stores accepted-risk hashes with justification)
hash_file = ".sentinel-suppressions.yaml"
[reporting]
# Include evidence snippets in report
include_evidence = true

# Maximum evidence length (characters)
max_evidence_length = 500

# SARIF tool information
sarif_tool_name = "Eresus Sentinel"
sarif_tool_version = "0.1.0"
sarif_tool_uri = "https://eresussec.com"
