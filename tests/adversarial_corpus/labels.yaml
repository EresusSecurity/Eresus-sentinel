# Adversarial corpus labels — expected scanner behavior per sample.
#
# module          : sentinel CLI module to dispatch to
# category        : grouping bucket for per-category F1
# criticality     : whether this sample feeds the critical-recall gate
# expected_rule_ids : rule IDs an ideal detector should emit
# currently_expected : rule IDs Sentinel emits today (known state; may be empty)
# disposition     : "malicious" | "clean"

